name: pr-feedback
trigger: >
  When a reviewer requests changes on an open pull request.
description: >
  Address PR review feedback. Use when a reviewer requests changes
  on an open pull request.

steps:
  - name: address
    prompt: |
      A reviewer requested changes on the PR.
      Read the review comments and address each one.
      Push the fixes and reply to each comment.
    handoff:
      required: [status]
    timeout: 1800
