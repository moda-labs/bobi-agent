name: issue-lifecycle
trigger: task.assigned
description: >
  Full engineering lifecycle for code changes: worktree setup, triage
  complexity, optional spec phase with approval gate, implement with
  tests, and open PR. Use for any assigned issue that requires code.

steps:
  - name: setup
    prompt: |
      Create a git worktree for this issue and set up the workspace.
      Read the issue to understand the full context.
    handoff:
      required: [worktree]
    timeout: 300

  - name: pickup
    prompt: |
      Move the issue to In Progress status.
      Run /pickup to triage and assess the complexity of this ticket.
    handoff:
      required: [complexity, needs_spec]
      optional: [blocked_by, notes]
    timeout: 1800

  - name: route
    if: "needs_spec == true"
    goto: spec
    else: implement

  - name: spec
    prompt: |
      Run /spec to write the implementation spec.
      Update the issue description with the spec.
      Do NOT proceed to implementation — stop after the spec is written.
    handoff:
      required: [spec_url]
    timeout: 3000

  - name: await_approval
    await: approval
    timeout: 86400

  - name: implement
    prompt: |
      Run /implement to build the feature.
      Follow TDD — write tests first, then implement.
    handoff:
      required: [status]
    timeout: 3600

  - name: pr
    prompt: |
      Run /prepare-pr to create the pull request.
      Link the PR to the issue. Post a review summary.
    handoff:
      required: [pr_url]
    timeout: 1800
