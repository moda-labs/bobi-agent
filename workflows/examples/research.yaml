# Example: research workflow (non-software-dev)
#
# A workflow for research tasks: gather information, synthesize findings,
# get human approval, then publish a summary. No PRs, no code changes.
#
# To use: copy into <your-repo>/.modastack/workflows/ and customize.

name: research
version: 1
trigger: >
  When an issue with a "research" label is assigned for investigation.

nodes:
  spawn_researcher:
    type: action
    action: session.spawn
    params:
      issue_id: ${{event.issue_id}}
      repo: ${{event.repo}}
    timeout: 60

  notify_start:
    type: action
    action: slack.post
    params:
      channel_id: ${{config.slack_dm_channel}}
      text: "Research started: ${{event.issue_id}} — ${{event.title}}"
    depends_on: [spawn_researcher]

  # Research phase — agent investigates, reads docs, searches
  investigate:
    type: prompt
    session: ${{event.issue_id | lower}}
    inject: |
      Research task: ${{event.title}}

      Details: ${{event.body}}

      Investigate this topic thoroughly. Read relevant files, search the web,
      and compile your findings into a markdown document at
      research/${{event.issue_id | lower}}.md

      When done, update the handoff with phase: research_complete.
    wait_for:
      phase: research_complete
    timeout: 3600
    depends_on: [spawn_researcher]

  # Notify human that findings are ready
  craft_findings_message:
    type: manager
    prompt: |
      Research complete for ${{event.issue_id}} "${{event.title}}".
      Summarize the key findings in 2-3 sentences for a Slack notification.
      Output ONLY the message text.
    timeout: 300
    depends_on: [investigate]

  post_findings:
    type: action
    action: slack.post
    params:
      channel_id: ${{config.slack_dm_channel}}
      text: ${{craft_findings_message.output}}
    depends_on: [craft_findings_message]

  comment_ticket:
    type: action
    action: ticket.comment
    params:
      issue_id: ${{event.issue_id}}
      body: "Research complete. Findings document ready for review."
      repo: ${{event.repo}}
    depends_on: [investigate]

  # Wait for human approval
  approval:
    type: approval
    listen_for:
      source: slack
      match: "approved"
      channel_id: ${{config.slack_dm_channel}}
    timeout: 86400
    depends_on: [post_findings]

  close_ticket:
    type: action
    action: ticket.move
    params:
      issue_id: ${{event.issue_id}}
      state: Done
      repo: ${{event.repo}}
    depends_on: [approval]

  cleanup:
    type: bash
    command: tmux kill-session -t moda-${{event.issue_id | lower}} 2>/dev/null || true
    timeout: 10
    depends_on: [close_ticket]
