name: self-update
version: 1
trigger:
  event: git.push
  filter:
    repo: moda-labs/modastack
    ref: refs/heads/main

nodes:
  fetch_delta:
    label: Check Delta
    type: bash
    command: |
      cd ~/dev/modastack
      git fetch origin main -q
      LOCAL=$(git rev-parse HEAD)
      REMOTE=$(git rev-parse origin/main)
      if [ "$LOCAL" = "$REMOTE" ]; then
        echo "already up to date"
        exit 0
      fi
      git log --oneline HEAD..origin/main
    timeout: 30

  summarize:
    label: Summarize
    type: manager
    prompt: |
      A new modastack update was pushed to main. Here's what changed:

      ${{fetch_delta.stdout}}

      Summarize the changes in 1-2 sentences, then tell the user they can
      say "update modastack" to apply the update and restart.
      Output ONLY the Slack message text.
    timeout: 120
    depends_on: [fetch_delta]
    when: "'already up to date' not in '${{fetch_delta.stdout}}'"

  notify:
    label: Notify
    type: action
    action: slack.post
    params:
      channel_id: ${{config.slack_dm_channel}}
      text: ${{summarize.output}}
    depends_on: [summarize]
