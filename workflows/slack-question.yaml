name: slack-question
version: 1
trigger:
  event: slack.dm

nodes:
  assess_message:
    type: manager
    prompt: |
      Received a Slack DM from ${{event.from}}:
      "${{event.text}}"
      Channel: ${{event.channel_id}}

      You have full freedom to research — read code, search conversation
      history (modastack history search "query"), check git logs, whatever
      helps you give the best answer.

      Then draft your reply to this message.
      Output ONLY the reply text.
    timeout: 300

  post_reply:
    type: action
    action: slack.post
    params:
      channel_id: ${{event.channel_id}}
      text: ${{assess_message.output}}
      thread_ts: ${{event.thread_ts}}
    depends_on: [assess_message]
