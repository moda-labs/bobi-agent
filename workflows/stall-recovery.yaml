name: stall-recovery
trigger: >
  When an engineer session appears stalled or unresponsive.
description: >
  Recover a stalled engineer session. Investigate what went wrong
  and either resume or report the issue.

steps:
  - name: recover
    prompt: |
      This engineer session appears stalled. Check its status,
      investigate what went wrong, and either resume or report the issue.
    handoff:
      required: [status]
    timeout: 600
