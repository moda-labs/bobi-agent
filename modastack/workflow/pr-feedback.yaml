name: pr-feedback
trigger: When a reviewer requests changes on an open pull request.
description: >
  Address PR review feedback. Use when a reviewer requests changes
  on an open pull request.

steps:
  - name: address
    agent: engineer
    prompt: |
      A reviewer requested changes on the PR.
      Follow the Feedback Phase instructions in your role prompt.
      Read the review comments, address each one, push the fixes.
    handoff:
      required: [status]
    timeout: 1800
