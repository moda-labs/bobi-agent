# Example: content review workflow (non-software-dev)
#
# Demonstrates a workflow for reviewing and publishing content (blog posts,
# docs, marketing copy) using the same DAG engine. No code is written —
# the engineer session acts as a content editor instead.
#
# To use: copy this into <your-repo>/.modastack/workflows/ and customize.
# Add context to your .modastack.yaml:
#
#   context:
#     content_dir: content/blog
#     publish_command: npm run publish
#     review_channel: C0CONTENT

name: content-review
version: 1
trigger: >
  When an issue with a "content" label is assigned for editing or publishing.

nodes:
  spawn_editor:
    type: action
    action: session.spawn
    params:
      issue_id: ${{event.issue_id}}
      repo: ${{event.repo}}
    timeout: 60

  notify_start:
    type: action
    action: slack.post
    params:
      channel_id: ${{config.slack_dm_channel}}
      text: "Content task picked up: ${{event.issue_id}} — ${{event.title}}"
    depends_on: [spawn_editor]

  move_to_in_progress:
    type: action
    action: ticket.move
    params:
      issue_id: ${{event.issue_id}}
      state: In Progress
      repo: ${{event.repo}}
    depends_on: [spawn_editor]

  # Draft phase — the engineer writes/edits content
  draft:
    type: prompt
    session: ${{event.issue_id | lower}}
    inject: |
      You are a content editor working on: ${{event.title}}

      Task: ${{event.body}}
      Content directory: ${{repo.content_dir}}

      Write or edit the content as described. When finished, update the
      handoff file with phase: draft_complete.
    wait_for:
      phase: draft_complete
    timeout: 3600
    depends_on: [spawn_editor]

  # Manager reviews the draft for quality
  review_draft:
    type: manager
    prompt: |
      Content draft is ready for ${{event.issue_id}} "${{event.title}}".
      Please review the draft for quality, tone, and accuracy.
      Reply with exactly "approved" or "needs_revision" followed by feedback.
    timeout: 300
    depends_on: [draft]

  route_review:
    type: gate
    depends_on: [review_draft]
    branches:
      approved:
        when: "'approved' in ${{review_draft.output}}"
      revision:
        when: "'needs_revision' in ${{review_draft.output}}"
    fallback: approved

  # Revision loop (if needed)
  revise:
    type: prompt
    session: ${{event.issue_id | lower}}
    inject: |
      Revision requested. Feedback from review:
      ${{review_draft.output}}

      Please revise the content and update handoff to phase: revision_complete.
    wait_for:
      phase: revision_complete
    timeout: 1800
    depends_on: [route_review]
    when: "${{route_review.branch}} == 'revision'"

  # Publish
  publish:
    type: bash
    command: ${{repo.publish_command}}
    cwd: ${{repo.path}}
    timeout: 120
    depends_on: [route_review, revise]

  notify_published:
    type: action
    action: slack.post
    params:
      channel_id: ${{config.slack_dm_channel}}
      text: "Content published: ${{event.title}} (${{event.issue_id}})"
    depends_on: [publish]

  close_ticket:
    type: action
    action: ticket.move
    params:
      issue_id: ${{event.issue_id}}
      state: Done
      repo: ${{event.repo}}
    depends_on: [publish]
