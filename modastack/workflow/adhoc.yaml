name: adhoc
trigger: >
  For any ad-hoc task, investigation, question, or one-off fix that
  doesn't match a more specific workflow.
description: >
  Open-ended task with no structured lifecycle. Use for investigations,
  questions, one-off fixes, research, or anything that doesn't fit a
  specific workflow.

steps:
  - name: task
    prompt: "${{input.task}}"
