# Built-in monitor defaults — shipped with the modastack framework.
#
# These are installed into .modastack/monitors/defaults.yaml by
# `modastack install`, regardless of which agent team is installed.
# Packs can override or extend by including their own monitors/defaults.yaml.
monitors:
  - name: pr-conflict-check
    description: Check open PRs across all registered repos for merge conflicts
    interval: 15m
    event: monitor/pr.conflict_detected
    check: pr_conflicts

  - name: stale-pr-check
    description: Flag open PRs with no activity in 48 hours
    interval: 1h
    event: monitor/pr.stale
    check: stale_prs
