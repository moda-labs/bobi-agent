# Framework-default monitors — seeded into EVERY composed team image (#471).
#
# These are context-hygiene mechanisms the framework provides for its own
# engine, not domain/topology opinions. They are seeded as the most-base layer
# of the `from:` chain at compose time, so a team's own record of the same name
# overrides them and a team's `prune:` can opt out. See compose._seed_framework_monitors.
#
# Keep `policy-curator` here byte-identical to what eng-team used to declare
# — the neutrality test (test_compose) asserts removing the team entry is a no-op.
monitors:
  - name: policy-curator
    description: >
      Distill new agent transcripts since the last run into the team's
      policy.md (#456). Runs out-of-band on an interval; the curator agent
      works from a dedicated prompt (modastack/prompts/curator.md, team-
      overridable) — this description is a human-readable label, not the
      agent's working instructions. The `curator: true` marker routes this
      monitor to the artifact-writing curator path, not the verdict path.
    interval: 6h
    event: system/policy.updated
    curator: true
