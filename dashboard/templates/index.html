<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>modastack</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --orange: #db6d28;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  header h1 { font-size: 18px; font-weight: 600; }
  .manager-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-muted);
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
  }
  .dot.alive { background: var(--green); }
  .dot.dead { background: var(--red); }

  .layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    grid-template-rows: 1fr auto;
    height: calc(100vh - 49px);
  }

  .panel {
    border-right: 1px solid var(--border);
    overflow-y: auto;
  }
  .panel-header {
    padding: 12px 16px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
  }

  .session {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .session:hover { background: var(--surface); }
  .session.active { background: var(--surface); border-left: 3px solid var(--accent); }
  .session.paused { opacity: 0.7; }
  .session-name {
    font-weight: 600;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .session-state {
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 10px;
    font-weight: 500;
  }
  .state-working { background: rgba(88,166,255,0.15); color: var(--accent); }
  .state-waiting_input { background: rgba(63,185,80,0.15); color: var(--green); }
  .state-asking_question { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .state-exited { background: rgba(248,81,73,0.15); color: var(--red); }
  .pause-badge {
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 8px;
    background: rgba(210,153,34,0.2);
    color: var(--yellow);
    margin-left: auto;
  }
  .session-detail {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .empty-state {
    padding: 24px 16px;
    color: var(--text-muted);
    font-size: 13px;
    text-align: center;
  }

  .main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Event view (default) */
  .event-view { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
  .event-view.hidden { display: none; }

  .filters {
    display: flex;
    gap: 8px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    align-items: center;
  }
  .filters select, .filters input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 13px;
  }
  .filters select:focus, .filters input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .filters label {
    font-size: 12px;
    color: var(--text-muted);
  }
  .event-count {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-muted);
  }

  .event-log {
    flex: 1;
    overflow-y: auto;
    padding: 0;
  }
  .event-row {
    display: grid;
    grid-template-columns: 140px 90px 1fr;
    gap: 12px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    align-items: start;
  }
  .event-row:hover { background: var(--surface); }
  .event-time { color: var(--text-muted); font-family: monospace; font-size: 12px; }
  .event-source {
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 10px;
    text-align: center;
    font-weight: 500;
  }
  .source-slack { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .source-github { background: rgba(248,81,73,0.15); color: var(--red); }
  .source-github-issues { background: rgba(219,109,40,0.15); color: var(--orange); }
  .source-linear { background: rgba(88,166,255,0.15); color: var(--accent); }
  .source-worker { background: rgba(63,185,80,0.15); color: var(--green); }
  .source-system { background: rgba(139,148,158,0.15); color: var(--text-muted); }
  .event-body { min-width: 0; }
  .event-type { font-weight: 600; }
  .event-detail {
    color: var(--text-muted);
    font-size: 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }

  .pagination {
    display: flex;
    gap: 8px;
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    justify-content: center;
    background: var(--surface);
  }
  .pagination button {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  .pagination button:hover { border-color: var(--accent); }
  .pagination button:disabled { opacity: 0.4; cursor: default; }

  .decisions {
    grid-column: 1 / -1;
    border-top: 1px solid var(--border);
    max-height: 180px;
    overflow-y: auto;
  }
  .decision-row {
    display: grid;
    grid-template-columns: 140px 1fr auto;
    gap: 12px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .decision-types {
    font-family: monospace;
    font-size: 12px;
    color: var(--accent);
  }
  .decision-count {
    color: var(--text-muted);
    font-size: 12px;
  }

  /* Terminal view */
  .terminal-container { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  .terminal-container.active { display: flex; }
  .terminal-toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    font-size: 13px;
  }
  .terminal-toolbar button {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  .terminal-toolbar button:hover { border-color: var(--accent); }
  .terminal-toolbar .btn-pause.paused {
    background: rgba(210,153,34,0.2);
    border-color: var(--yellow);
    color: var(--yellow);
  }
  .terminal-toolbar .back-link {
    color: var(--accent);
    cursor: pointer;
    text-decoration: none;
    font-size: 13px;
  }
  .terminal-toolbar .session-label {
    font-weight: 600;
    font-family: monospace;
  }
  .terminal-toolbar .spacer { flex: 1; }
  .terminal-body { flex: 1; overflow: hidden; padding: 4px; }
</style>
</head>
<body>

<header>
  <h1>modastack</h1>
  <div class="manager-status">
    <span>Manager:</span>
    <span class="dot" id="mgr-dot"></span>
    <span id="mgr-state">--</span>
  </div>
</header>

<div class="layout">
  <div class="panel">
    <div class="panel-header">Sessions</div>
    <div id="sessions"></div>
  </div>

  <div class="main">
    <div class="event-view" id="event-view">
      <div class="filters">
        <label>Source</label>
        <select id="filter-source"><option value="">All</option></select>
        <label>Type</label>
        <input id="filter-type" type="text" placeholder="e.g. slack.dm" size="16">
        <span class="event-count" id="event-count"></span>
      </div>
      <div class="event-log" id="event-log"></div>
      <div class="pagination">
        <button id="btn-newer" disabled>&larr; Newer</button>
        <span id="page-info" style="font-size:12px;color:var(--text-muted);padding:4px 8px"></span>
        <button id="btn-older">Older &rarr;</button>
      </div>
    </div>

    <div class="terminal-container" id="terminal-container">
      <div class="terminal-toolbar">
        <a class="back-link" id="back-to-events">&larr; Events</a>
        <span class="session-label" id="terminal-label"></span>
        <span class="spacer"></span>
        <button class="btn-pause" id="btn-pause">Pause</button>
      </div>
      <div class="terminal-body" id="terminal-body"></div>
    </div>
  </div>

  <div class="decisions">
    <div class="panel-header">Recent Decisions</div>
    <div id="decisions-list"></div>
  </div>
</div>

<script>
const PAGE_SIZE = 50;
let offset = 0;
let totalEvents = 0;

// Terminal state
let currentTerminal = null;
let currentWs = null;
let currentFit = null;
let currentSession = null;
let resizeHandler = null;
let lastStatus = null;

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function sourceClass(s) {
  return 'source-' + (s || '').replace(/[^a-z-]/g, '');
}

function stateClass(s) {
  return 'state-' + (s || 'unknown');
}

function eventDetail(data) {
  const parts = [];
  if (data.issue_id) parts.push(data.issue_id);
  if (data.title) parts.push(data.title);
  if (data.text) parts.push(data.text);
  if (data.body) parts.push(data.body);
  if (data.from) parts.push('from: ' + data.from);
  if (data.state) parts.push('state: ' + data.state);
  const detail = parts.join(' — ');
  return detail.length > 120 ? detail.slice(0, 120) + '...' : detail;
}

async function fetchJSON(url) {
  const res = await fetch(url);
  return res.json();
}

// ---------------------------------------------------------------------------
// Terminal
// ---------------------------------------------------------------------------

function openTerminal(sessionName) {
  closeTerminal();
  currentSession = sessionName;

  document.getElementById('event-view').classList.add('hidden');
  document.getElementById('terminal-container').classList.add('active');
  document.getElementById('terminal-label').textContent = sessionName;

  // Update sidebar selection
  document.querySelectorAll('.session').forEach(el => {
    el.classList.toggle('active', el.dataset.session === sessionName);
  });

  const term = new Terminal({
    cursorBlink: true,
    fontSize: 13,
    fontFamily: "'Menlo', 'Monaco', 'Courier New', monospace",
    theme: {
      background: '#0d1117',
      foreground: '#e6edf3',
      cursor: '#58a6ff',
      selectionBackground: '#264f78',
    },
  });
  const fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);

  const container = document.getElementById('terminal-body');
  container.innerHTML = '';
  term.open(container);
  fitAddon.fit();

  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(`${proto}//${location.host}/ws/terminal/${sessionName}`);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    fitAddon.fit();
  };

  ws.onmessage = (e) => {
    term.write(new Uint8Array(e.data));
  };

  ws.onclose = () => {
    term.write('\r\n\x1b[90m[connection closed]\x1b[0m\r\n');
  };

  term.onData((data) => {
    if (ws.readyState === WebSocket.OPEN) {
      ws.send(data);
    }
  });

  term.onResize(({ cols, rows }) => {
    if (ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'resize', cols, rows }));
    }
  });

  resizeHandler = () => fitAddon.fit();
  window.addEventListener('resize', resizeHandler);

  currentTerminal = term;
  currentWs = ws;
  currentFit = fitAddon;

  syncPauseButton();
}

function closeTerminal() {
  if (currentWs) {
    currentWs.close();
    currentWs = null;
  }
  if (currentTerminal) {
    currentTerminal.dispose();
    currentTerminal = null;
  }
  if (resizeHandler) {
    window.removeEventListener('resize', resizeHandler);
    resizeHandler = null;
  }
  currentFit = null;
  currentSession = null;

  document.getElementById('terminal-body').innerHTML = '';
  document.getElementById('terminal-container').classList.remove('active');
  document.getElementById('event-view').classList.remove('hidden');

  document.querySelectorAll('.session').forEach(el => el.classList.remove('active'));
}

// ---------------------------------------------------------------------------
// Pause / Resume
// ---------------------------------------------------------------------------

function getSessionPaused(sessionName) {
  if (!lastStatus) return false;
  if (sessionName === 'moda-manager') return lastStatus.manager.paused;
  const s = lastStatus.sessions.find(s => s.name === sessionName);
  return s ? s.paused : false;
}

async function togglePause() {
  if (!currentSession) return;
  const paused = getSessionPaused(currentSession);
  const endpoint = paused ? 'resume' : 'pause';
  await fetch(`/api/sessions/${currentSession}/${endpoint}`, { method: 'POST' });
  await loadStatus();
  syncPauseButton();
}

function syncPauseButton() {
  const btn = document.getElementById('btn-pause');
  if (!currentSession) return;
  const paused = getSessionPaused(currentSession);
  btn.textContent = paused ? 'Resume' : 'Pause';
  btn.classList.toggle('paused', paused);
}

// ---------------------------------------------------------------------------
// Data loading
// ---------------------------------------------------------------------------

async function loadStatus() {
  try {
    const d = await fetchJSON('/api/status');
    lastStatus = d;

    const dot = document.getElementById('mgr-dot');
    const state = document.getElementById('mgr-state');
    dot.className = 'dot ' + (d.manager.alive ? 'alive' : 'dead');
    state.textContent = d.manager.alive ? d.manager.state : 'offline';

    const el = document.getElementById('sessions');
    let html = '';

    // Manager entry
    if (d.manager.alive) {
      const mgrActive = currentSession === 'moda-manager' ? 'active' : '';
      const mgrPaused = d.manager.paused ? 'paused' : '';
      html += `<div class="session ${mgrActive} ${mgrPaused}" data-session="moda-manager" onclick="openTerminal('moda-manager')">
        <div class="session-name">
          <span class="dot alive"></span>
          Manager
          <span class="session-state ${stateClass(d.manager.state)}">${esc(d.manager.state)}</span>
          ${d.manager.paused ? '<span class="pause-badge">PAUSED</span>' : ''}
        </div>
      </div>`;
    }

    if (!d.sessions.length && !d.manager.alive) {
      html += '<div class="empty-state">No active sessions</div>';
    } else {
      html += d.sessions.map(s => {
        const active = currentSession === s.name ? 'active' : '';
        const paused = s.paused ? 'paused' : '';
        return `<div class="session ${active} ${paused}" data-session="${esc(s.name)}" onclick="openTerminal('${esc(s.name)}')">
          <div class="session-name">
            <span class="dot ${s.state === 'exited' ? 'dead' : 'alive'}"></span>
            ${esc(s.issue_id)}
            <span class="session-state ${stateClass(s.state)}">${esc(s.state)}</span>
            ${s.paused ? '<span class="pause-badge">PAUSED</span>' : ''}
          </div>
          ${s.last_line ? `<div class="session-detail">${esc(s.last_line)}</div>` : ''}
        </div>`;
      }).join('');
    }
    el.innerHTML = html;

    if (currentSession) syncPauseButton();
  } catch (e) {
    document.getElementById('mgr-state').textContent = 'fetch error';
  }
}

async function loadEvents() {
  const source = document.getElementById('filter-source').value;
  const type = document.getElementById('filter-type').value;
  let url = `/api/events?limit=${PAGE_SIZE}&offset=${offset}`;
  if (source) url += `&source=${encodeURIComponent(source)}`;
  if (type) url += `&type=${encodeURIComponent(type)}`;

  try {
    const d = await fetchJSON(url);
    totalEvents = d.total;

    document.getElementById('event-count').textContent =
      `${d.total} event${d.total !== 1 ? 's' : ''}`;

    const el = document.getElementById('event-log');
    if (!d.events.length) {
      el.innerHTML = '<div class="empty-state">No events</div>';
    } else {
      el.innerHTML = d.events.map(e =>
        `<div class="event-row">
          <span class="event-time">${esc(e.timestamp)}</span>
          <span class="event-source ${sourceClass(e.source)}">${esc(e.source)}</span>
          <div class="event-body">
            <span class="event-type">${esc(e.type)}</span>
            <div class="event-detail">${esc(eventDetail(e.data || {}))}</div>
          </div>
        </div>`
      ).join('');
    }

    document.getElementById('btn-newer').disabled = offset === 0;
    document.getElementById('btn-older').disabled = offset + PAGE_SIZE >= totalEvents;
    const page = Math.floor(offset / PAGE_SIZE) + 1;
    const pages = Math.max(1, Math.ceil(totalEvents / PAGE_SIZE));
    document.getElementById('page-info').textContent = `${page} / ${pages}`;
  } catch (e) {
    document.getElementById('event-log').innerHTML =
      '<div class="empty-state">Failed to load events</div>';
  }
}

async function loadDecisions() {
  try {
    const d = await fetchJSON('/api/decisions?limit=5');
    const el = document.getElementById('decisions-list');
    if (!d.decisions.length) {
      el.innerHTML = '<div class="empty-state">No decisions yet</div>';
    } else {
      el.innerHTML = d.decisions.map(dec =>
        `<div class="decision-row">
          <span class="event-time">${esc(dec.timestamp)}</span>
          <span class="decision-types">${esc((dec.event_types || []).join(', '))}</span>
          <span class="decision-count">${dec.events} event${dec.events !== 1 ? 's' : ''}</span>
        </div>`
      ).join('');
    }
  } catch (e) {}
}

async function loadSources() {
  try {
    const d = await fetchJSON('/api/sources');
    const sel = document.getElementById('filter-source');
    const current = sel.value;
    sel.innerHTML = '<option value="">All</option>';
    (d.sources || []).forEach(s => {
      const opt = document.createElement('option');
      opt.value = s;
      opt.textContent = s;
      if (s === current) opt.selected = true;
      sel.appendChild(opt);
    });
  } catch (e) {}
}

// ---------------------------------------------------------------------------
// Event listeners
// ---------------------------------------------------------------------------

document.getElementById('back-to-events').addEventListener('click', closeTerminal);
document.getElementById('btn-pause').addEventListener('click', togglePause);
document.getElementById('btn-newer').addEventListener('click', () => {
  offset = Math.max(0, offset - PAGE_SIZE);
  loadEvents();
});
document.getElementById('btn-older').addEventListener('click', () => {
  if (offset + PAGE_SIZE < totalEvents) { offset += PAGE_SIZE; loadEvents(); }
});
document.getElementById('filter-source').addEventListener('change', () => { offset = 0; loadEvents(); });
document.getElementById('filter-type').addEventListener('input', () => { offset = 0; loadEvents(); });

function refreshAll() { loadStatus(); loadEvents(); loadDecisions(); }

loadSources();
refreshAll();
setInterval(refreshAll, 5000);
setInterval(loadSources, 30000);
</script>
</body>
</html>
