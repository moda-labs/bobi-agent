<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>modastack</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --orange: #db6d28;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
  }

  header {
    display: flex;
    align-items: center;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  header h1 { font-size: 18px; font-weight: 600; }

  .layout {
    display: grid;
    grid-template-columns: 300px 1fr;
    height: calc(100vh - 49px);
  }

  /* Sidebar */
  .sidebar {
    border-right: 1px solid var(--border);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .sidebar-header {
    padding: 12px 16px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
  }
  .sidebar-cards { overflow-y: auto; flex: 1; }

  .session-card {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .session-card:hover { background: var(--surface); }
  .session-card.active { background: var(--surface); border-left: 3px solid var(--accent); padding-left: 13px; }
  .session-card.paused { opacity: 0.7; }
  .card-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }
  .card-name { font-weight: 600; font-size: 13px; }
  .card-state {
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 10px;
    font-weight: 500;
  }
  .state-working { background: rgba(88,166,255,0.15); color: var(--accent); }
  .state-idle { background: rgba(63,185,80,0.15); color: var(--green); }
  .state-blocked { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .state-exited { background: rgba(248,81,73,0.15); color: var(--red); }
  .pause-badge {
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 8px;
    background: rgba(210,153,34,0.2);
    color: var(--yellow);
    margin-left: auto;
  }
  .card-detail {
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-workflow {
    display: flex;
    align-items: center;
    gap: 3px;
    font-size: 10px;
    flex-wrap: wrap;
    margin-top: 6px;
  }
  .wf-node {
    padding: 1px 5px;
    border-radius: 6px;
    white-space: nowrap;
    font-weight: 500;
  }
  .wf-completed { background: rgba(63,185,80,0.15); color: var(--green); }
  .wf-running, .wf-waiting { background: rgba(88,166,255,0.2); color: var(--accent); }
  .wf-failed { background: rgba(248,81,73,0.15); color: var(--red); }
  .wf-skipped { display: none; }
  .wf-pending { color: var(--text-muted); opacity: 0.5; }
  .wf-arrow { color: var(--text-muted); opacity: 0.3; font-size: 9px; }
  .empty-state {
    padding: 24px 16px;
    color: var(--text-muted);
    font-size: 13px;
    text-align: center;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }
  .dot.alive { background: var(--green); }
  .dot.dead { background: var(--red); }

  /* Event log card in sidebar */
  .event-log-card {
    cursor: pointer;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  .event-log-card:hover { background: var(--surface); }
  .event-log-card.active { background: var(--surface); border-left: 3px solid var(--accent); padding-left: 13px; }
  .event-log-card .card-header { margin-bottom: 0; }
  .event-log-badge {
    font-size: 11px;
    background: var(--border);
    padding: 1px 6px;
    border-radius: 10px;
    margin-left: auto;
  }

  /* Main area */
  .main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    height: 100%;
    min-height: 0;
  }

  /* Events view */
  .events-view { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  .events-view.active { display: flex; }
  .filters {
    display: flex;
    gap: 8px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    align-items: center;
  }
  .filters select, .filters input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 13px;
  }
  .filters select:focus, .filters input:focus { outline: none; border-color: var(--accent); }
  .filters label { font-size: 12px; color: var(--text-muted); }
  .event-count { margin-left: auto; font-size: 12px; color: var(--text-muted); }
  .event-log { flex: 1; overflow-y: auto; }
  .event-row {
    display: grid;
    grid-template-columns: 140px 90px 1fr;
    gap: 12px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    align-items: start;
  }
  .event-row:hover { background: var(--surface); }
  .event-time { color: var(--text-muted); font-family: monospace; font-size: 12px; }
  .event-source {
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 10px;
    text-align: center;
    font-weight: 500;
  }
  .source-slack { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .source-github { background: rgba(248,81,73,0.15); color: var(--red); }
  .source-github-issues { background: rgba(219,109,40,0.15); color: var(--orange); }
  .source-linear { background: rgba(88,166,255,0.15); color: var(--accent); }
  .source-worker { background: rgba(63,185,80,0.15); color: var(--green); }
  .source-system { background: rgba(139,148,158,0.15); color: var(--text-muted); }
  .event-body { min-width: 0; }
  .event-type { font-weight: 600; }
  .event-detail {
    color: var(--text-muted);
    font-size: 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }
  .pagination {
    display: flex;
    gap: 8px;
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    justify-content: center;
    background: var(--surface);
  }
  .pagination button {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  .pagination button:hover { border-color: var(--accent); }
  .pagination button:disabled { opacity: 0.4; cursor: default; }

  /* Terminal view */
  .terminal-view { display: none; flex-direction: column; flex: 1; overflow: hidden; width: 100%; min-width: 0; }
  .terminal-view.active { display: flex; }
  .terminal-toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    font-size: 13px;
  }
  .terminal-toolbar button {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  .terminal-toolbar button:hover { border-color: var(--accent); }
  .terminal-toolbar .btn-pause.paused {
    background: rgba(210,153,34,0.2);
    border-color: var(--yellow);
    color: var(--yellow);
  }
  .terminal-toolbar .session-label { font-weight: 600; font-family: monospace; }
  .terminal-toolbar .spacer { flex: 1; }
  .terminal-toolbar .workflow-progress {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    overflow-x: auto;
    max-width: 50%;
  }
  .terminal-body { flex: 1; overflow: hidden; position: relative; width: 100%; min-width: 0; }
  .terminal-body .xterm { height: 100%; width: 100%; }
</style>
</head>
<body>

<header>
  <h1>modastack</h1>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-header">Sessions</div>
    <div class="sidebar-cards" id="session-cards"></div>
  </div>

  <div class="main">
    <!-- Events view -->
    <div class="events-view" id="events-view">
      <div class="filters">
        <label>Source</label>
        <select id="filter-source"><option value="">All</option></select>
        <label>Type</label>
        <input id="filter-type" type="text" placeholder="e.g. slack.dm" size="16">
        <span class="event-count" id="event-count"></span>
      </div>
      <div class="event-log" id="event-log"></div>
      <div class="pagination">
        <button id="btn-newer" disabled>&larr; Newer</button>
        <span id="page-info" style="font-size:12px;color:var(--text-muted);padding:4px 8px"></span>
        <button id="btn-older">Older &rarr;</button>
      </div>
    </div>

    <!-- Terminal -->
    <div class="terminal-view" id="terminal-view">
      <div class="terminal-toolbar">
        <span class="session-label" id="terminal-label"></span>
        <div class="workflow-progress" id="workflow-progress"></div>
        <span class="spacer"></span>
        <button class="btn-pause" id="btn-pause">Take Control</button>
        <button id="btn-kill" style="border-color:var(--red);color:var(--red)">Close Session</button>
      </div>
      <div class="terminal-body" id="terminal-body"></div>
    </div>
  </div>
</div>

<script>
const PAGE_SIZE = 50;
let offset = 0;
let totalEvents = 0;
let currentView = 'terminal'; // 'terminal' or 'events'

let currentTerminal = null;
let currentWs = null;
let currentFit = null;
let currentSession = null;
let resizeHandler = null;
let lastStatus = null;
let workflowCache = {};

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
function sourceClass(s) { return 'source-' + (s || '').replace(/[^a-z-]/g, ''); }

const STATE_DISPLAY = {
  'waiting_input': { label: 'Idle', css: 'idle' },
  'working': { label: 'Working', css: 'working' },
  'asking_question': { label: 'Blocked', css: 'blocked' },
  'permission_blocked': { label: 'Blocked', css: 'blocked' },
  'exited': { label: 'Exited', css: 'exited' },
};
function stateLabel(s) { return (STATE_DISPLAY[s] || {}).label || s; }
function stateClass(s) { return 'state-' + ((STATE_DISPLAY[s] || {}).css || 'unknown'); }

function eventDetail(data) {
  const parts = [];
  if (data.issue_id) parts.push(data.issue_id);
  if (data.title) parts.push(data.title);
  if (data.text) parts.push(data.text);
  if (data.body) parts.push(data.body);
  if (data.from) parts.push('from: ' + data.from);
  if (data.state) parts.push('state: ' + data.state);
  const detail = parts.join(' — ');
  return detail.length > 120 ? detail.slice(0, 120) + '...' : detail;
}
async function fetchJSON(url) { return (await fetch(url)).json(); }

function renderWorkflowNodes(nodes) {
  if (!nodes || !nodes.length) return '';
  const visible = nodes.filter(n => n.status !== 'skipped');
  return visible.map((n, i) => {
    const arrow = i < visible.length - 1 ? '<span class="wf-arrow">&rarr;</span>' : '';
    return `<span class="wf-node wf-${n.status}">${esc(n.label || n.id)}</span>${arrow}`;
  }).join('');
}

// ---------------------------------------------------------------------------
// View switching
// ---------------------------------------------------------------------------

function showTerminal() {
  currentView = 'terminal';
  document.getElementById('events-view').classList.remove('active');
  document.getElementById('terminal-view').classList.add('active');
  if (currentFit) requestAnimationFrame(() => currentFit.fit());
}

function showEvents() {
  currentView = 'events';
  document.getElementById('terminal-view').classList.remove('active');
  document.getElementById('events-view').classList.add('active');
  refreshSidebarSelection();
  loadEvents();
}

// ---------------------------------------------------------------------------
// Terminal
// ---------------------------------------------------------------------------

function openTerminal(sessionName) {
  if (currentSession === sessionName && currentView === 'terminal') return;
  closeTerminal(true);
  currentSession = sessionName;

  document.getElementById('terminal-label').textContent = sessionName;
  showTerminal();
  refreshSidebarSelection();

  const term = new Terminal({
    cursorBlink: true,
    fontSize: 13,
    fontFamily: "'Menlo', 'Monaco', 'Courier New', monospace",
    scrollback: 5000,
    theme: {
      background: '#0d1117',
      foreground: '#e6edf3',
      cursor: '#58a6ff',
      selectionBackground: '#264f78',
    },
  });
  const fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);

  const container = document.getElementById('terminal-body');
  container.innerHTML = '';
  term.open(container);
  // Multiple fit attempts to handle layout timing
  requestAnimationFrame(() => fitAddon.fit());
  setTimeout(() => fitAddon.fit(), 100);
  setTimeout(() => fitAddon.fit(), 300);

  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(`${proto}//${location.host}/ws/terminal/${sessionName}`);
  ws.binaryType = 'arraybuffer';
  let resizeSent = false;
  let buffered = [];
  ws.onopen = () => {
    setTimeout(() => {
      fitAddon.fit();
      // After first resize, flush buffered data and switch to direct writes
      setTimeout(() => {
        resizeSent = true;
        for (const chunk of buffered) term.write(chunk);
        buffered = null;
      }, 200);
    }, 50);
  };
  ws.onmessage = (e) => {
    const data = new Uint8Array(e.data);
    if (!resizeSent) { buffered.push(data); return; }
    term.write(data);
  };
  ws.onclose = () => term.write('\r\n\x1b[90m[connection closed]\x1b[0m\r\n');

  term.onData((data) => { if (ws.readyState === WebSocket.OPEN) ws.send(data); });
  term.onResize(({ cols, rows }) => {
    if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'resize', cols, rows }));
  });

  resizeHandler = new ResizeObserver(() => {
    requestAnimationFrame(() => fitAddon.fit());
  });
  resizeHandler.observe(container);

  currentTerminal = term;
  currentWs = ws;
  currentFit = fitAddon;

  syncPauseButton();
  loadWorkflowProgress();
}

function closeTerminal(keepView) {
  if (currentWs) { currentWs.close(); currentWs = null; }
  if (currentTerminal) { currentTerminal.dispose(); currentTerminal = null; }
  if (resizeHandler) { resizeHandler.disconnect(); resizeHandler = null; }
  currentFit = null;
  currentSession = null;
  document.getElementById('terminal-body').innerHTML = '';
  if (!keepView) {
    document.getElementById('terminal-view').classList.remove('active');
  }
  refreshSidebarSelection();
}

function refreshSidebarSelection() {
  document.querySelectorAll('.session-card').forEach(el => {
    el.classList.toggle('active', el.dataset.session === currentSession && currentView === 'terminal');
  });
  document.querySelectorAll('.event-log-card').forEach(el => {
    el.classList.toggle('active', currentView === 'events');
  });
}

// ---------------------------------------------------------------------------
// Pause / Resume
// ---------------------------------------------------------------------------

function getSessionPaused(sessionName) {
  if (!lastStatus) return false;
  if (sessionName === 'moda-manager') return lastStatus.manager.paused;
  const s = lastStatus.sessions.find(s => s.name === sessionName);
  return s ? s.paused : false;
}

async function togglePause() {
  if (!currentSession) return;
  const paused = getSessionPaused(currentSession);
  await fetch(`/api/sessions/${currentSession}/${paused ? 'resume' : 'pause'}`, { method: 'POST' });
  await loadStatus();
  syncPauseButton();
}

function syncPauseButton() {
  const btn = document.getElementById('btn-pause');
  if (!currentSession) return;
  const paused = getSessionPaused(currentSession);
  btn.textContent = paused ? 'Release Control' : 'Take Control';
  btn.classList.toggle('paused', paused);
}

// ---------------------------------------------------------------------------
// Workflow progress
// ---------------------------------------------------------------------------

async function loadWorkflowProgress() {
  const el = document.getElementById('workflow-progress');
  if (!currentSession || currentSession === 'moda-manager') { el.innerHTML = ''; return; }
  const issueId = currentSession.replace('moda-', '');
  try {
    const d = await fetchJSON(`/api/workflow/${issueId}`);
    if (!d.progress) { el.innerHTML = ''; return; }
    el.innerHTML = renderWorkflowNodes(d.progress.nodes);
  } catch (e) { el.innerHTML = ''; }
}

async function loadAllWorkflows() {
  if (!lastStatus) return;
  for (const s of lastStatus.sessions) {
    const issueId = s.name.replace('moda-', '');
    try {
      const d = await fetchJSON(`/api/workflow/${issueId}`);
      workflowCache[s.name] = d.progress;
    } catch (e) { workflowCache[s.name] = null; }
  }
}

// ---------------------------------------------------------------------------
// Data loading
// ---------------------------------------------------------------------------

async function loadStatus() {
  try {
    const d = await fetchJSON('/api/status');
    lastStatus = d;

    const cards = document.getElementById('session-cards');
    let html = '';

    // Manager card
    const mgrState = d.manager.alive ? d.manager.state : 'exited';
    html += `<div class="session-card ${currentSession === 'moda-manager' && currentView === 'terminal' ? 'active' : ''} ${d.manager.paused ? 'paused' : ''}"
                  data-session="moda-manager" onclick="openTerminal('moda-manager')">
      <div class="card-header">
        <span class="dot ${d.manager.alive ? 'alive' : 'dead'}"></span>
        <span class="card-name">Manager</span>
        <span class="card-state ${stateClass(mgrState)}">${stateLabel(mgrState)}</span>
        ${d.manager.paused ? '<span class="pause-badge">PAUSED</span>' : ''}
      </div>
      <div class="card-detail">${d.manager.alive ? 'Orchestration &amp; event processing' : 'Offline'}</div>
    </div>`;

    // Engineer cards
    html += d.sessions.map(s => {
      const wf = workflowCache[s.name];
      const wfHtml = wf ? renderWorkflowNodes(wf.nodes) : '';
      return `<div class="session-card ${currentSession === s.name && currentView === 'terminal' ? 'active' : ''} ${s.paused ? 'paused' : ''}"
                    data-session="${esc(s.name)}" onclick="openTerminal('${esc(s.name)}')">
        <div class="card-header">
          <span class="dot ${s.state === 'exited' ? 'dead' : 'alive'}"></span>
          <span class="card-name">${esc(s.issue_id)}</span>
          <span class="card-state ${stateClass(s.state)}">${stateLabel(s.state)}</span>
          ${s.paused ? '<span class="pause-badge">PAUSED</span>' : ''}
        </div>
        ${s.last_line ? `<div class="card-detail">${esc(s.last_line)}</div>` : ''}
        ${wfHtml ? `<div class="card-workflow">${wfHtml}</div>` : ''}
      </div>`;
    }).join('');

    // Event log card at the end
    html += `<div class="event-log-card ${currentView === 'events' ? 'active' : ''}" onclick="showEvents()">
      <div class="card-header">
        <span class="card-name" style="color:var(--text-muted)">Event Log</span>
        <span class="event-log-badge" id="event-log-badge">${totalEvents}</span>
      </div>
    </div>`;

    cards.innerHTML = html;
    if (currentSession) syncPauseButton();
  } catch (e) {}
}

async function loadEvents() {
  const source = document.getElementById('filter-source').value;
  const type = document.getElementById('filter-type').value;
  let url = `/api/events?limit=${PAGE_SIZE}&offset=${offset}`;
  if (source) url += `&source=${encodeURIComponent(source)}`;
  if (type) url += `&type=${encodeURIComponent(type)}`;

  try {
    const d = await fetchJSON(url);
    totalEvents = d.total;
    document.getElementById('event-count').textContent = `${d.total} event${d.total !== 1 ? 's' : ''}`;
    document.getElementById('event-log-badge').textContent = d.total;

    const el = document.getElementById('event-log');
    if (!d.events.length) {
      el.innerHTML = '<div class="empty-state">No events</div>';
    } else {
      el.innerHTML = d.events.map(e =>
        `<div class="event-row">
          <span class="event-time">${esc(e.timestamp)}</span>
          <span class="event-source ${sourceClass(e.source)}">${esc(e.source)}</span>
          <div class="event-body">
            <span class="event-type">${esc(e.type)}</span>
            <div class="event-detail">${esc(eventDetail(e.data || {}))}</div>
          </div>
        </div>`
      ).join('');
    }

    document.getElementById('btn-newer').disabled = offset === 0;
    document.getElementById('btn-older').disabled = offset + PAGE_SIZE >= totalEvents;
    const page = Math.floor(offset / PAGE_SIZE) + 1;
    const pages = Math.max(1, Math.ceil(totalEvents / PAGE_SIZE));
    document.getElementById('page-info').textContent = `${page} / ${pages}`;
  } catch (e) {
    document.getElementById('event-log').innerHTML = '<div class="empty-state">Failed to load events</div>';
  }
}

async function loadSources() {
  try {
    const d = await fetchJSON('/api/sources');
    const sel = document.getElementById('filter-source');
    const current = sel.value;
    sel.innerHTML = '<option value="">All</option>';
    (d.sources || []).forEach(s => {
      const opt = document.createElement('option');
      opt.value = s; opt.textContent = s;
      if (s === current) opt.selected = true;
      sel.appendChild(opt);
    });
  } catch (e) {}
}

// ---------------------------------------------------------------------------
// Event listeners
// ---------------------------------------------------------------------------

document.getElementById('btn-pause').addEventListener('click', togglePause);
document.getElementById('btn-kill').addEventListener('click', async () => {
  if (!currentSession) return;
  const isManager = currentSession === 'moda-manager';
  const msg = isManager
    ? 'Kill the MANAGER session? This stops all orchestration. Are you sure?'
    : `Close session ${currentSession}?`;
  if (!confirm(msg)) return;
  if (isManager && !confirm('This will stop modastack from processing events. Confirm again to proceed.')) return;
  await fetch(`/api/sessions/${currentSession}/kill`, { method: 'POST' });
  closeTerminal();
  loadStatus();
});
document.getElementById('btn-newer').addEventListener('click', () => { offset = Math.max(0, offset - PAGE_SIZE); loadEvents(); });
document.getElementById('btn-older').addEventListener('click', () => { if (offset + PAGE_SIZE < totalEvents) { offset += PAGE_SIZE; loadEvents(); } });
document.getElementById('filter-source').addEventListener('change', () => { offset = 0; loadEvents(); });
document.getElementById('filter-type').addEventListener('input', () => { offset = 0; loadEvents(); });

async function refreshAll() {
  await loadStatus();
  await loadAllWorkflows();
  loadStatus();
  if (currentSession && currentView === 'terminal') loadWorkflowProgress();
}

// Boot: load data then open manager by default
loadSources();
loadEvents();
refreshAll().then(() => {
  if (lastStatus && lastStatus.manager.alive) {
    setTimeout(() => openTerminal('moda-manager'), 500);
  }
});
setInterval(refreshAll, 5000);
setInterval(loadSources, 30000);
</script>
</body>
