<!DOCTYPE html>
<html lang="en" data-accent="blend" data-retro="on">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>bobi setup — reskin (welcome + home)</title>
<style>
  :root {
    --font-sans: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    --font-mono: ui-monospace, "SF Mono", "SFMono-Regular", Menlo, "Cascadia Mono", "Segoe UI Mono", Consolas, "Liberation Mono", monospace;

    /* bobi paper neutrals (from bobi page: paper #FAF7EE, ink #362E25, muted #84725B) */
    --bg:#F3EFE4; --surface:#FBF9F2; --raised:#FFFEF9; --text:#221C15; --muted:#84725B; --faint:#A89E90;
    --border:#E6DFD1; --border-strong:#D8CEBD;

    /* bobi violet is the identity SPOT color — used sparingly regardless of the
       chosen accent: the probe dot, live/gate glints, a touch in the CRT glow. */
    --violet:#6556C8; --violet-bright:#9690F1; --violet-soft:rgba(101,86,200,.12);

    /* dark CRT slab — warm void (clay approach, no violet undertone) */
    --slab-bg:#181310; --slab-surface:#1F1813; --slab-text:#ECE4DA; --slab-muted:#9A8C82; --slab-border:#2A2018;
    --syn-key:#E0A06A; --syn-str:#CBBA8B; --syn-punc:#7E776B; --syn-com:#6E6354;
    --radius:12px; --radius-sm:7px;
    --ok:#177B52; --err:#B5462B;
  }
  /* --spot is the SECONDARY tone (eyebrows, meters, badges, links). In a mono
     theme it matches --accent; in BLEND it diverges so two tones read at once. */
  /* DEFAULT — blend: clay carries structure, violet carries the secondary tone */
  html[data-accent="blend"]{ --accent:#C0632E; --accent-2:#D67B55; --slab-accent:#E0843F; --accent-soft:rgba(192,99,46,.11); --accent-ring:rgba(192,99,46,.30); --spot:#6556C8; --spot-soft:rgba(101,86,200,.12); }
  /* clay-only */
  html[data-accent="clay"]{ --accent:#C0632E; --accent-2:#D67B55; --slab-accent:#E0843F; --accent-soft:rgba(192,99,46,.11); --accent-ring:rgba(192,99,46,.30); --spot:#C0632E; --spot-soft:rgba(192,99,46,.12); }
  /* violet-only */
  html[data-accent="violet"]{ --accent:#6556C8; --accent-2:#7468D6; --slab-accent:#9690F1; --accent-soft:rgba(101,86,200,.10); --accent-ring:rgba(101,86,200,.30); --spot:#6556C8; --spot-soft:rgba(101,86,200,.12); }

  *{box-sizing:border-box;} html,body{height:100%;}
  body{ margin:0; background:radial-gradient(1200px 600px at 80% -10%, #FBF7EF 0%, var(--bg) 55%); color:var(--text); font-family:var(--font-sans); -webkit-font-smoothing:antialiased; font-size:15px; line-height:1.5; }
  html[data-retro="on"] body{ background:radial-gradient(1200px 600px at 80% -10%, #FBF7EF 0%, var(--bg) 55%), repeating-linear-gradient(90deg, rgba(101,86,200,.035) 0 1px, transparent 1px 24px), repeating-linear-gradient(0deg, rgba(101,86,200,.035) 0 1px, transparent 1px 24px); }

  .app{ width:min(1240px,96vw); height:min(780px,92vh); margin:3vh auto; background:var(--surface); border:1px solid var(--border-strong); border-radius:14px; box-shadow:0 1px 0 #fff inset, 0 18px 50px -24px rgba(40,30,16,.35); display:flex; flex-direction:column; overflow:hidden; }
  .titlebar{ height:42px; flex:0 0 42px; display:flex; align-items:center; gap:12px; padding:0 14px; background:linear-gradient(var(--raised),var(--surface)); border-bottom:1px solid var(--border); }
  .tdots{display:flex;gap:7px;} .tdots i{width:11px;height:11px;border-radius:50%;display:block;background:#D9CFC0;} .tdots i:nth-child(1){background:#E0A89A;} .tdots i:nth-child(2){background:#E6CE9C;} .tdots i:nth-child(3){background:#B9D6AE;}
  .addr{ font-family:var(--font-mono); font-size:12px; color:var(--muted); display:flex; align-items:center; gap:7px; }
  .addr .lock{width:11px;height:11px;color:var(--accent);}
  .spacer{flex:1;}
  .accent-switch{display:flex;gap:6px;align-items:center;} .accent-switch span{font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);}
  .sw{width:19px;height:19px;border-radius:50%;border:2px solid transparent;cursor:pointer;box-shadow:0 0 0 1px rgba(0,0,0,.06) inset;}
  .sw.violet{background:#6556C8;} .sw.clay{background:#C8612B;}
  .sw.blend{background:linear-gradient(135deg,#C8612B 0 50%,#6556C8 50% 100%);}
  .sw.sel{border-color:var(--text);}
  .retro-toggle{font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);border:1px solid var(--border-strong);background:var(--raised);padding:4px 9px;border-radius:999px;cursor:pointer;margin-left:14px;display:flex;align-items:center;gap:6px;}
  .retro-toggle .led{width:7px;height:7px;border-radius:50%;background:var(--border-strong);}
  html[data-retro="on"] .retro-toggle{color:var(--text);border-color:var(--accent);} html[data-retro="on"] .retro-toggle .led{background:var(--accent);box-shadow:0 0 6px var(--accent);}

  /* the bobi probe mark on a dark void chip (paper body + dashed orbit + violet probe) */
  .mk{display:grid;place-items:center;border-radius:6px;background:#201A14;}
  .mk svg{display:block;}

  .panes{ flex:1; display:grid; min-height:0; grid-template-columns:216px 1fr; grid-template-rows:minmax(0,1fr); }

  /* RAIL */
  .rail{ background:linear-gradient(var(--surface),#F0EBE0); border-right:1px solid var(--border); padding:20px 14px; display:flex; flex-direction:column; }
  .brand{display:flex;align-items:center;gap:9px;padding:2px 6px 18px;}
  .brand .mk{width:24px;height:24px;}
  .brand .mk svg{width:18px;height:18px;}
  .brand b{font-size:15px;letter-spacing:-.02em;} .brand b span{color:var(--muted);font-weight:500;letter-spacing:0;}
  .counter{font-family:var(--font-mono);font-size:11px;letter-spacing:.14em;color:var(--faint);padding:0 6px 12px;font-variant-numeric:tabular-nums;}
  html[data-retro="on"] .counter::before{content:"// ";}
  .step{display:flex;align-items:center;gap:11px;height:38px;padding:0 8px;border-radius:var(--radius-sm);font-family:var(--font-mono);font-size:11.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);cursor:pointer;}
  .step .dot{width:15px;height:15px;border-radius:50%;flex:0 0 15px;border:1.5px solid var(--border-strong);display:grid;place-items:center;background:var(--raised);}
  .step.done{color:var(--text);} .step.done .dot{background:var(--accent);border-color:var(--accent);} .step.done .dot svg{width:9px;height:9px;color:#fff;}
  .step.current{color:var(--text);background:var(--accent-soft);} .step.current .dot{border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-ring);} .step.current .dot i{width:6px;height:6px;border-radius:50%;background:var(--accent);display:block;}
  .step.todo{color:var(--faint);}
  .step:hover:not(.current){background:rgba(0,0,0,.025);}
  .rail .grow{flex:1;}
  html[data-retro="on"] .rail .grow{ background-image:radial-gradient(1px 1px at 22% 24%,rgba(101,86,200,.5) 50%,transparent),radial-gradient(1px 1px at 64% 52%,rgba(101,86,200,.4) 50%,transparent),radial-gradient(1px 1px at 38% 76%,rgba(101,86,200,.45) 50%,transparent),radial-gradient(1px 1px at 82% 18%,rgba(101,86,200,.35) 50%,transparent),radial-gradient(1px 1px at 88% 66%,rgba(101,86,200,.5) 50%,transparent),radial-gradient(2px 2px at 50% 40%,rgba(101,86,200,.3) 50%,transparent); }
  .hint{font-size:11.5px;color:var(--faint);line-height:1.5;padding:12px 8px 2px;border-top:1px solid var(--border);}
  .hint kbd{font-family:var(--font-mono);font-size:10.5px;background:var(--raised);border:1px solid var(--border-strong);border-bottom-width:2px;border-radius:4px;padding:1px 5px;color:var(--muted);}

  /* generic light node */
  .node{padding:34px 40px;overflow-y:auto;}
  .node.narrow{max-width:680px;}
  .eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--spot);font-weight:600;}
  .node h1{font-size:27px;line-height:1.16;letter-spacing:-.02em;margin:9px 0 8px;font-weight:680;}
  .node .lede{color:var(--muted);max-width:54ch;margin:0 0 22px;font-size:14.5px;}

  /* ---- WELCOME splash ---- */
  .welcome{position:relative;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;overflow:hidden;}
  /* faint constellation dust behind the welcome lockup */
  html[data-retro="on"] .welcome::before{content:"";position:absolute;inset:0;pointer-events:none;background-image:radial-gradient(1px 1px at 18% 30%,rgba(192,99,46,.30) 50%,transparent),radial-gradient(1.5px 1.5px at 72% 22%,rgba(101,86,200,.40) 50%,transparent),radial-gradient(1px 1px at 40% 70%,rgba(192,99,46,.28) 50%,transparent),radial-gradient(1px 1px at 84% 64%,rgba(214,123,85,.32) 50%,transparent),radial-gradient(1.5px 1.5px at 30% 86%,rgba(101,86,200,.32) 50%,transparent);}
  .welcome .lockup{position:relative;display:flex;align-items:center;gap:18px;margin-bottom:8px;}
  .welcome .lockup .mk{width:62px;height:62px;border-radius:16px;}
  .welcome .lockup .mk svg{width:46px;height:46px;}
  .welcome .lockup .word{font-size:58px;font-weight:680;letter-spacing:-.045em;line-height:1;}
  .welcome .tag{position:relative;font-size:18px;color:var(--muted);max-width:40ch;margin:6px 0 4px;}
  .welcome .tag b{color:var(--text);font-weight:600;}
  .welcome .badge{position:relative;display:inline-flex;align-items:center;gap:8px;font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);background:var(--raised);border:1px solid var(--border);border-radius:999px;padding:5px 12px;margin-top:18px;}
  .welcome .badge i{width:7px;height:7px;border-radius:50%;background:var(--spot);box-shadow:0 0 8px var(--spot);}
  .welcome .enter{position:relative;margin-top:30px;display:flex;gap:12px;align-items:center;}
  .welcome .foot{position:absolute;bottom:18px;font-family:var(--font-mono);font-size:11px;color:var(--faint);letter-spacing:.04em;}

  .introtabs{display:flex;gap:8px;margin:4px 0 20px;}
  .itab{font-family:var(--font-mono);font-size:12px;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 16px;cursor:pointer;}
  .itab.on{color:#fff;background:var(--accent);border-color:var(--accent);}
  .ifield{display:flex;flex-direction:column;gap:5px;margin-bottom:15px;}
  .ifield span{font-family:var(--font-mono);font-size:11px;color:var(--muted);letter-spacing:.02em;}
  .ifield input{font-family:var(--font-mono);font-size:13px;border:1px solid var(--border-strong);border-radius:8px;padding:10px 12px;background:var(--raised);}
  .ifield input:focus{outline:none;border-color:var(--accent);}

  .btn{font-family:var(--font-sans);font-size:14px;font-weight:560;padding:10px 18px;border-radius:9px;border:1px solid transparent;cursor:pointer;}
  .btn.primary{background:var(--accent);color:#fff;box-shadow:0 2px 8px -3px var(--accent);} .btn.primary:hover{background:var(--accent-2);}
  .btn.ghost{background:transparent;color:var(--muted);border-color:var(--border-strong);} .btn.ghost:hover{color:var(--text);background:var(--raised);}
  .btn.big{font-size:15px;padding:13px 26px;}
  .actions{display:flex;align-items:center;gap:12px;margin-top:26px;}
  .actions .note{margin-left:auto;font-size:12px;color:var(--faint);font-family:var(--font-mono);}

  /* cards */
  .cardgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:6px;}
  .pcard{border:1px solid var(--border);background:var(--raised);border-radius:var(--radius);padding:16px;cursor:pointer;transition:border-color .15s, box-shadow .15s;}
  .pcard:hover{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
  .pcard.sel{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
  .pcard .pt{font-weight:620;font-size:15px;margin-bottom:3px;}
  .pcard .pd{font-size:12.5px;color:var(--muted);line-height:1.45;}
  .pcard .roles{margin-top:10px;display:flex;gap:6px;flex-wrap:wrap;}
  .pcard .roles b{font-family:var(--font-mono);font-size:10.5px;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:2px 6px;font-weight:500;}
  .pcard.blank{display:flex;flex-direction:column;justify-content:center;align-items:flex-start;border-style:dashed;}
  .pcard.blank .plus{font-family:var(--font-mono);font-size:18px;color:var(--accent);margin-bottom:4px;}

  /* ---- HOMEPAGE: design chat (left) + team materializing (right) ---- */
  .home{display:grid;grid-template-columns:1fr 360px;min-height:0;height:100%;}
  .uni-chat{display:flex;flex-direction:column;min-width:0;min-height:0;}
  .uni-chat .sketch-top{display:flex;align-items:center;justify-content:space-between;padding:16px 28px 0;}
  .uni-chat .sketch-eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);}
  .uni-chat .ch-body{flex:1;overflow-y:auto;padding:24px 28px 8px;display:flex;flex-direction:column;gap:14px;}
  .msg{font-size:14px;line-height:1.5;max-width:82%;padding:10px 13px;border-radius:12px;}
  .msg.you{align-self:flex-end;background:var(--accent-soft);border:1px solid var(--accent-ring);color:var(--text);}
  .msg.bob{align-self:flex-start;background:var(--raised);border:1px solid var(--border);color:var(--text);}
  .msg.bob b{color:var(--text);}
  .chips{display:flex;flex-wrap:wrap;gap:8px;padding:2px 28px 8px;}
  .chip{font-family:var(--font-mono);font-size:11.5px;color:var(--muted);background:var(--raised);border:1px solid var(--border);border-radius:999px;padding:5px 11px;cursor:pointer;}
  .chip:hover{border-color:var(--border-strong);color:var(--text);}
  .ch-input{padding:6px 28px 22px;display:flex;gap:8px;align-items:flex-end;}
  .ch-input textarea{flex:1;font-family:var(--font-sans);font-size:14.5px;line-height:1.4;padding:13px 15px;border-radius:10px;border:1px solid var(--border-strong);background:var(--raised);resize:none;}
  .ch-input textarea:focus{outline:none;border-color:var(--accent);}

  .uni-panel{display:flex;flex-direction:column;min-width:0;min-height:0;background:linear-gradient(var(--surface),#F0EBE0);border-left:1px solid var(--border);}
  .uni-head{flex:0 0 auto;display:flex;align-items:baseline;justify-content:space-between;padding:18px 20px 12px;border-bottom:1px solid var(--border);}
  .up-title{font-family:var(--font-mono);font-size:12.5px;color:var(--text);font-weight:620;letter-spacing:.02em;}
  .up-title::after{content:"✎";margin-left:7px;font-size:11px;color:var(--faint);}
  .up-meter{font-family:var(--font-mono);font-size:11px;color:var(--spot);}
  .uni-cards{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;}
  .ucard{border:1px solid var(--border);background:var(--raised);border-radius:var(--radius);padding:14px;}
  .ucard.empty{opacity:.62;border-style:dashed;background:transparent;}
  .ucard .ut{display:flex;align-items:center;gap:8px;font-weight:620;font-size:13px;margin-bottom:7px;}
  .ucard .ud{font-size:13px;color:var(--text);line-height:1.45;}
  .ucard .ud .ph{color:var(--faint);font-style:italic;}
  .udot{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;border:1.5px solid var(--border-strong);}
  .udot svg{width:10px;height:10px;color:#fff;}
  .udot.ok{background:var(--ok);border-color:var(--ok);}
  .udot.thin{border-color:var(--accent);background:var(--accent-soft);}
  .udot.empty{border-style:dashed;}
  .urole{display:flex;flex-direction:column;gap:1px;margin-bottom:7px;}
  .urole:last-child{margin-bottom:0;}
  .urole b{font-size:12.5px;}
  .urole span{font-size:11.5px;color:var(--muted);line-height:1.4;}
  .udot.thin{border-color:var(--spot);background:var(--spot-soft);}
  .uconn{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:3px 0;font-size:12.5px;}
  .cbadge{font-family:var(--font-mono);font-size:10.5px;color:var(--muted);}
  .cbadge.ok{color:var(--ok);}
  .uni-foot{flex:0 0 auto;padding:14px 16px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px;}
  .uni-foot .btn{width:100%;justify-content:center;}
  .uni-note{font-family:var(--font-mono);font-size:10.5px;color:var(--faint);text-align:center;}

  .legend{width:min(1240px,96vw);margin:0 auto 30px;padding:0 4px;font-family:var(--font-mono);font-size:11px;color:var(--faint);display:flex;gap:18px;flex-wrap:wrap;}
  .switcher{width:min(1240px,96vw);margin:12px auto 6px;display:flex;gap:8px;}
  .switcher button{font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);background:var(--surface);border:1px solid var(--border-strong);border-radius:8px;padding:7px 14px;cursor:pointer;}
  .switcher button.on{color:#fff;background:var(--accent);border-color:var(--accent);}
</style>
</head>
<body>
  <div class="switcher">
    <button class="on" data-view="welcome">Welcome</button>
    <button data-view="home">Homepage</button>
  </div>

  <div class="app">
    <div class="titlebar">
      <div class="tdots"><i></i><i></i><i></i></div>
      <div class="addr"><svg class="lock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>127.0.0.1:8765 / setup</div>
      <div class="spacer"></div>
      <div class="accent-switch"><span>accent</span><button class="sw blend sel" data-set="blend"></button><button class="sw clay" data-set="clay"></button><button class="sw violet" data-set="violet"></button></div>
      <button class="retro-toggle" id="retro"><span class="led"></span>retro</button>
    </div>
    <div id="frame"></div>
  </div>

  <div class="legend"><span>bobi probe mark + violet accent on the warm terminal chrome</span><span>violet/clay · retro toggles top-right</span><span>tab Welcome / Homepage above</span></div>

<script>
  // bobi probe mark — paper body + dashed orbit + violet probe dot
  function probe(size, dot){
    // The raw mark is bottom-left weighted (orbit centered at 14,18). Wrap in a
    // group shifted by (+2,-2) so the whole figure's bbox centers in the 32×32 box.
    return `<svg viewBox="0 0 32 32" width="${size}" height="${size}" aria-hidden>
      <g transform="translate(2,-2)">
        <circle cx="14" cy="18" r="6" fill="#FAF7EE"/>
        <circle cx="14" cy="18" r="12.5" fill="none" stroke="#FAF7EE" stroke-width="1.2" stroke-dasharray="2 4" opacity="0.6"/>
        <circle cx="23.5" cy="9.5" r="3" fill="${dot||'#9690F1'}"/>
      </g>
    </svg>`;
  }
  const check = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.4"><path d="M5 12l5 5L19 7"/></svg>';

  function railHTML(current){
    const STEPS = [
      {id:'design', label:'Design'},
      {id:'connect', label:'Connect'},
      {id:'build', label:'Build'},
      {id:'review', label:'Review'},
      {id:'install', label:'Install'},
      {id:'done', label:'Done'},
    ];
    const i = STEPS.findIndex(s=>s.id===current);
    const counter = String(i+1).padStart(2,'0')+' / '+String(STEPS.length).padStart(2,'0');
    const steps = STEPS.map((s,idx)=>{
      const cls = idx<i?'done':idx===i?'current':'todo';
      const dot = idx<i?'<span class="dot">'+check+'</span>':idx===i?'<span class="dot"><i></i></span>':'<span class="dot"></span>';
      return `<div class="step ${cls}">${dot}${s.label}</div>`;
    }).join('');
    return `<aside class="rail">
      <div class="brand"><span class="mk">${probe(18)}</span><b>bobi <span>setup</span></b></div>
      <div class="counter">${counter}</div>
      <div>${steps}</div>
      <div class="grow"></div>
      <div class="hint">Building <b style="color:var(--muted)">eng-team</b> locally. Nothing leaves this machine. <kbd>↵</kbd> to continue.</div>
    </aside>`;
  }

  const VIEWS = {
    // WELCOME — first screen the user lands on (full-bleed, no rail)
    welcome: ()=>`<div class="panes" style="grid-template-columns:1fr;">
      <main class="welcome">
        <div class="lockup">
          <span class="mk">${probe(46)}</span>
          <span class="word">bobi</span>
        </div>
        <p class="tag">A team of agents on your events, running your work in real time — <b>with guardrails written into the workflow.</b></p>
        <span class="badge"><i></i>Open source · MIT · runs entirely on this machine</span>
        <div class="enter">
          <button class="btn primary big" data-view="home">Start a team →</button>
          <button class="btn ghost big" data-view="home">Open an existing one</button>
        </div>
        <span class="foot">Moda Labs · bobi setup</span>
      </main>
    </div>`,

    // HOMEPAGE — the working screen: rail + design chat + team materializing
    home: ()=>`<div class="panes">
      ${railHTML('design')}
      <main class="home">
        <section class="uni-chat">
          <div class="sketch-top"><span class="sketch-eyebrow">Design · talk it through</span><button class="btn ghost" style="padding:6px 12px;font-size:13px;" data-view="welcome">↩ Welcome</button></div>
          <div class="ch-body">
            <div class="msg bob">Hi — I'm bobi. Tell me what you want this team to do, in your own words. Rough is fine; we'll sharpen it together.</div>
            <div class="msg you">watch our github and figure out who should handle each issue</div>
            <div class="msg bob">Got it — a team that <b>triages incoming GitHub issues and routes each to the right engineer</b>. Who picks up the work: a couple of engineers, or one generalist?</div>
            <div class="msg you">a couple engineers, and keep everyone posted in slack</div>
            <div class="msg bob">Nice — I'll wire Slack in too. The team's taking shape on the right. Tell me more, or hit build when it looks right.</div>
          </div>
          <div class="chips"><span class="chip">+ also handle PR reviews</span><span class="chip">+ post a daily summary</span><span class="chip">+ escalate blockers</span></div>
          <div class="ch-input"><textarea rows="1" placeholder="Tell bobi what you want to build…"></textarea><button class="btn primary" style="padding:11px 14px">↑</button></div>
        </section>

        <aside class="uni-panel">
          <div class="uni-head"><span class="up-title">eng-team</span><span class="up-meter">3 roles · 2 tools</span></div>
          <div class="uni-cards">
            <div class="ucard">
              <div class="ut"><span class="udot ok">${check}</span>Roles</div>
              <div class="urole"><b>director</b><span>Triages issues, routes each to an engineer.</span></div>
              <div class="urole"><b>engineer</b><span>Picks up assigned work, opens PRs.</span></div>
              <div class="urole"><b>engineer</b><span>Second pair of hands on the queue.</span></div>
            </div>
            <div class="ucard">
              <div class="ut"><span class="udot thin"></span>Tools</div>
              <div class="uconn"><span>GitHub</span><span class="cbadge ok">connected</span></div>
              <div class="uconn"><span>Slack</span><span class="cbadge">needs key</span></div>
            </div>
            <div class="ucard empty">
              <div class="ut"><span class="udot empty"></span>Workflows</div>
              <div class="ud"><span class="ph">issue-lifecycle materializing…</span></div>
            </div>
          </div>
          <div class="uni-foot">
            <button class="btn primary" data-view="home">Build this team →</button>
            <span class="uni-note">// nothing is written until you build</span>
          </div>
        </aside>
      </main>
    </div>`,
  };

  let view = 'welcome';
  function render(){ document.getElementById('frame').innerHTML = VIEWS[view](); }

  document.addEventListener('click', e=>{
    const v = e.target.closest('[data-view]');
    if(v){ view = v.dataset.view; document.querySelectorAll('.switcher button').forEach(b=>b.classList.toggle('on', b.dataset.view===view)); render(); return; }
    const sw = e.target.closest('.sw');
    if(sw){ document.documentElement.dataset.accent=sw.dataset.set; document.querySelectorAll('.sw').forEach(x=>x.classList.remove('sel')); sw.classList.add('sel'); return; }
    if(e.target.closest('#retro')){ const h=document.documentElement; h.dataset.retro = h.dataset.retro==='on'?'off':'on'; }
  });
  render();
</script>
</body>
</html>
