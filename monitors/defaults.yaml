# Built-in monitor defaults — shipped with modastack.
#
# READ-ONLY at runtime. The manager never writes here.
# Domain-specific monitors belong in your repo's .modastack/monitors.yaml.
#
# Each monitor:
#   name        unique identifier (used for override/disable across tiers)
#   description human-readable statement of what to check
#   interval    how often to run (e.g. 5m, 15m, 1h, 2d)
#   event       synthetic event type injected when the condition is met
#   check       (optional) native check runner; omit for manager-interpreted
#   enabled     (optional) set false to disable an inherited monitor
monitors: []
