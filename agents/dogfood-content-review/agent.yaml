version: "1.2.0"

entry_point: manager
chat: slack

# Baked CLI tools from the framework catalog (#416). `venn` provides the
# `venn` CLI the new-emails monitor shells out to (tools execute -s gmail …);
# compose expands this into the `requires:` + `build:` that install venn-cli
# into the team image and ships a `tools/venn.md` guide — one pinned
# definition, reused across teams. The VENN_API_KEY credential stays declared
# below; the catalog entry only provides the binary, not the secret.
tool_library: [venn]

# Cloud event server URL in production (.env), empty for an
# auto-started local server (CI smoke tests, local dev).
event_server: ${BOBI_EVENT_SERVER}

# GitHub events arrive via webhooks (native adapter auto-detects the
# repo). Email has no webhook adapter — the new-emails monitor polls
# Gmail and injects email/received events. The events: true flag on
# email ensures the CLI subscribes to monitor event topics.
services:
  - name: github
    events: true
    required: true          # core service — block startup if unconfigured
  # email/venn is optional: dogfood-content-review polls Gmail for email
  # events, but a missing Venn credential degrades gracefully — email events
  # just don't arrive until Venn is connected — rather than bricking
  # `bobi agent <name> start`. This keeps the credential-free dogfood/release smoke
  # able to start with GitHub alone (per human review on #329 / PR #405,
  # Zach 2026-06-22).
  - name: email
    events: true
    required: false         # optional — degrades gracefully if Venn unconfigured

task_tracking:
  system: github-issues
  project: PLAYBOOK
  trigger_labels:
    - agent
    - content
    - research
  skip_labels:
    - blocked
    - human-only

verify:
  review_required: true
  auto_merge: false

context:
  content_dirs: "workspace/guides/ workspace/runbooks/ workspace/research/"
  style_guide: "Clear, concise, actionable. Write for practitioners, not academics."

venn_api_key: ${VENN_API_KEY}

monitors:
  - name: new-emails
    command: 'venn --json tools execute -s gmail -t list_emails -a ''{"userId": "me", "maxResults": 10, "q": "is:unread"}'''
    interval: 5m
    event: email/received
