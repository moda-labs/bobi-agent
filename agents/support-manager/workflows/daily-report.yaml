name: daily-report
trigger: >
  On the daily cadence (the daily-report monitor) or on request — "post
  the support report", "what happened today".
description: >
  Compile the day's triaged signals (real and not-real) from the support
  log and post a grouped report to the support channel.

steps:
  - name: report
    agent: support_manager
    prompt: |
      Follow the daily-report section of your role prompt. Read today's
      workspace/log/<today>.md (and yesterday's tail if the window spans
      midnight). Group into real issues filed and dismissed (not real),
      post the report to the support channel per tools/slack.md (counts
      headline, the two groups, one watching line), and log a report::
      entry. If the log is empty, post the one-line "no signals" note.
    handoff:
      required: [report_posted]
    timeout: 900
