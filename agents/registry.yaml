agents:
  eng-team:
    version: "1.1.0"
    description: "Portable engineering org — director, project leads, engineers; GitHub + Slack with tool-agnostic seams. Derive a house team with `from: eng-team`."
  dogfood-content-review:
    version: "1.2.0"
    description: "Knowledge base management — manager, researcher, editor, fact-checker coordinate to produce and verify documentation"
  personal-assistant:
    version: "1.0.0"
    description: "Personal assistant — one agent manages email, calendar, and to-dos via Venn (Gmail + Google Calendar), posts a daily briefing, and acts within a customizable autonomy line. Customize who-you-are and how-you-like-things in workspace/assistant-context.md."
