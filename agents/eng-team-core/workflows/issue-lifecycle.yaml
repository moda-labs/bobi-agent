name: issue-lifecycle
trigger: When an issue is assigned and requires code changes.
description: >
  Full engineering lifecycle for code changes: worktree setup, triage
  complexity, optional spec phase with approval gate, implement with
  tests, open PR, and QA for frontend features. Use for any assigned
  issue that requires code.

steps:
  - name: setup
    agent: engineer
    prompt: |
      Create a git worktree for this issue and set up the workspace.
      Read the issue to understand the full context.
    handoff:
      required: [worktree]
    timeout: 300

  - name: pickup
    agent: engineer
    prompt: |
      Move the issue to In Progress status.
      Follow the Pickup Phase instructions in your role prompt:
      explore the codebase, classify complexity, write the handoff.
    handoff:
      required: [complexity, needs_spec]
      optional: [blocked_by, notes, has_frontend]
    timeout: 1800

  - name: notify_start
    notify: slack
    message: "Working on #${{input.run_key}}: ${{input.task}}"

  - name: route
    if: "needs_spec == true"
    goto: spec
    else: implement

  - name: spec
    agent: engineer
    prompt: |
      Follow the Spec Phase instructions in your role prompt.
      Write the implementation spec, review it, publish to the issue.
      Do NOT proceed to implementation — stop after the spec is written.
    handoff:
      required: [spec_url]
    timeout: 3000

  - name: plan_review
    agent: engineer
    prompt: |
      Get an independent adversarial review of the spec you just wrote, using
      your adversarial review gate (the binding in your role prompt). This is a
      one-shot second opinion — NOT agent delegation; you remain the author.

      1. Read the spec you published to the issue (spec_url from the previous
         step).
      2. Run your adversarial review gate, asking it to attack the plan:
         unhandled edge cases, wrong assumptions, missing tests, simpler
         alternatives, scope it gets wrong.
      3. Write the reviewer's verbatim critique into the `review_critique`
         handoff field, plus a one-line `review_verdict` (e.g. "no blockers" /
         "blockers: ..."). Do NOT edit the spec here — the human decides at
         the approval gate.
    handoff:
      required: [review_critique, review_verdict]
    timeout: 600

  - name: await_approval
    await: approval
    timeout: 86400

  - name: implement
    agent: engineer
    prompt: |
      Follow the Implement Phase instructions in your role prompt.
      Build the feature with TDD — write tests first, then implement.
    handoff:
      required: [status]
    timeout: 3600

  - name: pr
    agent: engineer
    prompt: |
      Follow the Prepare-PR Phase instructions in your role prompt.
      Create the pull request, link it to the issue, move ticket to In Review.
    handoff:
      required: [pr_url]
    timeout: 1800

  - name: qa
    agent: engineer
    prompt: |
      Follow the QA Phase instructions in your role prompt.
      If this project has a web frontend, run QA on the preview deployment.
      If no frontend exists, report qa_status as 'not_applicable' and skip.
    handoff:
      required: [qa_status]
      optional: [qa_findings]
    timeout: 1800

  - name: notify_complete
    notify: slack
    message: "Completed #${{input.run_key}}: ${{input.task}} — PR ${{pr.pr_url}} merged"
