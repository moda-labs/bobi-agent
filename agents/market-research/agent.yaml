version: "1.0.0"

# Entry point role for `modastack start`
entry_point: research_manager
chat: slack

# Cloud event server URL in production (.env), empty for an
# auto-started local server.
event_server: ${MODASTACK_EVENT_SERVER}

# The manager talks to humans on Slack and receives research-request
# tickets from Linear. Weekly cadence and RSS polling are handled by
# monitors (see monitors/defaults.yaml), not event sources.
services:
  - name: slack
    events: true
  - name: linear
    events: true

slack:
  bot_token: ${SLACK_BOT_TOKEN}

linear:
  api_key: ${LINEAR_API_KEY}
