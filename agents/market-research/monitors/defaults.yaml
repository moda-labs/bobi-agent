# Background monitors for the market-research pack.
#
# Neither has a native `check:` runner, so each is evaluated by a
# short-lived check agent that reads the description and posts its event.
# Override or disable in your repo's .modastack/monitors.yaml.
#
# Note: intervals support s/m/h/d only — there is no week unit, so the
# weekly cadence is expressed as 7d.
monitors:
  # Unconditional weekly tick. The check agent's job here is simply to
  # emit the event every cycle so the manager runs the landscape scan;
  # this is a cron, not a conditional check.
  - name: weekly-landscape
    description: >
      It is the weekly research cadence. Always emit the weekly-landscape
      event to trigger the content-landscape scan. This is an unconditional
      weekly tick — do not evaluate whether anything changed; just fire so
      the research manager launches the weekly-landscape workflow and posts
      the digest to Slack.
    interval: 7d
    event: monitor/research.weekly_landscape

  # Polling approximation of an RSS trigger (no native RSS event source).
  # Fetches the feeds listed in research/feeds.txt and surfaces genuinely
  # new items relevant to the watched topics.
  - name: rss-watch
    description: >
      Read the feed URLs in research/feeds.txt, fetch each, and identify
      items published since the last check that are relevant to the watched
      topics in research/moda-context.md. Emit the event only for genuinely
      new, on-topic items (include the item title and URL). Ignore anything
      already seen or off-topic. If feeds.txt is empty or only comments,
      emit nothing.
    interval: 2h
    event: monitor/research.rss_item
