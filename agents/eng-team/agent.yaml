version: "1.1.0"

entry_point: director
chat: slack
max_concurrent_agents: 4

# Cloud event server URL in production (.env), empty for an
# auto-started local server.
event_server: ${MODASTACK_EVENT_SERVER}

services:
  - name: github
    events: true
    required: true          # core service — block startup if unconfigured
    credentials:
      # The gh CLI auths via GH_TOKEN. Declared here (not just consumed at
      # runtime) so it's a first-class secret: materialized on deploy and never
      # pruned by the secrets reconcile (#385).
      token: ${GH_TOKEN}
  - name: slack
    events: true
    required: true          # core service — block startup if unconfigured
    # Optional: comma-separated channel IDs to scope this team to specific
    # channels (so multiple teams can share one bot). Empty = whole workspace.
    channels: ${SLACK_CHANNELS}
    credentials:
      bot_token: ${SLACK_BOT_TOKEN}
  - name: linear
    events: true
    required: true          # core service — block startup if unconfigured
    credentials:
      api_key: ${LINEAR_API_KEY}

# Host-level dependencies. Checked by `modastack doctor` and enforced
# at dispatch time — agents cannot launch if a required dep is broken.
requires:
  - name: gstack
    why: "QA, browse, ship, and review skills used throughout the eng lifecycle"
    check: "test -e ~/.claude/skills/browse/SKILL.md && test -x ~/.claude/skills/gstack/browse/dist/browse"
    fix: "git clone https://github.com/garrytan/gstack ~/dev/gstack && cd ~/dev/gstack && git checkout a861c00cfac6e2376d26c7d3ba5207cdc5aefc49 && ./setup"
  - name: codex
    why: "Codex-as-a-tool for adversarial reviews and second-opinion analysis (MDS-42 UC3)"
    check: "command -v codex >/dev/null 2>&1 && { test -n \"${OPENAI_API_KEY:-}\" || codex --version >/dev/null 2>&1; }"
    fix: "npm install -g @openai/codex@0.141.0 && (codex auth login || echo 'Set OPENAI_API_KEY in .modastack/.env')"
  - name: gh
    why: "GitHub CLI — the primary interface for issues, PRs, and CI status (tools/github.md). Auth via GH_TOKEN."
    check: "command -v gh >/dev/null 2>&1 && gh --version >/dev/null 2>&1"
    fix: "see https://cli.github.com/manual/installation (apt repo or binary); authenticate by setting GH_TOKEN in .modastack/.env"

# Container build (C24 team-flavored images): bake the host tools the `requires`
# gate above demands into a per-team image, so a dark Fly instance can actually
# dispatch (the bare base ships no Node, and a container has no TTY to run
# `requires.fix` interactively). CI renders this to a Docker hook layer that sits
# BELOW the framework wheel — a code-only release rebuilds only the wheel, not
# these tools (modastack/build_render.py). `apt`/`npm` install as root; `run`
# steps install as the modastack user into the IMAGE home (/home/modastack, the
# same HOME the agent uses at runtime — so ~-relative tools like gstack's
# ~/.claude/skills are read in place, nothing seeded onto the volume). `verify:
# requires` re-runs the checks above at build, failing CI if a tool is missing.
#
# REPRODUCIBILITY (#380): npm/gstack/playwright are PINNED to exact versions so
# two builds of the same commit produce identical layers, and an upstream bump is
# a deliberate one-line diff. team_deps_hash keys on this spec TEXT, so bumping a
# pin moves the image identity (and rebuilds) — and nothing else does. Refresh a
# pin with `npm view <pkg> version` / `git ls-remote …/gstack HEAD`. apt (nodejs/
# jq) isn't pinned: exact Debian versions get pruned from the mirror (breaking
# rebuilds); it tracks the pinned base image's Debian trixie instead.
build:
  # jq pairs with gh for JSON wrangling; nodejs/npm power codex/bun/gstack.
  apt: [nodejs, npm, jq]
  # Global npm installs land in /usr/local/bin — on PATH at build AND runtime,
  # outside HOME (no volume-seed needed). `bun` is gstack's `./setup` runtime.
  # Pinned (#380) — bump deliberately.
  npm: ["@openai/codex@0.141.0", "bun@1.3.14"]
  # Root steps apt can't express:
  #  - Playwright Chromium needs ~30 system libs; let Playwright resolve them for
  #    the running Debian (avoids hand-listing t64 names) before gstack ./setup.
  #    Pinned to playwright@1.61.0 (#380) so the resolved lib set is stable.
  #  - the GitHub CLI (`gh`) isn't in Debian apt — add its official repo. `gh` is
  #    the eng workflow's primary GitHub interface; it auths via GH_TOKEN at run.
  run_root:
    - "npx --yes playwright@1.61.0 install-deps chromium"
    - >-
      mkdir -p -m 755 /etc/apt/keyrings &&
      curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg
      -o /etc/apt/keyrings/githubcli-archive-keyring.gpg &&
      chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg &&
      echo "deb [arch=$(dpkg --print-architecture)
      signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg]
      https://cli.github.com/packages stable main"
      > /etc/apt/sources.list.d/github-cli.list &&
      apt-get update && apt-get install -y --no-install-recommends gh &&
      rm -rf /var/lib/apt/lists/*
  run:
    # Pinned to a gstack commit SHA (#380) — bump deliberately via `git ls-remote
    # https://github.com/garrytan/gstack HEAD`.
    - "git clone https://github.com/garrytan/gstack ~/dev/gstack && cd ~/dev/gstack && git checkout a861c00cfac6e2376d26c7d3ba5207cdc5aefc49 && ./setup"
  verify: requires

# Deterministic event→workflow routing. These rules fire BEFORE the
# manager LLM sees the event, guaranteeing the workflow is launched
# regardless of prompt compliance.
auto_dispatch:
  # Suppress reviewer assignments — they're informational, not feedback.
  # Without this rule the event reaches the project lead un-annotated
  # and the LLM incorrectly dispatches pr-feedback.
  - event: github.pull_request
    match:
      action: review_requested
    suppress: true

  - event: github.pull_request_review
    match:
      review_state: changes_requested
    workflow: pr-feedback
    cooldown: 1800

  - event: github.pull_request_review_comment
    workflow: pr-feedback
    cooldown: 1800

  - event: github.issue_comment
    match:
      is_pull_request: true
    workflow: pr-feedback
    cooldown: 1800

  - event: github.issues.assigned
    workflow: issue-lifecycle
    cooldown: 1800

  - event: github.pull_request
    match:
      action: closed
    workflow: pr-closed
    cooldown: 60
