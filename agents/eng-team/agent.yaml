version: "1.1.4"

entry_point: director
chat: slack
max_concurrent_agents: 8

# Cloud event server URL in production (.env); optional - unset means an
# auto-started local server.
event_server: ${BOBI_EVENT_SERVER:-}

services:
  - name: github
    events: true
    required: true          # core service — block startup if unconfigured
    credentials:
      # The gh CLI auths via GH_TOKEN. Declared here (not just consumed at
      # runtime) so it's a first-class secret: materialized on deploy and never
      # pruned by the secrets reconcile (#385).
      token: ${GH_TOKEN}
  - name: slack
    events: true
    required: true          # core service — block startup if unconfigured
    # Optional: comma-separated channel IDs to scope this team to specific
    # channels (so multiple teams can share one bot). Empty = whole workspace.
    channels: ${SLACK_CHANNELS}
    credentials:
      bot_token: ${SLACK_BOT_TOKEN}
      # App signing secret. Registered with the event server so it can verify
      # THIS app's inbound events by api_app_id — required for several bots to
      # share one workspace (each app signs with its own secret).
      signing_secret: ${SLACK_SIGNING_SECRET}

# Host-level dependencies. Checked by `bobi agent <name> doctor` and enforced
# at dispatch time — agents cannot launch if a required dep is broken.
# Core requires only the GitHub CLI (its default tracker interface); an
# overlay appends its own toolchain (review/QA/codegen) via list-merge.
requires:
  - name: gh
    why: "GitHub CLI — the primary interface for issues, PRs, and CI status (tools/github.md). Auth via GH_TOKEN."
    check: "command -v gh >/dev/null 2>&1 && gh --version >/dev/null 2>&1"
    fix: "see https://cli.github.com/manual/installation (apt repo or binary); authenticate by setting GH_TOKEN in run/.env"

# Container build (C24 team-flavored images): bake the host tools the `requires`
# gate above demands into a per-team image, so a dark Fly instance can actually
# dispatch (a container has no TTY to run `requires.fix` interactively). CI
# renders this to a Docker hook layer that sits BELOW the framework wheel — a
# code-only release rebuilds only the wheel, not these tools
# (bobi/build_render.py). `apt` installs as root; `verify: requires` re-runs the
# checks above at build, failing CI if a tool is missing.
#
# Core bakes only `jq` (+ the GitHub CLI below); the base image already ships
# git, claude, and codex (the Codex CLI is a Node-free static binary, #428/#573),
# so no nodejs/npm is needed here. apt versions aren't pinned: exact Debian
# versions get pruned from the mirror (breaking rebuilds), so this tracks the
# pinned base image's Debian instead. An overlay that genuinely needs an npm/node
# toolchain declares nodejs/npm in its OWN `build.apt` (list-merged on top),
# rather than every eng-derived team carrying Node it never uses.
build:
  apt: [jq]  # pairs with gh for JSON wrangling
  run_root:
    # The GitHub CLI (`gh`) isn't in Debian apt — add its official repo. `gh` is
    # the core eng workflow's primary GitHub interface; it auths via GH_TOKEN.
    - >-
      mkdir -p -m 755 /etc/apt/keyrings &&
      curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg
      -o /etc/apt/keyrings/githubcli-archive-keyring.gpg &&
      chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg &&
      echo "deb [arch=$(dpkg --print-architecture)
      signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg]
      https://cli.github.com/packages stable main"
      > /etc/apt/sources.list.d/github-cli.list &&
      apt-get update && apt-get install -y --no-install-recommends gh &&
      rm -rf /var/lib/apt/lists/*
  # Re-run the `requires` checks at build time. Because `requires` is itself
  # merged across layers (#451 §3.2), this validates the COMPOSED required set
  # (core + overlay) with no extra wiring.
  verify: requires

# Deterministic event→workflow routing. These rules fire BEFORE the
# manager LLM sees the event, guaranteeing the workflow is launched
# regardless of prompt compliance. The whole mechanism is generic.
auto_dispatch:
  # Suppress reviewer assignments — they're informational, not feedback.
  # Without this rule the event reaches the director un-annotated
  # and the LLM incorrectly dispatches pr-feedback.
  # allow_self_authored: this rule annotates the event regardless of who
  # requested the review, so don't let the default self-author skip swallow it.
  - event: github.pull_request
    match:
      action: review_requested
    suppress: true
    allow_self_authored: true

  # pr-feedback guards (issue #411): the bot's OWN comments are skipped by
  # DEFAULT (no flag needed — the lead posts a "Rendered spec" link per spec
  # policy that must not spin up a feedback engineer). Draft PRs are NOT
  # skipped — a held draft is exactly where feedback discussion belongs, and
  # the self-author skip already stops the only loop that matters (per review,
  # underminedsk 2026-06-22). The self-author skip needs the bot's GitHub
  # login, resolved at startup via `gh api user`.
  - event: github.pull_request_review
    match:
      review_state: changes_requested
    workflow: pr-feedback
    cooldown: 1800

  - event: github.pull_request_review_comment
    workflow: pr-feedback
    cooldown: 1800
    skip_question_only: true

  - event: github.issue_comment
    match:
      is_pull_request: true
    workflow: pr-feedback
    cooldown: 1800
    skip_question_only: true

  # issue-lifecycle / pr-closed legitimately react to the bot's OWN actions
  # (the bot self-assigns issues to start work; the bot merges PRs and that
  # close must still trigger worktree cleanup), so they opt back in.
  - event: github.issues.assigned
    workflow: issue-lifecycle
    cooldown: 1800
    allow_self_authored: true

  - event: github.pull_request
    match:
      action: closed
    workflow: pr-closed
    cooldown: 60
    allow_self_authored: true
