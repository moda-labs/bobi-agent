version: "1.1.0"

entry_point: director
chat: slack

# Cloud event server URL in production (.env), empty for an
# auto-started local server.
event_server: ${MODASTACK_EVENT_SERVER}

services:
  - name: github
    events: true
  - name: slack
    events: true
    # Optional: comma-separated channel IDs to scope this team to specific
    # channels (so multiple teams can share one bot). Empty = whole workspace.
    channels: ${SLACK_CHANNELS}
    credentials:
      bot_token: ${SLACK_BOT_TOKEN}
  - name: linear
    events: true
    credentials:
      api_key: ${LINEAR_API_KEY}

# Host-level dependencies. Checked by `modastack doctor` and enforced
# at dispatch time — agents cannot launch if a required dep is broken.
requires:
  - name: gstack
    why: "QA, browse, ship, and review skills used throughout the eng lifecycle"
    check: "test -e ~/.claude/skills/browse/SKILL.md && test -x ~/.claude/skills/gstack/browse/dist/browse"
    fix: "git clone https://github.com/garrytan/gstack ~/dev/gstack && cd ~/dev/gstack && ./setup"
  - name: codex
    why: "Codex-as-a-tool for adversarial reviews and second-opinion analysis (MDS-42 UC3)"
    check: "command -v codex >/dev/null 2>&1 && { test -n \"${OPENAI_API_KEY:-}\" || codex --version >/dev/null 2>&1; }"
    fix: "npm install -g @openai/codex && (codex auth login || echo 'Set OPENAI_API_KEY in .modastack/.env')"

# Deterministic event→workflow routing. These rules fire BEFORE the
# manager LLM sees the event, guaranteeing the workflow is launched
# regardless of prompt compliance.
auto_dispatch:
  # Suppress reviewer assignments — they're informational, not feedback.
  # Without this rule the event reaches the project lead un-annotated
  # and the LLM incorrectly dispatches pr-feedback.
  - event: github.pull_request
    match:
      action: review_requested
    suppress: true

  - event: github.pull_request_review
    match:
      review_state: changes_requested
    workflow: pr-feedback
    cooldown: 1800

  - event: github.pull_request_review_comment
    workflow: pr-feedback
    cooldown: 1800

  - event: github.issue_comment
    match:
      is_pull_request: true
    workflow: pr-feedback
    cooldown: 1800

  - event: github.issues.assigned
    workflow: issue-lifecycle
    cooldown: 1800

  - event: github.pull_request
    match:
      action: closed
    workflow: pr-closed
    cooldown: 60
