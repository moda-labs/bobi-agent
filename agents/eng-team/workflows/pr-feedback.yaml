name: pr-feedback
trigger: When a reviewer requests changes on an open pull request.
description: >
  Address PR review feedback. Use when a reviewer requests changes
  on an open pull request.

steps:
  - name: address
    agent: engineer
    prompt: |
      A reviewer requested changes on the PR.
      Follow the Feedback Phase instructions in your role prompt.
      Read the review comments, address each one, push the fixes.
      Do NOT comment on the PR yourself — report what you changed in the
      `resolution_summary` handoff field. The lead posts the single
      resolution comment from your handoff (it already posted the
      acknowledgment), keeping one voice on the thread.
    handoff:
      required: [status, resolution_summary]
    timeout: 1800
