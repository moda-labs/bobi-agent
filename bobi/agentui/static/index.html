<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="bobi-ui-token" content="{{TOKEN}}">
  <title>bobi — team</title>
  <link rel="stylesheet" href="/static/tokens.css">
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <header class="bar">
    <span class="mark" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none"
           stroke="currentColor" stroke-width="1.6" stroke-linecap="round"
           stroke-linejoin="round">
        <circle cx="12" cy="12" r="3.2"></circle>
        <path d="M12 2.4v3M12 18.6v3M2.4 12h3M18.6 12h3"></path>
        <path d="M5.2 5.2l2.1 2.1M16.7 16.7l2.1 2.1M18.8 5.2l-2.1 2.1M7.3 16.7l-2.1 2.1"></path>
      </svg>
    </span>
    <span class="title">bobi</span>
    <span class="sub" id="subtitle">team</span>
    <span class="spacer"></span>
    <span class="dot" id="health" title="connection"></span>
  </header>

  <main class="shell">
    <!-- left: agent list -->
    <aside class="sidebar" id="sidebar">
      <div class="side-head mono">Agents</div>
      <div id="cards" class="cards"></div>
      <p id="empty" class="empty" hidden>No active agents. Start the team with
        <code>bobi agent &lt;name&gt; start</code>, then launch sub-agents.</p>
    </aside>

    <!-- right: chat / placeholder -->
    <section class="pane">
      <div id="placeholder" class="placeholder">
        <span class="mark big" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="34" height="34" fill="none"
               stroke="currentColor" stroke-width="1.4" stroke-linecap="round"
               stroke-linejoin="round">
            <circle cx="12" cy="12" r="3.2"></circle>
            <path d="M12 2.4v3M12 18.6v3M2.4 12h3M18.6 12h3"></path>
            <path d="M5.2 5.2l2.1 2.1M16.7 16.7l2.1 2.1M18.8 5.2l-2.1 2.1M7.3 16.7l-2.1 2.1"></path>
          </svg>
        </span>
        <p>Select an agent to start chatting.</p>
      </div>

      <div id="chat" class="chat" hidden>
        <div class="chat-head">
          <span class="chat-name" id="chat-name"></span>
          <span class="chip" id="chat-role"></span>
          <span class="chip" id="chat-status"></span>
        </div>
        <div id="transcript" class="slab" aria-live="polite"></div>
        <form id="composer" class="composer">
          <textarea id="input" rows="1" placeholder="Message this agent…"
                    autocomplete="off"></textarea>
          <button id="send" type="submit">Send</button>
        </form>
      </div>
    </section>
  </main>

  <div id="gone" class="gone" hidden>
    <p>The UI server stopped. Restart it to reconnect.</p>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
