# OpenAI image CLI dependency (#428 unified model; was #416 kind: cli).
# Provides `openai images generate` (#397). Pure-Python wheel in an
# isolated venv so its deps never collide with the framework's. The pin
# lives ONCE; compose's build de-dupe collapses repeats across layers.
success: command -v openai >/dev/null 2>&1 && openai --version >/dev/null 2>&1
why: Generate images with `openai images generate` via the OpenAI CLI (tools/openai.md). Auth via OPENAI_API_KEY.
fix: python3 -m venv /opt/openai-cli && /opt/openai-cli/bin/pip install openai==2.43.0 && ln -sf /opt/openai-cli/bin/openai /usr/local/bin/openai && echo 'Set OPENAI_API_KEY in run/.env'
install:
  apt:
  - python3-venv
  run_root:
  - python3 -m venv /opt/openai-cli && /opt/openai-cli/bin/pip install --no-cache-dir openai==2.43.0 && ln -sf /opt/openai-cli/bin/openai /usr/local/bin/openai
