# gstack dependency (#428 unified model). The headless-browser QA / dogfooding
# toolchain — the browse, qa, ship, and review skills used across an engineering
# lifecycle. Installed via its own `./setup` (a `bun` runtime + Playwright
# Chromium). Self-contained: it declares its own nodejs/npm (the base image is
# Node-free), so any team can pull it in with `tool_library: [gstack]`.
#
# ffmpeg rides along so an engineering team can attach UI proof to its PRs
# headless: record the flow with Playwright (`record_video_dir`) - already
# baked here via Chromium - then transcode the `.webm` to an inline-embeddable
# GIF with ffmpeg. See ~/AGENTS.md "Proof of Work" and docs/FRONTEND_QA.md.
#
# Pins are exact (#380) — bump deliberately. Refresh with
# `npm view <pkg> version` / `git ls-remote https://github.com/garrytan/gstack HEAD`.
#
# NB: gstack drives a real Chromium via Playwright. On hosts that enforce the
# AppArmor unprivileged-userns restriction, the sandbox needs
# `host: [{sysctl: kernel.apparmor_restrict_unprivileged_userns=0}]` (see
# bobi/host_caps.py); add it on the consuming team when targeting such a host.
success: test -e ~/.claude/skills/browse/SKILL.md && test -x ~/.claude/skills/gstack/browse/dist/browse && command -v ffmpeg >/dev/null 2>&1
why: QA, browse, ship, and review skills used throughout the engineering lifecycle, plus ffmpeg to transcode recorded UI walkthroughs to GIF for PR proof (tools/gstack.md).
fix: git clone https://github.com/garrytan/gstack ~/dev/gstack && cd ~/dev/gstack && git checkout a861c00cfac6e2376d26c7d3ba5207cdc5aefc49 && ./setup
install:
  apt:
  - nodejs
  - npm
  - ffmpeg
  npm:
  - bun@1.3.14
  run_root:
  # Playwright resolves Chromium's ~30 system libs for the running Debian
  # (avoids hand-listing t64 names) before gstack `./setup`.
  - npx --yes playwright@1.61.0 install-deps chromium
  run:
  - git clone https://github.com/garrytan/gstack ~/dev/gstack && cd ~/dev/gstack && git checkout a861c00cfac6e2376d26c7d3ba5207cdc5aefc49 && ./setup
