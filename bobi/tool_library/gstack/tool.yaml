# gstack dependency (#428 unified model). The headless-browser QA / dogfooding
# toolbox: browse, qa, and planning helpers, installed via gstack's own
# `./setup` (a `bun` runtime + Playwright Chromium). Self-contained: it
# declares its own nodejs/npm (the base image is Node-free), so any team can
# pull it in with `tool_library: [gstack]`.
#
# `./setup --host auto --prefix -q`: `--host auto` links the skills for every
# agent CLI present (Claude and codex on the standard base image; the default
# is Claude-only); `--prefix` registers every skill namespaced as `gstack-*`
# and is mandatory in a bake (a non-TTY/quiet run without it defaults to flat
# names); `-q` quiets the log. Six skills (ship, review, land-and-deploy,
# landing-report, codex, upgrade) are removed post-setup from both skill
# dirs: the engineering lifecycle is owned by the consuming team's own stage
# skills, gstack's carry proactive-invocation descriptions that would keep
# soliciting the model even when unbound, and `upgrade` can re-run gstack's
# setup and resurrect the others (the box would sit red until the doctor's
# fix repairs it). `success` enforces their
# absence, so a post-bake resurrection (e.g. a re-run of gstack's setup) trips
# the doctor/dispatch gate; `fix` is idempotent so it can repair that state.
#
# ffmpeg rides along so an engineering team can attach UI proof to its PRs
# headless: record the flow with Playwright (`record_video_dir`) - already
# baked here via Chromium - then transcode the `.webm` to an inline-embeddable
# GIF with ffmpeg. See ~/AGENTS.md "Proof of Work" and docs/FRONTEND_QA.md.
#
# Pins are exact (#380) — bump deliberately. Refresh with
# `npm view <pkg> version` / `git ls-remote https://github.com/garrytan/gstack HEAD`.
#
# NB: gstack drives a real Chromium via Playwright. On hosts that enforce the
# AppArmor unprivileged-userns restriction, the sandbox needs
# `host: [{sysctl: kernel.apparmor_restrict_unprivileged_userns=0}]` (see
# bobi/host_caps.py); add it on the consuming team when targeting such a host.
success: test -e ~/.claude/skills/gstack-browse/SKILL.md && test -e ~/.claude/skills/gstack-qa/SKILL.md && test -x ~/.claude/skills/gstack/browse/dist/browse && command -v ffmpeg >/dev/null 2>&1 && for s in ship review land-and-deploy landing-report codex upgrade; do for d in "$HOME/.claude/skills" "$HOME/.codex/skills"; do if [ -e "$d/gstack-$s" ] || [ -L "$d/gstack-$s" ]; then exit 1; fi; done; done
why: Browser-QA toolbox - the gstack-qa / gstack-browse skills (headless Chromium QA, dogfooding, UI evidence) plus the gstack-plan-*-review and gstack-office-hours planning helpers, and ffmpeg to transcode recorded UI walkthroughs to GIF for PR proof (tools/gstack.md).
fix: '[ -d ~/dev/gstack/.git ] || git clone https://github.com/garrytan/gstack ~/dev/gstack; cd ~/dev/gstack && git checkout a861c00cfac6e2376d26c7d3ba5207cdc5aefc49 && ./setup --host auto --prefix -q && for s in ship review land-and-deploy landing-report codex upgrade; do rm -rf "$HOME/.claude/skills/gstack-$s" "$HOME/.codex/skills/gstack-$s"; done'
install:
  apt:
  - nodejs
  - npm
  - ffmpeg
  npm:
  - bun@1.3.14
  run_root:
  # Playwright resolves Chromium's ~30 system libs for the running Debian
  # (avoids hand-listing t64 names) before gstack `./setup`.
  - npx --yes playwright@1.61.0 install-deps chromium
  run:
  - git clone https://github.com/garrytan/gstack ~/dev/gstack && cd ~/dev/gstack && git checkout a861c00cfac6e2376d26c7d3ba5207cdc5aefc49 && ./setup --host auto --prefix -q
  # `rm -rf` handles both link shapes (Claude: real dir holding a SKILL.md
  # symlink; codex: a directory symlink, removed not followed).
  - for s in ship review land-and-deploy landing-report codex upgrade; do rm -rf "$HOME/.claude/skills/gstack-$s" "$HOME/.codex/skills/gstack-$s"; done
