# Codex CLI dependency (#428 unified model; was #416 kind: cli).
# `success` is the verifiable contract (build-success under
# BOBI_VERIFY_PHASE=build, runtime-success otherwise); `install` is the
# pinned recipe. The pin lives here ONCE; compose's build de-dupe
# collapses any repeat across `from:` layers.
success: 'command -v codex >/dev/null 2>&1 && { if [ "${BOBI_BRAIN:-}" = "gateway-openai" ] && [ -n "${BOBI_GATEWAY_BASE_URL:-}" ]; then python3 -c ''import re, subprocess, sys; out=subprocess.check_output(["codex", "--version"], text=True); m=re.search(r"(\d+)\.(\d+)\.(\d+)", out); sys.exit(0 if m and tuple(map(int, m.groups())) >= (0, 144, 4) else 1)''; elif [ "${BOBI_AUTH:-api_key}" != "subscription" ] && [ -n "${OPENAI_API_KEY:-}" ]; then mkdir -p ~/.codex && python3 -c ''import json, os, pathlib; p=pathlib.Path.home()/".codex"/"auth.json"; p.write_text(json.dumps({"OPENAI_API_KEY": os.environ["OPENAI_API_KEY"]})+"\n"); p.chmod(0o600)''; fi; if [ "${BOBI_BRAIN:-}" = "gateway-openai" ] && [ -n "${BOBI_GATEWAY_BASE_URL:-}" ]; then true; elif [ -f ~/.codex/auth.json ]; then if [ "${BOBI_AUTH:-api_key}" = "subscription" ] && python3 -c ''import json, pathlib, sys; p=pathlib.Path.home()/".codex"/"auth.json"; data=json.loads(p.read_text()); sys.exit(0 if isinstance(data, dict) and data.get("OPENAI_API_KEY") and not data.get("tokens") else 1)''; then false; else python3 -c ''import subprocess, sys; sys.exit(subprocess.run(["codex", "exec", "-s", "read-only", "--skip-git-repo-check", "reply OK"], stdin=subprocess.DEVNULL, stdout=subprocess.DEVNULL, timeout=8).returncode)''; fi; elif [ "${BOBI_VERIFY_PHASE:-}" = "build" ]; then codex --version >/dev/null 2>&1; else false; fi; }'
why: Delegate a coding sub-task to the Codex CLI (tools/codex.md).
fix: 'npm install -g @openai/codex@0.144.4 && { if [ "${BOBI_BRAIN:-}" = "gateway-openai" ] && [ -n "${BOBI_GATEWAY_BASE_URL:-}" ]; then codex --version >/dev/null 2>&1; elif [ "${BOBI_AUTH:-api_key}" != "subscription" ] && [ -n "${OPENAI_API_KEY:-}" ]; then mkdir -p ~/.codex && python3 -c ''import json, os, pathlib; p=pathlib.Path.home()/".codex"/"auth.json"; p.write_text(json.dumps({"OPENAI_API_KEY": os.environ["OPENAI_API_KEY"]})+"\n"); p.chmod(0o600)''; else codex auth login || echo ''Set OPENAI_API_KEY in run/.env or run codex auth login''; fi; }'
install:
  apt:
  - nodejs
  - npm
  npm:
  - '@openai/codex@0.144.4'
