# Venn CLI dependency (#428 unified model; was #416 kind: cli).
# Reaches external services (email, calendar, CRM). Python package in an
# isolated venv, entrypoint symlinked onto PATH. The pin lives ONCE;
# compose's build de-dupe collapses repeats across `from:` layers.
success: command -v venn >/dev/null 2>&1 && venn --help >/dev/null 2>&1
why: Reach external services (email, calendar, CRM) via the Venn CLI (tools/venn.md). Auth via VENN_API_KEY.
fix: python3 -m venv /opt/venn-cli && /opt/venn-cli/bin/pip install venn-cli==0.2.0 && ln -sf /opt/venn-cli/bin/venn /usr/local/bin/venn && echo 'Set VENN_API_KEY in run/.env'
install:
  apt:
  - python3-venv
  run_root:
  - python3 -m venv /opt/venn-cli && /opt/venn-cli/bin/pip install --no-cache-dir venn-cli==0.2.0 && ln -sf /opt/venn-cli/bin/venn /usr/local/bin/venn
