# bobi Slack app manifest.
#
# Generated by `bobi create-slack-bot`. The only per-app variables are the
# display name and your event server host — everything else is fixed by what the
# bobi Slack adapter actually consumes (event-server/core/src/adapters/chat-sdk-slack.ts):
# app_mention -> slack.mention, message.im/message.mpim -> slack.dm, and a
# message with thread_ts -> slack.thread_reply. HTTP Events API, no Socket Mode.
display_information:
  name: ${APP_NAME}
  description: bobi agent — reacts to mentions, DMs, and thread replies.
  background_color: "#1a1a1a"
features:
  bot_user:
    display_name: ${APP_NAME}
    always_online: true
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
oauth_config:
  scopes:
    # Shown in the setup UI's finalize-Slack step — keep SLACK_SCOPES in
    # bobi/setup/webui/static/app.js in lockstep with this list.
    bot:
      - app_mentions:read    # app_mention events
      - channels:history     # read + thread replies in public channels
      - channels:read        # list public channels
      - chat:write           # post replies and status updates
      - files:read           # read files shared in events
      - files:write          # upload files (bobi reply --file)
      - groups:history       # read + thread replies in private channels
      - groups:read          # list private channels (resolve a #name login channel)
      - im:history           # direct messages to the bot
      - im:read              # list DM conversations
      - im:write             # open/start a DM — proactive messages to a user
                             # (briefings, nudges, subscription login link)
      - mpim:history         # multi-person DMs
      - users:read           # resolve user names
settings:
  event_subscriptions:
    request_url: ${EVENT_SERVER}/webhooks/slack
    bot_events:
      - app_mention
      - message.channels
      - message.groups
      - message.im
      - message.mpim
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
