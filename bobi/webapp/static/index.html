<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="bobi-webui-token" content="{{TOKEN}}">
  <title>bobi</title>
  <link rel="stylesheet" href="/static/tokens.css">
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <header class="bar">
    <a class="mark home-link" href="#/" aria-label="Dashboard">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none"
           stroke="currentColor" stroke-width="1.6" stroke-linecap="round"
           stroke-linejoin="round">
        <circle cx="12" cy="12" r="3.2"></circle>
        <path d="M12 2.4v3M12 18.6v3M2.4 12h3M18.6 12h3"></path>
        <path d="M5.2 5.2l2.1 2.1M16.7 16.7l2.1 2.1M18.8 5.2l-2.1 2.1M7.3 16.7l-2.1 2.1"></path>
      </svg>
    </a>
    <span class="title">bobi</span>
    <span class="sub" id="subtitle">agents</span>
    <span class="spacer"></span>
    <span class="dot" id="health" title="connection"></span>
  </header>

  <main id="view" class="view"></main>

  <div id="gone" class="gone" hidden>
    <p>The app server stopped. Restart it with <code>bobi app start</code>.</p>
  </div>

  <script type="module" src="/static/shell.js"></script>
</body>
</html>
