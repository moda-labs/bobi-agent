# deployments/eng-team.yaml — moda's internal engineering-org instance.
#
# The deployment NAME is this filename ("eng-team"); the app is "<fleet>-eng-team"
# (fleet from defaults.yaml = moda → app "moda-eng-team"). Adding/editing this
# file is what deploys — `modastack deploy eng-team`, or the GitOps Action on a
# release (.github/workflows/gitops-teams.yml reconciles deployments/*.yaml).
#
# ACTIVATED by C24 (#368): eng-team's `requires: gstack/codex` gate used to block
# dispatch in the bare image. It now ships a `build:` spec (agents/eng-team/
# agent.yaml), so CI bakes those tools into the team-flavored image below — the
# instance can actually dispatch.

# Delivery: a LOCAL package (agents/eng-team) → ssh-push for the team DEFINITION
# (prompts/workflows flow through the volume, hot-updated on a prompt edit).
team: eng-team

# Auth: subscription (Max-plan OAuth) instead of api_key. On first boot with no
# creds on the volume, the entrypoint runs `modastack login-bootstrap`: it spawns
# `claude auth login --claudeai` under a PTY, scrapes the OAuth URL, posts it to
# login_channel, and waits there for the pasted code. Creds land on the volume
# (CLAUDE_CONFIG_DIR/.credentials.json) and persist across restarts.
# REQUIREMENT: ANTHROPIC_API_KEY must be ABSENT from the secrets AND unset as a
# live Fly secret — it silently outranks OAuth and bills the API (entrypoint §6.1
# refuses to boot if present). The secrets reconcile enforces this: subscription
# mode rejects a supplied ANTHROPIC_API_KEY, and since it's not in the declared
# set, a stray live one is pruned (#385). login_channel below is Zach's bot DM.
auth: subscription
login_channel: D0B51JP1N4C

# Tenant: production deployments live in the `modalabs` GitHub Environment (the
# default from deployments/defaults.yaml). No override needed here.

# Team-flavored image (C24): eng-team declares a `build:` spec (agents/eng-team/
# agent.yaml — node, codex, gstack), so `modastack deploy` renders its team-deps
# hook into the build context and builds the team-flavored image ON FLY's remote
# builder during deploy (Fly creates app + registry + machine together; no
# separate registry push). Fly's builder caches the tool layers, so re-deploys
# are fast and a framework bump rebuilds only the wheel layer. (A prebuilt
# `image: <ref>` would short-circuit the build — a build-once-deploy-many
# optimization deferred until the registry-push path is wired.)

# Secrets: per-key, in the `modalabs` tenant Environment (#385), keyed
# `ENG_TEAM__<KEY>`. The Action filters them by the ENG_TEAM__ prefix into an
# --env-file; the engine reconciles to the team's declared agent.yaml set (set
# what's supplied, prune what isn't declared). Edit one secret = one
# `gh secret set ENG_TEAM__<KEY> --env modalabs`. For self-service, drop the
# block below and use `secrets: { env-file: ./eng-team.env }`.
#
# Keys eng-team needs to FUNCTION (all declared in agents/eng-team/agent.yaml):
#   (NO ENG_TEAM__ANTHROPIC_API_KEY — auth=subscription above; it must be absent.)
#   ENG_TEAM__SLACK_BOT_TOKEN, ENG_TEAM__LINEAR_API_KEY  service creds.
#   ENG_TEAM__GH_TOKEN     gh CLI auth (github service credentials).
#   ENG_TEAM__SLACK_CHANNELS  optional channel scoping (empty = whole workspace).
#   ENG_TEAM__OPENAI_API_KEY  codex auth — the baked `codex` binary is
#                      unauthenticated until this is set; codex reads it at runtime.
#                      (The build only verifies `codex --version`, which needs no
#                      auth, so a missing key fails at dispatch, not at build.)
secrets:
  env: eng-team
