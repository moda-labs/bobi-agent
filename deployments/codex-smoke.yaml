# deployments/codex-smoke.yaml — the fleet's permanent Codex pipeline canary.
#
# The Codex twin of deployments/canary.yaml (the Claude canary, app ci-canary).
# Codex now ships in the BASE image (#428), so this goes through the EXACT same
# deploy path as the Claude canary — no flavored image — and release.yml smokes
# it from the same wheel as a hard release gate: both brains must answer
# CANARY-OK or the release aborts. App: ci-codex-smoke (fleet `ci` from
# defaults.yaml).
#
# Runs the published, dependency-free codex-smoke team via team-url
# (HTTPS-fetch): the dark instance pulls the tarball at first boot. The team's
# agent.yaml sets brain: codex; it has no `requires:` gate, so it DISPATCHES in
# the bare generic image.
team-url: https://github.com/moda-labs/bobi-agent/releases/download/teams-latest/codex-smoke.tar.gz

# Right-sized to keep an always-on canary cheap (~$6/mo vs ~$25 at the 4gb/2cpu
# defaults), mirroring the Claude canary. The smoke team uses no knowledge base,
# so the fastembed model never downloads or loads into RAM — 1gb is plausible. If
# it OOMs / crash-loops on memory, bump memory to 2gb and redeploy (idempotent).
memory: 1gb
cpus: 1
volume_size: 3

# Tenant override: shares the `canary` tenant with the Claude canary (both are
# pre-deploy gates, isolated from the production `modalabs` fleet, #385). It stays
# api_key (a self-healing automated gate — a subscription canary whose volume was
# lost would block the gate on a human OAuth re-login).
tenant: canary

# Secrets: the `canary` GitHub Environment holds this instance's per-key secrets
# (#385) — for this api_key-mode Codex team, just CANARY__OPENAI_API_KEY (the
# entrypoint materializes ~/.codex/auth.json from it). The Action filters secrets
# by the CODEX_SMOKE__ prefix, so this key must be named CODEX_SMOKE__OPENAI_API_KEY
# in the `canary` Environment.
secrets:
  env: canary
