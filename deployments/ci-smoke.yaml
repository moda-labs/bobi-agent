# deployments/ci-smoke.yaml — the fleet's permanent pipeline canary.
#
# An always-on smoke instance that revalidates the whole deploy path on every
# release: the GitOps thin client → `modastack deploy` → the base image → the
# event server. Valuable while eng-team is parked until C24, and a standing
# health signal afterwards.
#
# Delivers the published, dependency-free smoke team via team-url (HTTPS-fetch):
# the dark instance pulls the tarball at first boot — the design's CI/enterprise
# delivery mode (no SSH needed; a Fly deploy token suffices). The smoke team has
# no `requires:` gate, so it actually DISPATCHES in the bare image (unlike
# eng-team — the C24 gap). App: moda-ci-smoke (fleet from defaults.yaml).
team-url: https://github.com/moda-labs/modastack/releases/download/teams-latest/smoke-team.tar.gz

# Secrets: the GitHub Environment "ci-smoke" holds MODASTACK_ENV — for this
# api_key-mode team, just a (durable) ANTHROPIC_API_KEY. The Action materializes
# it into an --env-file for `modastack deploy`.
secrets:
  env: ci-smoke
