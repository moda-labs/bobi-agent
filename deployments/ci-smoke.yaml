# deployments/ci-smoke.yaml — the GitOps pipeline's own smoke instance.
#
# Delivers the published, dependency-free smoke team via team-url (HTTPS-fetch):
# the dark instance pulls the tarball at first boot — the design's CI/enterprise
# delivery mode (no SSH needed; a plain Fly deploy token suffices). The smoke team
# has no `requires:` gate, so it actually DISPATCHES in the bare image (unlike
# eng-team — the C24 gap). Deploying this via a release (or a `deploy-*` tag)
# exercises the whole thin-client path end to end. App: moda-ci-smoke
# (fleet from defaults.yaml). Tear down with `modastack destroy ci-smoke`.
team-url: https://github.com/moda-labs/modastack/releases/download/teams-latest/smoke-team.tar.gz

# Secrets: the GitHub Environment "ci-smoke" holds MODASTACK_ENV — for this
# api_key-mode team, just ANTHROPIC_API_KEY. The Action materializes it into an
# --env-file for `modastack deploy`.
secrets:
  env: ci-smoke
