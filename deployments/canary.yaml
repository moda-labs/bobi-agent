# deployments/canary.yaml — the fleet's permanent Claude pipeline canary.
#
# An always-on instance that revalidates the whole deploy path on every release:
# the GitOps thin client → `bobi deploy` → the base image → the event
# server. Its Codex twin is deployments/codex-smoke.yaml (app ci-codex-smoke) —
# both are release gates (release.yml smokes each from the same wheel). The
# production agent teams moved to moda-labs/moda-agents (the `moda` fleet),
# leaving this repo's `ci` fleet as the release self-gate alone.
#
# Runs the published, dependency-free claude-smoke team via team-url
# (HTTPS-fetch): the dark instance pulls the tarball at first boot — the design's
# CI/enterprise delivery mode (no SSH needed; a Fly deploy token suffices). The
# smoke team has no `requires:` gate, so it DISPATCHES in the bare generic image.
# App: ci-canary (fleet `ci` from defaults.yaml).
team-url: https://github.com/moda-labs/bobi-agent/releases/download/teams-latest/claude-smoke.tar.gz

# Right-sized to keep an always-on canary cheap (~$6/mo vs ~$25 at the 4gb/2cpu
# defaults). The smoke team uses no knowledge base, so the fastembed model never
# downloads or loads into RAM — 1gb is plausible. If it OOMs / crash-loops on
# memory, bump memory to 2gb and redeploy (idempotent).
memory: 1gb
cpus: 1
volume_size: 3

# Tenant override: the canary is its OWN tenant, not part of the production
# `modalabs` fleet (#385). It's the pre-deploy gate (build candidate → smoke →
# green-light the fleet roll), with a different cadence and lifecycle. Its secrets
# live in the `canary` GitHub Environment, keyed `CANARY__<KEY>`, isolated from
# prod. It stays api_key (a self-healing automated gate — a subscription canary
# whose volume was lost would block the gate on a human OAuth re-login).
tenant: canary

# Secrets: the `canary` GitHub Environment holds this instance's per-key secrets
# (#385) — for this api_key-mode team, just CANARY__ANTHROPIC_API_KEY. The Action
# filters them by the CANARY__ prefix into an --env-file for `bobi deploy`.
secrets:
  env: canary
