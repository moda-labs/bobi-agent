# deployments/canary.yaml — the fleet's permanent pipeline canary.
#
# An always-on instance that revalidates the whole deploy path on every release:
# the GitOps thin client → `modastack deploy` → the base image → the event
# server. Valuable while eng-team is parked until C24, and a standing health
# signal afterwards.
#
# Runs the published, dependency-free smoke team via team-url (HTTPS-fetch): the
# dark instance pulls the tarball at first boot — the design's CI/enterprise
# delivery mode (no SSH needed; a Fly deploy token suffices). The smoke team has
# no `requires:` gate, so it actually DISPATCHES in the bare image (unlike
# eng-team — the C24 gap). App: moda-canary (fleet from defaults.yaml).
team-url: https://github.com/moda-labs/modastack/releases/download/teams-latest/smoke-team.tar.gz

# Right-sized to keep an always-on canary cheap (~$6/mo vs ~$25 at the 4gb/2cpu
# defaults). The smoke team uses no knowledge base, so the baked fastembed model
# never loads into RAM — 1gb is plausible. If it OOMs / crash-loops on memory,
# bump memory to 2gb and redeploy (idempotent).
memory: 1gb
cpus: 1
volume_size: 3

# Tenant override: the canary is its OWN tenant, not part of the production
# `modalabs` fleet (#385). It's the pre-deploy gate (build candidate → smoke →
# green-light the fleet roll), with a different cadence and lifecycle. Its secrets
# live in the `canary` GitHub Environment, keyed `CANARY__<KEY>`, isolated from
# prod. It stays api_key (a self-healing automated gate — a subscription canary
# whose volume was lost would block the gate on a human OAuth re-login).
tenant: canary

# Secrets: the `canary` GitHub Environment holds this instance's per-key secrets
# (#385) — for this api_key-mode team, just CANARY__ANTHROPIC_API_KEY. The Action
# filters them by the CANARY__ prefix into an --env-file for `modastack deploy`.
secrets:
  env: canary
