name: GitOps — teams

# Reconcile agents/ team dirs to live Fly instances after each push to main
# (C22 / #342; docs/design/CONTAINERIZED_INSTANCES.md §10).
#
# Triggered by "Team packages" completing on main — that workflow is the SOLE
# publisher of the rolling teams-latest release, so by the time we run, every
# teams-latest/<team>.tar.gz an instance might pull is already fresh. We never
# build or publish tarballs here.
#
# Flows (classified by Fly STATE via scripts/fleet.sh, not by git status):
#   added team   (no Fly app yet) -> scripts/provision-instance.sh. The per-team
#                 GitHub Environment supplies its MODASTACK_ENV secret blob.
#   changed team (app exists)     -> `modastack install <url>` + restart over
#                 `fly ssh` — a workspace-safe in-place update; never re-provision
#                 (volume agent.yaml is source of truth).
#   deleted team -> nothing automatic (human runs scripts/destroy-instance.sh).
#
# State store = the Fly API (scripts/fleet.sh). No DB, no committed manifest.
#
# Required repo configuration:
#   vars.FLEET_PREFIX            operator namespace; app = "<prefix>-<team>",
#                                fleet enumerated by the MODASTACK_FLEET stamp.
#   vars.MODASTACK_EVENT_SERVER  (optional) Worker URL; omit to use the default.
#   secrets.FLY_API_TOKEN        Fly deploy token (org-scoped) for flyctl.
#   Environment "<team>" per team, holding secret MODASTACK_ENV = the team's
#                                full KEY=VALUE env-file body. No protection rules
#                                (a required reviewer would pause the matrix).

on:
  workflow_run:
    workflows: ["Team packages"]
    types: [completed]
  workflow_dispatch:
    inputs:
      sha:
        description: "Commit SHA to reconcile (default: latest of the dispatched branch)"
        required: false

# Serialize fleet reconciliation so two pushes can't race on the same app.
concurrency:
  group: gitops-teams
  cancel-in-progress: false

env:
  FLEET_PREFIX: ${{ vars.FLEET_PREFIX }}
  EVENT_SERVER: ${{ vars.MODASTACK_EVENT_SERVER }}

jobs:
  diff:
    # Act only on a successful main build (or a manual dispatch).
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    outputs:
      added: ${{ steps.classify.outputs.added }}
      changed: ${{ steps.classify.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_run defaults to the default-branch tip, which may have moved;
          # pin to the exact commit that triggered the package build.
          ref: ${{ github.event.workflow_run.head_sha || github.event.inputs.sha }}
          fetch-depth: 2

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - id: resolve
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - id: changed-teams
        env:
          SHA: ${{ steps.resolve.outputs.sha }}
        run: |
          set -euo pipefail
          # Team slugs whose files changed in this commit, deletions excluded (-d).
          mapfile -t slugs < <(
            git diff --name-only --diff-filter=d "${SHA}^" "$SHA" -- 'agents/*/' \
              | sed -E 's#^agents/([^/]+)/.*#\1#' | sort -u
          )
          # Keep only slugs that still hold an agent.yaml at this sha (real teams;
          # a fully-deleted team's edits drop out — deletion is human-only).
          keep=()
          for s in "${slugs[@]:-}"; do
            [ -n "$s" ] || continue
            [ -f "agents/$s/agent.yaml" ] && keep+=("$s")
          done
          echo "slugs=${keep[*]:-}" >> "$GITHUB_OUTPUT"
          echo "Changed teams: ${keep[*]:-<none>}"

      - id: classify
        env:
          SLUGS: ${{ steps.changed-teams.outputs.slugs }}
        run: |
          set -euo pipefail
          read -r -a slugs <<< "${SLUGS:-}"
          if [ "${#slugs[@]}" -eq 0 ]; then
            { echo "added=[]"; echo "changed=[]"; } >> "$GITHUB_OUTPUT"
            echo "Nothing to reconcile."; exit 0
          fi
          scripts/fleet.sh classify "$FLEET_PREFIX" "${slugs[@]}" | tee -a "$GITHUB_OUTPUT"

  provision:
    needs: diff
    if: ${{ needs.diff.outputs.added != '' && needs.diff.outputs.added != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        team: ${{ fromJSON(needs.diff.outputs.added) }}
    # Binds this matrix cell to the team's GitHub Environment, exposing its
    # MODASTACK_ENV secret. Computed-from-matrix environment names are supported.
    environment: ${{ matrix.team }}
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Provision instance
        env:
          MODASTACK_ENV: ${{ secrets.MODASTACK_ENV }}
        run: |
          set -euo pipefail
          [ -n "${MODASTACK_ENV:-}" ] || {
            echo "::error::Environment '${{ matrix.team }}' has no MODASTACK_ENV secret"; exit 1; }
          umask 077
          envfile="$RUNNER_TEMP/instance.env"
          printf '%s' "$MODASTACK_ENV" > "$envfile"
          url="https://github.com/${{ github.repository }}/releases/download/teams-latest/${{ matrix.team }}.tar.gz"
          ev=()
          [ -n "${EVENT_SERVER:-}" ] && ev=(--event-server "$EVENT_SERVER")
          scripts/provision-instance.sh \
            --app "$FLEET_PREFIX-${{ matrix.team }}" \
            --fleet "$FLEET_PREFIX" \
            --team-url "$url" \
            "${ev[@]}" \
            --env-file "$envfile" \
            --yes

  update:
    needs: diff
    if: ${{ needs.diff.outputs.changed != '' && needs.diff.outputs.changed != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        team: ${{ fromJSON(needs.diff.outputs.changed) }}
    # No environment binding: the instance's secrets already live on its volume;
    # an in-place update needs only the Fly token.
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: In-place team update
        run: |
          set -euo pipefail
          app="$FLEET_PREFIX-${{ matrix.team }}"
          url="https://github.com/${{ github.repository }}/releases/download/teams-latest/${{ matrix.team }}.tar.gz"
          # Re-pull from the refreshed tarball (workspace-safe reinstall), then
          # restart to load the new config. URL-sourced instance => install <url>,
          # NOT `agents update` (the registry path won't match a `url:` source).
          fly ssh console -a "$app" --command \
            "gosu modastack env HOME=/data/home bash -c 'cd /data/project && modastack install \"$url\"'"
          fly machine restart -a "$app"
