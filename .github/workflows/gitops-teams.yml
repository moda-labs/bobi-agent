name: GitOps — teams

# Reconcile deployments/<name>.yaml to live Fly instances on each push to main
# (C22 / #342; docs/design/DEPLOY_INTERFACE.md).
#
# This workflow is a THIN CLIENT: all deployment business logic lives in the
# `modastack deploy` primitive (idempotent provision-or-update, delivery-mode
# selection, secret validation, the Fly mechanics). The Action only does
# orchestration — diff which deployments changed, materialize each one's secrets,
# and loop the primitive. Nothing GitHub-specific reaches into the engine, so the
# same `modastack deploy` runs from a laptop, this Action, Terraform, or a SaaS
# plane. To wire your own repo, copy this file and set the inputs below; see
# docs/DEPLOYMENT.md (bring-your-own-repo runbook).
#
# Flows:
#   added/changed deployments/<name>.yaml  -> `modastack deploy <name>` (idempotent:
#       the primitive provisions a new instance or updates an existing one).
#   changed agents/<team>/                 -> redeploy any deployment of that team.
#   deleted deployments/<name>.yaml        -> nothing automatic; the orphans job
#       surfaces the now-unmanaged Fly app for a human `modastack destroy`.
#
# State store = the Fly API (no DB, no committed manifest). Fleet identity comes
# from deployments/defaults.yaml (`fleet:`), not a repo var.
#
# Required configuration:
#   secrets.FLY_API_TOKEN   Fly deploy token (org-scoped). Absent -> the workflow
#                           no-ops (so committing deployments/ before wiring the
#                           fleet never breaks CI).
#   Environment "<name>" per deployment, holding secret MODASTACK_ENV = that
#   instance's full KEY=VALUE env-file body (the named `secrets.env` source). No
#   protection rules (a required reviewer would pause the matrix).

on:
  push:
    branches: [main]
    paths:
      - "deployments/**"
      - "agents/**"
  workflow_dispatch:
    inputs:
      sha:
        description: "Commit SHA to reconcile (default: latest of the branch)"
        required: false

# Serialize fleet reconciliation so two pushes can't race on the same app.
concurrency:
  group: gitops-teams
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      # JSON array of deployment names to (re)deploy; "[]" when nothing changed.
      names: ${{ steps.plan.outputs.names }}
      # "true" only when a Fly token is configured — gates the deploy/orphan jobs.
      configured: ${{ steps.gate.outputs.configured }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.sha || github.sha }}
          fetch-depth: 2

      - id: gate
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -n "${FLY_API_TOKEN:-}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::secrets.FLY_API_TOKEN unset — fleet not wired, skipping."
          fi

      - id: plan
        run: |
          set -euo pipefail
          # A deployment exists iff deployments/<name>.yaml is present (excluding
          # the shared defaults file and docs). Its name is the filename stem.
          deployment_names() {
            for f in deployments/*.yaml; do
              [ -e "$f" ] || continue
              b="$(basename "$f" .yaml)"
              [ "$b" = "defaults" ] && continue
              printf '%s\n' "$b"
            done | sort -u
          }

          # Files changed in this push (deletions excluded — deletion is the
          # orphans job's human-gated concern, never an auto-deploy).
          changed() { git diff --name-only --diff-filter=d "${1}^" "$1" 2>/dev/null || true; }
          files="$(changed "$(git rev-parse HEAD)")"

          # 1) directly-changed deployments/<name>.yaml.
          names="$(printf '%s\n' "$files" \
            | sed -nE 's#^deployments/([^/]+)\.yaml$#\1#p' \
            | grep -vx defaults || true)"

          # 2) changed agents/<team>/ → every deployment whose `team:` is that team
          #    (the common case: a deployment named after its team).
          changed_teams="$(printf '%s\n' "$files" \
            | sed -nE 's#^agents/([^/]+)/.*#\1#p' | sort -u || true)"
          for team in $changed_teams; do
            [ -n "$team" ] || continue
            for name in $(deployment_names); do
              t="$(sed -nE 's#^team:[[:space:]]*([^[:space:]#]+).*#\1#p' \
                     "deployments/$name.yaml" | head -n1)"
              [ "$t" = "$team" ] && names="$(printf '%s\n%s\n' "$names" "$name")"
            done
          done

          # Keep only names that still have a deployments/<name>.yaml at this sha.
          keep=()
          while IFS= read -r n; do
            [ -n "$n" ] || continue
            [ -f "deployments/$n.yaml" ] && keep+=("$n")
          done < <(printf '%s\n' "$names" | sort -u)

          if [ "${#keep[@]}" -eq 0 ]; then
            echo "names=[]" >> "$GITHUB_OUTPUT"
            echo "Nothing to reconcile."
          else
            printf '%s\n' "${keep[@]}" | jq -R . | jq -cs . \
              | sed 's/^/names=/' >> "$GITHUB_OUTPUT"
            echo "Deployments to reconcile: ${keep[*]}"
          fi

  deploy:
    needs: plan
    if: ${{ needs.plan.outputs.configured == 'true' && needs.plan.outputs.names != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        name: ${{ fromJSON(needs.plan.outputs.names) }}
    # Bind this matrix cell to the deployment's GitHub Environment, exposing its
    # MODASTACK_ENV secret. Convention: the Environment is named after the
    # deployment (deployments/<name>.yaml's `secrets.env` documents this).
    environment: ${{ matrix.name }}
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.sha || github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install modastack CLI
        run: pip install -e .

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy ${{ matrix.name }}
        env:
          MODASTACK_ENV: ${{ secrets.MODASTACK_ENV }}
        run: |
          set -euo pipefail
          [ -n "${MODASTACK_ENV:-}" ] || {
            echo "::error::Environment '${{ matrix.name }}' has no MODASTACK_ENV secret"; exit 1; }
          umask 077
          envfile="$RUNNER_TEMP/instance.env"
          printf '%s' "$MODASTACK_ENV" > "$envfile"
          # The whole reconcile (provision-or-update, ssh-push vs team-url, secret
          # validation, identity stamps) is the primitive's job — the Action just
          # hands it the resolved secrets file and the deployment name.
          modastack deploy "${{ matrix.name }}" --env-file "$envfile"

  orphans:
    # Report Fly apps in the fleet that no longer have a deployments/ file, so a
    # human can `modastack destroy` them. Never auto-destroys (the volume is the
    # only copy of an instance's state). Pure orchestration: a cross-fleet diff.
    needs: plan
    if: ${{ needs.plan.outputs.configured == 'true' }}
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Surface unmanaged instances
        run: |
          set -euo pipefail
          fleet="$(sed -nE 's#^fleet:[[:space:]]*([^[:space:]#]+).*#\1#p' \
                     deployments/defaults.yaml | head -n1)"
          [ -n "$fleet" ] || { echo "No fleet in deployments/defaults.yaml — skip."; exit 0; }

          # Managed = the slugs we have deployments/<name>.yaml for, as app names.
          declare -A managed=()
          for f in deployments/*.yaml; do
            b="$(basename "$f" .yaml)"; [ "$b" = "defaults" ] && continue
            managed["$fleet-$b"]=1
          done

          orphans=()
          while IFS= read -r app; do
            [ -n "$app" ] || continue
            [ -n "${managed[$app]:-}" ] || orphans+=("$app")
          done < <(scripts/fleet.sh list "$fleet")

          if [ "${#orphans[@]}" -gt 0 ]; then
            echo "::warning::Unmanaged fleet instances (no deployments/ file): ${orphans[*]}"
            echo "Run \`modastack destroy <name>\` to remove each one (human-gated)."
          else
            echo "No unmanaged instances."
          fi
