name: Team packages

# Builds distributable .tar.gz packages from each agent team under agents/, plus
# the zero-secret tests/fixtures/smoke-team (the canonical smoke-test target).
# This is the C10 team-injection seam — a dark instance fetches its team from a
# public URL at first boot via BOBI_TEAM_URL / `bobi install <url>`.
#
# Path-filtered so unrelated PRs pay nothing. On a PR this validates that every
# team still packages from source and that each archive contains an agent.yaml.
# On push to main, the `publish` job uploads the tarballs to a rolling
# `teams-latest` GitHub Release, giving each team a stable, public, no-auth
# download URL that --team-url / BOBI_TEAM_URL can point at:
#
#   https://github.com/<owner>/<repo>/releases/download/teams-latest/<team>.tar.gz
on:
  push:
    branches: [main]
    paths: &pkg_paths
      - "agents/**"
      - "tests/fixtures/smoke-team/**"
      - "scripts/build-team-tarballs.sh"
      - "scripts/team-version.py"
      - "scripts/check-team-versions.py"
      - "scripts/publish-team-tarballs.sh"
      - ".github/workflows/team-packages.yml"
  pull_request:
    branches: [main]
    paths: *pkg_paths
  workflow_dispatch: {}

jobs:
  build:
    name: Build team tarballs from source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check team version agreement (registry.yaml == agent.yaml)
        # #440 Phase 1: registry.yaml is the authoritative "latest published"
        # pointer; each team's agent.yaml is the source of the version. They
        # must agree or the published "latest" lies (an unpinned install would
        # resolve a version with no asset). Runs on PR + push. Kept here rather
        # than in tests/test_packaging.py to avoid colliding with the open #438.
        run: python3 scripts/check-team-versions.py

      - name: Build packages
        run: |
          # Every real team under agents/, plus the zero-secret smoke-team
          # fixture (only needs BOBI_EVENT_SERVER) — the canonical target
          # for container/Fly smoke tests via --team-url.
          scripts/build-team-tarballs.sh --out dist/teams
          scripts/build-team-tarballs.sh --out dist/teams tests/fixtures/smoke-team

      - name: Verify each archive carries an agent.yaml
        run: |
          set -euo pipefail
          shopt -s nullglob
          built=(dist/teams/*.tar.gz)
          [ "${#built[@]}" -gt 0 ] || { echo "No tarballs were built"; exit 1; }
          for tgz in "${built[@]}"; do
            # Disable pipefail for this check: grep -q exits early on match,
            # which can SIGPIPE tar and make the pipeline return 141 even
            # though the match was found.
            if ! (set +o pipefail; tar -tzf "$tgz" | grep -qE '(^|/)agent\.yaml$'); then
              echo "::error::$tgz has no agent.yaml — not a valid team package"
              exit 1
            fi
            echo "ok: $tgz"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: team-packages
          path: dist/teams/*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish tarballs to a downloadable release
    needs: build
    # Only on push to main — never from a PR (no publishing untrusted forks /
    # asset churn). The rolling tag keeps the download URLs stable.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: team-packages
          path: dist/teams

      - name: Upload to the 'teams-latest' release (rolling + immutable versioned)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Create the release once (idempotent), then upload assets with split
          # semantics: rolling <team>.tar.gz is clobbered (mutable latest
          # pointer); immutable <team>-<version>.tar.gz is uploaded without
          # --clobber and a re-publish of an existing version is a no-op skip.
          if ! gh release view teams-latest >/dev/null 2>&1; then
            gh release create teams-latest --prerelease \
              --title "Team packages (latest main)" \
              --notes "Auto-published agent-team .tar.gz packages built from agents/ on each push to main. Rolling latest: https://github.com/${{ github.repository }}/releases/download/teams-latest/<team>.tar.gz — immutable pin: <team>-<version>.tar.gz"
          fi
          scripts/publish-team-tarballs.sh teams-latest dist/teams
