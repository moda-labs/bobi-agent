name: Release

# The single gated release pipeline, on a published GitHub Release (C22 / #342;
# docs/design/CONTAINERIZED_INSTANCES.md §10). ONE functional gate — a canary
# running the EXACT wheel we're about to ship — guards BOTH irreversible actions
# (PyPI publish + the fleet roll). Build once, prove once, then ship everywhere:
#
#   1. subscription-login-smoke  gate the release on a verified login path (#388).
#   2. build-wheel               `python -m build` the wheel/sdist ONCE; upload it.
#   3. build-canary              deploy the canary from an image built FROM that
#                                wheel (MODASTACK_BUILD=wheel) and SMOKE it — a
#                                functional `ask` proving the agent answers
#                                CANARY-OK end-to-end. THIS is the gate.
#   4a. publish                  needs build-canary → upload the SAME wheel to PyPI
#                                (+ event-server + Homebrew). Gated on the canary,
#                                NOT the fleet roll — a flaky fleet app can't block
#                                an already-proven publish.
#   4b. roll-fleet               needs build-canary → reuse the canary's image
#                                digest for generic instances; a TEAM-FLAVORED app
#                                (a `build:` spec, C24 #368) rebuilds its OWN image
#                                from the wheel + its TEAM_DEPS hook.
#   5. deploy-teams              needs roll-fleet → reconcile each deployment's
#                                package CONTENT + SECRETS onto the rolled image, by
#                                CALLING deploy-agent-teams.yml (workflow_call).
#
# Why the canary is built from the WHEEL, not source: it then proves the exact
# artifact we publish actually boots and answers — catching wheel/sdist packaging
# bugs (missing entry point / package_data) a source rebuild never would. Each app
# keeps its volume/sessions/env/secrets: we round-trip the live config with `fly
# config save` and only swap the image, so C9 idempotency makes the restart safe.
#
# Why publish lives here (not a reusable workflow): PyPI trusted publishing rejects
# a reusable workflow (`invalid-publisher`) — the OIDC publish step must run in the
# top-level file the PyPI trusted-publisher config names. So the PyPI publisher is
# configured for THIS workflow (release.yml), environment `pypi`.
#
# Required configuration:
#   deployments/defaults.yaml `fleet:`   fleet namespace (enumerated by the
#                                         MODASTACK_FLEET stamp). Single source of
#                                         fleet truth, shared with deploy-agent-teams.
#   secrets.FLY_API_TOKEN                 Fly deploy token (org-scoped) for flyctl.
#   PyPI trusted publisher for release.yml + environment `pypi` (OIDC; no token).
#   secrets.CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID   event-server deploy.
#   secrets.HOMEBREW_TAP_TOKEN            dispatch the formula bump.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref/tag to build and roll out (default: this branch)"
        required: false

# One release rollout at a time across the whole fleet.
concurrency:
  group: release
  cancel-in-progress: false

# contents: read for checkout; id-token: write for PyPI trusted publishing.
permissions:
  contents: read
  id-token: write

jobs:
  # --------------------------------------------------------------------------
  # Subscription-login smoke (#388). GATE the release on a verified subscription
  # bootstrap so the _extract_code-class integration gap that #386 fixed can't ship
  # silently again. This drives a *subscription-mode* instance of the bootstrap to
  # "waiting for code" and feeds it a SYNTHETIC code through the real PTY driver,
  # asserting credentials land. It is hermetic:
  #   * NO real Anthropic/OAuth credentials — `claude auth login` is faked by a
  #     stand-in PTY process; the only thing written is a dummy creds file.
  #   * NO Slack / event-server network — the Slack post and event-bus wait are
  #     stubbed; the code is the synthetic one we feed in.
  # The mock auth-code event uses the REAL Slack adapter output shape, generated
  # from event-server/src/adapters/slack.ts (so adapter + bootstrap can't drift),
  # exactly as tests/integration/test_login_bootstrap_smoke.py does.
  subscription-login-smoke:
    name: Subscription-login smoke (mock code, no creds)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Node is needed only to GENERATE the auth-code event from slack.ts via
      # the adapter's own logic (esbuild type-erasure). No event-server deploy.
      - uses: actions/setup-node@v5
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install modastack
        run: pip install -e . pytest

      - name: Drive subscription bootstrap to "waiting for code" + accept a synthetic code
        # MODASTACK_AUTH=subscription puts us in subscription mode; we assert the
        # bootstrap reaches the event-bus wait, accepts a synthetic code carried
        # in a REAL-adapter-shaped event, feeds it to the (faked) `claude auth
        # login` over a PTY, and only then writes credentials. No real creds.
        env:
          MODASTACK_AUTH: subscription
          # Belt-and-suspenders: prove nothing real leaks in.
          ANTHROPIC_API_KEY: ""
          CLAUDE_CODE_OAUTH_TOKEN: ""
        run: |
          set -euo pipefail
          # The integration smoke IS the verifier — it exercises the full
          # subscription bootstrap path with a synthetic/mock code end-to-end.
          python -m pytest tests/integration/test_login_bootstrap_smoke.py -v

  # --------------------------------------------------------------------------
  # Build the wheel/sdist ONCE. This exact artifact is what the canary smokes, what
  # the fleet runs, and what we publish — built a single time so all three agree.
  build-wheel:
    name: Build the release wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.event.inputs.ref || github.ref }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build wheel + sdist
        run: pip install build && python -m build

      - name: Fail-fast sanity — the wheel at least imports + runs
        # Cheap guard so we don't spin up a Fly canary build for a wheel that won't
        # even load. The real functional proof is the canary smoke; this just avoids
        # wasting the expensive build on an obviously-broken artifact.
        run: |
          set -euo pipefail
          python -m venv /tmp/whl && /tmp/whl/bin/pip install --quiet dist/*.whl
          /tmp/whl/bin/modastack --version

      - name: Upload the release artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # --------------------------------------------------------------------------
  # THE GATE: deploy the canary from an image built FROM the just-built wheel, then
  # a functional `ask` proves it answers CANARY-OK end-to-end through the PROD event
  # server. Outputs the built generic image digest (reused by roll-fleet). A broken
  # wheel/image fails here and blocks BOTH publish and the fleet roll.
  build-canary:
    name: Build canary from the wheel + smoke
    needs: [subscription-login-smoke, build-wheel]
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.canary.outputs.image }}
      generic_src: ${{ steps.canary.outputs.generic_src }}
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.event.inputs.ref || github.ref }}

      - name: Stage the prebuilt wheel into the build context
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: superfly/flyctl-actions/setup-flyctl@master

      # render-team-deps.py decides which fleet apps are team-flavored (so they
      # can't be the generic image source). Installing modastack provides it.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install modastack (for the team-deps renderer)
        run: pip install -e .

      - name: Build the canary image from the wheel + smoke it
        id: canary
        run: |
          set -euo pipefail
          if [ -z "${FLY_API_TOKEN:-}" ]; then
            echo "::notice::FLY_API_TOKEN unset — fleet not wired; skipping the canary gate."
            echo "image=" >> "$GITHUB_OUTPUT"; echo "generic_src=" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # `fly` is the current binary name; some flyctl installs only expose
          # `flyctl`. Detect either (same pattern as deploy.py / fleet.sh).
          FLY="$(command -v fly || command -v flyctl)" \
            || { echo "::error::neither 'fly' nor 'flyctl' found on PATH"; exit 1; }
          FLEET_PREFIX="$(sed -nE 's#^fleet:[[:space:]]*([^[:space:]#]+).*#\1#p' \
                            deployments/defaults.yaml | head -n1)"
          [ -n "${FLEET_PREFIX:-}" ] || { echo "::error::no fleet set in deployments/defaults.yaml"; exit 1; }

          mapfile -t apps < <(scripts/fleet.sh list "$FLEET_PREFIX")
          if [ "${#apps[@]}" -eq 0 ]; then
            echo "::notice::Fleet '$FLEET_PREFIX' has no instances — no canary to gate on."
            echo "image=" >> "$GITHUB_OUTPUT"; echo "generic_src=" >> "$GITHUB_OUTPUT"; exit 0
          fi

          # Pick the generic image source — the canary, preferred (it's the smoke
          # target). Team-flavored apps rebuild their own image, so they can't be it.
          team_deps_for() { python scripts/render-team-deps.py "${1#"${FLEET_PREFIX}"-}"; }
          canary="${FLEET_PREFIX}-canary"
          generic_src=""
          for cand in "$canary" "${apps[@]}"; do
            printf '%s\n' "${apps[@]}" | grep -qx "$cand" || continue
            [ -n "$(team_deps_for "$cand")" ] && continue   # team-flavored — not a generic source
            generic_src="$cand"; break
          done
          if [ -z "$generic_src" ]; then
            echo "::warning::no generic/canary instance in the fleet — cannot run the wheel canary gate."
            echo "image=" >> "$GITHUB_OUTPUT"; echo "generic_src=" >> "$GITHUB_OUTPUT"; exit 0
          fi

          # Build + deploy the generic image FROM THE WHEEL (dist/ is in the build
          # context; builder-wheel installs it). Round-trip live config; swap image.
          echo "::group::build + deploy $generic_src (generic base, from the wheel)"
          cfg="$(mktemp -t "fly-$generic_src-XXXX.toml")"
          "$FLY" config save -a "$generic_src" -c "$cfg" --yes
          "$FLY" deploy "$PWD" --config "$cfg" --dockerfile "$PWD/Dockerfile" \
            --build-arg MODASTACK_BUILD=wheel \
            --depot=false --ha=false --wait-timeout 10m --remote-only -a "$generic_src"
          rm -f "$cfg"
          echo "::endgroup::"

          # Functional canary gate — ask the freshly-built canary and assert it
          # answers CANARY-OK end-to-end through the PROD event server. A broken
          # image aborts the whole release here. The deploy only waited for the
          # manager HEALTHCHECK (up BEFORE the session is ready) and the canary
          # auto-suspends, so canary-smoke.sh starts the machine and polls the
          # ask with a generous budget that covers a cold first boot.
          if [ "$generic_src" = "$canary" ]; then
            echo "::group::smoke $canary (functional ask)"
            FLY="$FLY" scripts/canary-smoke.sh "$canary"
            echo "::endgroup::"
          else
            echo "::warning::generic source is $generic_src (no '$canary' in the fleet) — published/rolled without a functional smoke."
          fi

          # `fly image show --json` exposes Repository + Digest (Ref/Reference come
          # back null), so construct the immutable pull reference ourselves.
          image="$("$FLY" image show -a "$generic_src" --json | jq -r '
            (.[0] // .) as $i
            | if ($i.Repository and $i.Digest)
              then "registry.fly.io/\($i.Repository)@\($i.Digest)"
              else empty end')"
          [ -n "$image" ] || { echo "::error::could not resolve built image for $generic_src"; exit 1; }
          echo "Generic release image (from the wheel): $image"
          echo "image=$image" >> "$GITHUB_OUTPUT"
          echo "generic_src=$generic_src" >> "$GITHUB_OUTPUT"

  # --------------------------------------------------------------------------
  # Publish the SAME wheel the canary proved — gated on build-canary, NOT the fleet
  # roll. Trusted publishing (OIDC): this step must live in the top-level workflow
  # the PyPI publisher config names (release.yml), so it stays a native job here.
  publish:
    name: Publish to PyPI
    needs: build-canary
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      # Upload the SAME bytes the canary verified — do NOT rebuild.
      - name: Download the proven artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # --------------------------------------------------------------------------
  # Roll the rest of the fleet — gated on the canary, in parallel with publish.
  # Generic instances reuse the canary's image digest (build once, deploy many);
  # a team-flavored instance rebuilds its OWN image from the wheel + its TEAM_DEPS.
  roll-fleet:
    name: Roll the fleet
    needs: build-canary
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      IMAGE: ${{ needs.build-canary.outputs.image }}
      GENERIC_SRC: ${{ needs.build-canary.outputs.generic_src }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.event.inputs.ref || github.ref }}

      - name: Stage the prebuilt wheel into the build context
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install modastack (for the team-deps renderer)
        run: pip install -e .

      - name: Roll the remaining fleet apps
        run: |
          set -euo pipefail
          if [ -z "${FLY_API_TOKEN:-}" ]; then
            echo "::notice::FLY_API_TOKEN unset — fleet not wired, skipping."; exit 0
          fi
          FLY="$(command -v fly || command -v flyctl)" \
            || { echo "::error::neither 'fly' nor 'flyctl' found on PATH"; exit 1; }
          FLEET_PREFIX="$(sed -nE 's#^fleet:[[:space:]]*([^[:space:]#]+).*#\1#p' \
                            deployments/defaults.yaml | head -n1)"
          [ -n "${FLEET_PREFIX:-}" ] || { echo "::error::no fleet set in deployments/defaults.yaml"; exit 1; }

          mapfile -t apps < <(scripts/fleet.sh list "$FLEET_PREFIX")
          if [ "${#apps[@]}" -eq 0 ]; then
            echo "Fleet '$FLEET_PREFIX' has no instances — nothing to roll."; exit 0
          fi
          echo "Fleet ($FLEET_PREFIX): ${apps[*]}  (generic source already done: ${GENERIC_SRC:-none})"

          # redeploy APP [IMAGE] [TEAM_DEPS] — round-trip the app's live config
          # (env/[[mounts]]/[[vm]], no [build] key — we deploy via --dockerfile)
          # and deploy. Three modes:
          #   IMAGE set      → reuse that exact ref (the canary's wheel image; built once).
          #   TEAM_DEPS set  → rebuild the team's OWN image from the wheel + its deps hook.
          #   neither        → build the plain generic image from the wheel.
          redeploy() {
            local app="$1" image="${2:-}" team_deps="${3:-}" cfg
            cfg="$(mktemp -t "fly-$app-XXXX.toml")"
            "$FLY" config save -a "$app" -c "$cfg" --yes
            if [ -n "$image" ]; then
              "$FLY" deploy --config "$cfg" --image "$image" \
                --ha=false --wait-timeout 10m -a "$app"
            elif [ -n "$team_deps" ]; then
              "$FLY" deploy "$PWD" --config "$cfg" --dockerfile "$PWD/Dockerfile" \
                --build-arg MODASTACK_BUILD=wheel --build-arg "TEAM_DEPS=$team_deps" \
                --depot=false --ha=false --wait-timeout 10m --remote-only -a "$app"
            else
              "$FLY" deploy "$PWD" --config "$cfg" --dockerfile "$PWD/Dockerfile" \
                --build-arg MODASTACK_BUILD=wheel \
                --depot=false --ha=false --wait-timeout 10m --remote-only -a "$app"
            fi
            rm -f "$cfg"
          }
          team_deps_for() { python scripts/render-team-deps.py "${1#"${FLEET_PREFIX}"-}"; }

          fails=()
          for app in "${apps[@]}"; do
            [ -n "${GENERIC_SRC:-}" ] && [ "$app" = "$GENERIC_SRC" ] && continue
            td="$(team_deps_for "$app")"
            echo "::group::deploy $app"
            if [ -n "$td" ]; then
              # team-flavored: rebuild its OWN image (its baked tools) on the new wheel.
              if redeploy "$app" "" "$td"; then echo "ok (team image): $app"
              else echo "::error::rollout failed for $app"; fails+=("$app"); fi
            elif [ -n "${IMAGE:-}" ]; then
              if redeploy "$app" "$IMAGE"; then echo "ok: $app"
              else echo "::error::rollout failed for $app"; fails+=("$app"); fi
            else
              if redeploy "$app"; then echo "ok (generic build): $app"
              else echo "::error::rollout failed for $app"; fails+=("$app"); fi
            fi
            echo "::endgroup::"
          done

          if [ "${#fails[@]}" -gt 0 ]; then
            echo "::error::Fleet rollout incomplete — failed: ${fails[*]}"
            echo "Re-run this workflow to retry (deploys are idempotent)."
            exit 1
          fi
          echo "Fleet rolled (${#apps[@]} instance(s); generic image: ${IMAGE:-none}; team-flavored instances rebuilt their own)."

  # --------------------------------------------------------------------------
  # Deploy the Cloudflare event server — gated on the canary, not PyPI publish.
  # The event server is a Cloudflare Worker built from event-server/src; it has
  # no dependency on the published wheel, so it runs concurrently with publish.
  deploy-event-server:
    name: Deploy event server
    needs: build-canary
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: event-server
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.event.inputs.ref || github.ref }}

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: event-server/package-lock.json

      - run: npm ci

      - run: npx vitest run

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: event-server
          command: deploy

  # --------------------------------------------------------------------------
  # Bump the Homebrew formula to the freshly-published version.
  update-homebrew:
    name: Update Homebrew formula
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from the release tag
        id: version
        # Prefer the Release's tag; fall back to the ref name for a manual dispatch.
        env:
          TAG: ${{ github.event.release.tag_name || github.ref_name }}
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Trigger Homebrew formula update
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: moda-labs/homebrew-modastack
          event-type: pypi-release
          client-payload: '{"version": "${{ steps.version.outputs.version }}"}'

  # --------------------------------------------------------------------------
  # Reconcile each deployment's package CONTENT + SECRETS onto the freshly-rolled
  # image — the FINAL release step. Image FIRST (roll-fleet), packages/secrets
  # SECOND. Reuses the standalone team-deploy workflow as a called step, so the
  # same `modastack deploy` reconcile runs from a release and from a `deploy-*`
  # tag. `secrets: inherit` forwards FLY_API_TOKEN + the per-tenant Environment
  # secrets; `ref` pins the reconcile to the released commit.
  deploy-teams:
    name: Deploy team packages + secrets
    needs: roll-fleet
    uses: ./.github/workflows/deploy-agent-teams.yml
    secrets: inherit
    with:
      ref: ${{ github.event.release.tag_name || github.event.inputs.ref || github.ref }}
