name: Release

# The single gated release pipeline for the Fly fleet, on a published GitHub
# Release (C22 / #342; docs/design/CONTAINERIZED_INSTANCES.md §10). Two ordered
# layers — image FIRST, then team packages + secrets — under one success gate:
#
#   1. subscription-login-smoke  gate the whole release on a verified login path.
#   2. build-images              build + ROLL the new framework image across the
#                                fleet (this file). Build-once-on-canary, smoke it,
#                                reuse the digest; team-flavored instances rebuild
#                                their own image. Secrets/config are PRESERVED — an
#                                image swap doesn't touch them.
#   3. deploy-teams              reconcile every deployment's package CONTENT +
#                                SECRETS onto the freshly-rolled image, by CALLING
#                                deploy-agent-teams.yml (workflow_call). Runs only
#                                after build-images succeeds, so the image always
#                                precedes the package/secret reconcile.
#
# The split is deliberate: the image roll is CROSS-FLEET (build once, reuse the
# digest N times) so it can't be a per-instance `modastack deploy` loop; the team
# reconcile IS that per-instance loop (deploy-agent-teams.yml), reused here as the
# final step and standalone (a `deploy-*` tag) for image-free team-definition edits.
#
# --- build-images ---
# Independent of PyPI: the Fly image builds from source (Dockerfile), so the
# rollout does not wait on the wheel. Build the shared GENERIC image ONCE — on the
# CANARY — then SMOKE the canary (a functional `ask` proving the new image's agent
# responds end-to-end through the prod event server) and only proceed if it passes.
# This canary gate is the on-Fly replacement for the retired EC2 release smoke
# (publish-pypi.yml). Then roll the rest: generic instances reuse the shared image
# ref (build once, deploy many — design §2); a TEAM-FLAVORED instance (its team
# declares a `build:` spec, C24 #368) instead rebuilds its OWN image with its
# TEAM_DEPS hook on the new framework wheel — rolling the generic image onto it
# would strip its baked tools and break dispatch. Each app keeps its own volume,
# sessions, env and secrets: we round-trip the live config with `fly config save`
# and only swap the image, so C9 idempotency makes the restart safe and sessions
# resume.
#
# Per-app failures are isolated and reported; the Action log IS the deploy log.
# A re-run is the recovery model (idempotent + C7 format-version guard).
#
# Required configuration:
#   deployments/defaults.yaml `fleet:`   fleet namespace (enumerated by the
#                                         MODASTACK_FLEET stamp). Single source of
#                                         fleet truth, shared with deploy-agent-teams.
#   secrets.FLY_API_TOKEN                 Fly deploy token (org-scoped) for flyctl.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref/tag to build and roll out (default: this branch)"
        required: false

# One release rollout at a time across the whole fleet.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # --------------------------------------------------------------------------
  # Subscription-login smoke (#388). GATE the fleet roll on a verified
  # subscription bootstrap so the _extract_code-class integration gap that #386
  # fixed can't ship silently again. This drives a *subscription-mode* instance
  # of the bootstrap to "waiting for code" and feeds it a SYNTHETIC code through
  # the real PTY driver, asserting credentials land. It is hermetic:
  #   * NO real Anthropic/OAuth credentials — `claude auth login` is faked by a
  #     stand-in PTY process; the only thing written is a dummy creds file.
  #   * NO Slack / event-server network — the Slack post and event-bus wait are
  #     stubbed; the code is the synthetic one we feed in.
  # The mock auth-code event uses the REAL Slack adapter output shape, generated
  # from event-server/src/adapters/slack.ts (so adapter + bootstrap can't drift),
  # exactly as tests/integration/test_login_bootstrap_smoke.py does.
  subscription-login-smoke:
    name: Subscription-login smoke (mock code, no creds)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Node is needed only to GENERATE the auth-code event from slack.ts via
      # the adapter's own logic (esbuild type-erasure). No event-server deploy.
      - uses: actions/setup-node@v5
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install modastack
        run: pip install -e . pytest

      - name: Drive subscription bootstrap to "waiting for code" + accept a synthetic code
        # MODASTACK_AUTH=subscription puts us in subscription mode; we assert the
        # bootstrap reaches the event-bus wait, accepts a synthetic code carried
        # in a REAL-adapter-shaped event, feeds it to the (faked) `claude auth
        # login` over a PTY, and only then writes credentials. No real creds.
        env:
          MODASTACK_AUTH: subscription
          # Belt-and-suspenders: prove nothing real leaks in.
          ANTHROPIC_API_KEY: ""
          CLAUDE_CODE_OAUTH_TOKEN: ""
        run: |
          set -euo pipefail
          # The integration smoke IS the verifier — it exercises the full
          # subscription bootstrap path with a synthetic/mock code end-to-end.
          python -m pytest tests/integration/test_login_bootstrap_smoke.py -v

  build-images:
    name: Build & roll fleet images
    runs-on: ubuntu-latest
    # Don't roll the fleet unless the subscription-login path is verified (#388).
    needs: subscription-login-smoke
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.event.inputs.ref || github.ref }}

      - uses: superfly/flyctl-actions/setup-flyctl@master

      # Needed by scripts/render-team-deps.py to render a team-flavored
      # instance's TEAM_DEPS hook so its own image rebuilds on the new framework.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install modastack (for the team-deps renderer)
        run: pip install -e .

      - name: Roll the fleet
        run: |
          set -euo pipefail
          [ -n "${FLY_API_TOKEN:-}" ] || { echo "::notice::FLY_API_TOKEN unset — fleet not wired, skipping."; exit 0; }
          # `fly` is the current binary name; some flyctl installs (incl. the
          # setup-flyctl action) only expose `flyctl`. Detect either — the same
          # pattern deploy.py (_fly_bin), provision-instance.sh, and fleet.sh use.
          FLY="$(command -v fly || command -v flyctl)" \
            || { echo "::error::neither 'fly' nor 'flyctl' found on PATH"; exit 1; }
          # Fleet namespace: the single source of truth is deployments/defaults.yaml.
          FLEET_PREFIX="$(sed -nE 's#^fleet:[[:space:]]*([^[:space:]#]+).*#\1#p' \
                            deployments/defaults.yaml | head -n1)"
          [ -n "${FLEET_PREFIX:-}" ] || { echo "::error::no fleet set in deployments/defaults.yaml"; exit 1; }

          mapfile -t apps < <(scripts/fleet.sh list "$FLEET_PREFIX")
          if [ "${#apps[@]}" -eq 0 ]; then
            echo "Fleet '$FLEET_PREFIX' has no instances — nothing to roll."; exit 0
          fi
          echo "Fleet ($FLEET_PREFIX): ${apps[*]}"

          # redeploy APP [IMAGE] [TEAM_DEPS] — round-trip the app's live config
          # (env/[[mounts]]/[[vm]], no [build] key — we deploy via --dockerfile)
          # and deploy. Three modes:
          #   IMAGE set      → reuse that exact ref (the shared generic image; build once).
          #   TEAM_DEPS set  → build from source WITH the team's deps hook (C24) —
          #                    a team-flavored instance rebuilds its OWN image on the
          #                    new framework wheel (tool layers cached on Fly's builder).
          #   neither        → build the plain generic image from source.
          redeploy() {
            local app="$1" image="${2:-}" team_deps="${3:-}" cfg
            cfg="$(mktemp -t "fly-$app-XXXX.toml")"
            "$FLY" config save -a "$app" -c "$cfg" --yes
            if [ -n "$image" ]; then
              "$FLY" deploy --config "$cfg" --image "$image" \
                --ha=false --wait-timeout 10m -a "$app"
            elif [ -n "$team_deps" ]; then
              "$FLY" deploy "$PWD" --config "$cfg" --dockerfile "$PWD/Dockerfile" \
                --build-arg "TEAM_DEPS=$team_deps" \
                --depot=false --ha=false --wait-timeout 10m --remote-only -a "$app"
            else
              "$FLY" deploy "$PWD" --config "$cfg" --dockerfile "$PWD/Dockerfile" \
                --depot=false --ha=false --wait-timeout 10m --remote-only -a "$app"
            fi
            rm -f "$cfg"
          }

          # team-deps relpath for an APP's deployment (empty = generic). Renders the
          # hook into the build context so a team-flavored instance rebuilds its own
          # image; a generic instance rolls the shared base image.
          team_deps_for() { python scripts/render-team-deps.py "${1#"${FLEET_PREFIX}"-}"; }

          # Build the shared generic base image on a GENERIC instance (the canary,
          # preferred — it's also the smoke target). Team-flavored instances can't be
          # the generic source (they rebuild their own image), so skip them here.
          canary="${FLEET_PREFIX}-canary"
          generic_src=""
          for cand in "$canary" "${apps[@]}"; do
            printf '%s\n' "${apps[@]}" | grep -qx "$cand" || continue
            [ -n "$(team_deps_for "$cand")" ] && continue   # team-flavored — not a generic source
            generic_src="$cand"; break
          done

          image=""
          if [ -n "$generic_src" ]; then
            echo "::group::build + deploy $generic_src (generic base)"
            redeploy "$generic_src"
            echo "::endgroup::"

            # Functional canary gate — the on-Fly replacement for the retired EC2
            # release smoke (publish-pypi.yml): ask the freshly-built canary and
            # assert it answers CANARY-OK end-to-end through the PROD event server
            # BEFORE rolling the rest of the fleet. A broken image aborts here
            # instead of propagating. The deploy already waited for the image
            # HEALTHCHECK, so the manager should answer at once; retry covers a slow
            # reconnect after restart.
            if [ "$generic_src" = "$canary" ]; then
              echo "::group::smoke $canary (functional ask)"
              ask='gosu modastack env HOME=/data/home bash -c "cd /data/project && /opt/venv/bin/modastack ask \"Release canary smoke: reply with exactly CANARY-OK and nothing else.\" --timeout 180"'
              ok=""
              for attempt in 1 2 3; do
                resp="$("$FLY" ssh console -a "$canary" -C "$ask" 2>&1 || true)"
                printf '%s' "$resp" | grep -q "CANARY-OK" && { ok=1; break; }
                echo "canary not ready (attempt $attempt/3) — retrying in 30s"; sleep 30
              done
              [ -n "$ok" ] || { echo "::error::canary smoke FAILED — $canary did not answer CANARY-OK; aborting rollout."; exit 1; }
              echo "Canary smoke passed — $canary answered CANARY-OK."
              echo "::endgroup::"
            fi

            # `fly image show --json` exposes Repository + Digest (the Ref/Reference
            # fields are null), so construct the immutable pull reference ourselves.
            image="$("$FLY" image show -a "$generic_src" --json | jq -r '
              (.[0] // .) as $i
              | if ($i.Repository and $i.Digest)
                then "registry.fly.io/\($i.Repository)@\($i.Digest)"
                else empty end')"
            [ -n "$image" ] || { echo "::error::could not resolve built image for $generic_src"; exit 1; }
            echo "Generic release image: $image"
          else
            echo "::notice::no generic instance in the fleet — every app rebuilds its own team image."
          fi

          fails=()
          for app in "${apps[@]}"; do
            [ "$app" = "$generic_src" ] && continue
            td="$(team_deps_for "$app")"
            echo "::group::deploy $app"
            if [ -n "$td" ]; then
              # team-flavored: rebuild its OWN image (its baked tools) on the new framework.
              if redeploy "$app" "" "$td"; then echo "ok (team image): $app"
              else echo "::error::rollout failed for $app"; fails+=("$app"); fi
            elif [ -n "$image" ]; then
              if redeploy "$app" "$image"; then echo "ok: $app"
              else echo "::error::rollout failed for $app"; fails+=("$app"); fi
            else
              if redeploy "$app"; then echo "ok (generic build): $app"
              else echo "::error::rollout failed for $app"; fails+=("$app"); fi
            fi
            echo "::endgroup::"
          done

          if [ "${#fails[@]}" -gt 0 ]; then
            echo "::error::Fleet rollout incomplete — failed: ${fails[*]}"
            echo "Re-run this workflow to retry (deploys are idempotent)."
            exit 1
          fi
          echo "Fleet rolled (${#apps[@]} instance(s); generic image: ${image:-none}; team-flavored instances rebuilt their own)."

  # --------------------------------------------------------------------------
  # Reconcile each deployment's package CONTENT + SECRETS onto the freshly-rolled
  # image — the FINAL release step. Image FIRST (build-images), packages/secrets
  # SECOND. This reuses the standalone team-deploy workflow as a called step, so
  # the same `modastack deploy` reconcile runs from a release and from a `deploy-*`
  # tag. `secrets: inherit` forwards FLY_API_TOKEN + the per-tenant Environment
  # secrets; `ref` pins the reconcile to the released commit.
  deploy-teams:
    name: Deploy team packages + secrets
    needs: build-images
    uses: ./.github/workflows/deploy-agent-teams.yml
    secrets: inherit
    with:
      ref: ${{ github.event.release.tag_name || github.event.inputs.ref || github.ref }}
