name: Release

# The single gated release pipeline, on a published GitHub Release (C22 / #342;
# docs/CONTAINERIZED_DEPLOYMENT.md §6). ONE functional gate - a canary
# running the EXACT wheel we're about to ship — guards BOTH irreversible actions
# (PyPI publish + Homebrew). Build once, prove once, then publish:
#
#   1. subscription-login-smoke  gate the release on a verified login path (#388).
#   2. build-wheel               `python -m build` the wheel/sdist ONCE; upload it.
#   3. fleet                     → release-fleet.yml: deploy the Worker the canary
#                                talks to, then deploy the canary from an image
#                                built FROM that wheel (BOBI_BUILD=wheel) and
#                                SMOKE it — a functional `ask` proving the agent
#                                answers CANARY-OK end-to-end. THIS is the gate.
#   4. publish                   needs fleet → upload the SAME wheel to PyPI
#                                and update/smoke Homebrew.
#   5. image                     → release-image.yml: needs a canary that actually
#                                RAN → build the base image per-arch (natively,
#                                no QEMU) FROM the same wheel and publish
#                                ghcr.io/moda-labs/bobi:<version> (#609); :latest
#                                tracks the repo's latest non-prerelease release.
#
# Repo-split phase 1: the Fly/Worker/image halves live in the two called
# workflow files (release-fleet.yml, release-image.yml), which move WHOLE to
# the private repo at cut time. This file keeps the public release (wheel +
# PyPI + Homebrew); at cut time the `fleet`/`image` caller jobs are deleted and
# `publish` re-gates on the public jobs only.
#
# Why the canary is built from the WHEEL, not source: it then proves the exact
# artifact we publish actually boots and answers — catching wheel/sdist packaging
# bugs (missing entry point / package_data) a source rebuild never would. Each app
# keeps its volume/sessions/env/secrets: we round-trip the live config with `fly
# config save` and only swap the canary image, so C9 idempotency makes the restart
# safe. Production fleet rollout is owned by fleet repos such as moda-agents.
#
# Why publish lives here (not a reusable workflow): PyPI trusted publishing rejects
# a reusable workflow (`invalid-publisher`) — the OIDC publish step must run in the
# top-level file the PyPI trusted-publisher config names. So the PyPI publisher is
# configured for THIS workflow (release.yml), environment `pypi`.
#
# Required configuration:
#   deployments/defaults.yaml `fleet:`   fleet namespace for the ci-canary app.
#   secrets.FLY_API_TOKEN                 Fly deploy token (org-scoped) for flyctl.
#   PyPI trusted publisher for release.yml + environment `pypi` (OIDC; no token).
#   secrets.CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID   event-server deploy.
#   secrets.HOMEBREW_TAP_TOKEN            dispatch the formula bump.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref/tag to build and roll out (default: this branch)"
        required: false

# One release at a time.
concurrency:
  group: release
  cancel-in-progress: false

# contents: read for checkout; id-token: write for PyPI trusted publishing.
permissions:
  contents: read
  id-token: write

jobs:
  # --------------------------------------------------------------------------
  # Subscription-login smoke (#388). GATE the release on a verified subscription
  # bootstrap so the _extract_code-class integration gap that #386 fixed can't ship
  # silently again. This drives a *subscription-mode* instance of the bootstrap to
  # "waiting for code" and feeds it a SYNTHETIC code through the real PTY driver,
  # asserting credentials land. It is hermetic:
  #   * NO real Anthropic/OAuth credentials — `claude auth login` is faked by a
  #     stand-in PTY process; the only thing written is a dummy creds file.
  #   * NO Slack / event-server network — the Slack post and event-bus wait are
  #     stubbed; the code is the synthetic one we feed in.
  # The mock auth-code event uses the REAL Slack adapter output shape, generated
  # from event-server/core/src/adapters/chat-sdk-slack.ts (so adapter + bootstrap
  # can't drift), exactly as tests/integration/test_login_bootstrap_smoke.py does.
  subscription-login-smoke:
    name: Subscription-login smoke (mock code, no creds)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Node is needed only to GENERATE the auth-code event from
      # chat-sdk-slack.ts via the adapter's own logic (esbuild bundle).
      # No event-server deploy.
      - uses: actions/setup-node@v5
        with:
          node-version: "20"

      # chat-sdk-slack.ts imports @chat-adapter/slack; the smoke bundles the
      # adapter with esbuild, so the event-server deps must be installed
      # (otherwise the test skips and the gate is meaningless).
      - name: Install event-server Node dependencies
        run: npm ci --no-audit --no-fund
        working-directory: event-server

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bobi
        run: pip install -e . pytest

      - name: Drive subscription bootstrap to "waiting for code" + accept a synthetic code
        # BOBI_AUTH=subscription puts us in subscription mode; we assert the
        # bootstrap reaches the event-bus wait, accepts a synthetic code carried
        # in a REAL-adapter-shaped event, feeds it to the (faked) `claude auth
        # login` over a PTY, and only then writes credentials. No real creds.
        env:
          BOBI_AUTH: subscription
          # Belt-and-suspenders: prove nothing real leaks in.
          ANTHROPIC_API_KEY: ""
          CLAUDE_CODE_OAUTH_TOKEN: ""
        run: |
          set -euo pipefail
          # The integration smoke IS the verifier — it exercises the full
          # subscription bootstrap path with a synthetic/mock code end-to-end.
          python -m pytest tests/integration/test_login_bootstrap_smoke.py -v

  # --------------------------------------------------------------------------
  # Build the wheel/sdist ONCE. This exact artifact is what the canary smokes, what
  # the fleet runs, and what we publish — built a single time so all three agree.
  build-wheel:
    name: Build the release wheel
    runs-on: ubuntu-latest
    # version: the release version, read from the wheel FILENAME - the released
    # bytes are the single source of truth, never a ref name (a dispatch from a
    # branch must not mint a bogus tag). claude-version: the floating `stable`
    # channel resolved ONCE to an exact version, so the canary image and every
    # published arch bake the identical claude CLI (the Dockerfile default
    # would re-resolve the channel at each build).
    outputs:
      version: ${{ steps.meta.outputs.version }}
      claude-version: ${{ steps.meta.outputs.claude-version }}
      source-sha: ${{ steps.meta.outputs.source-sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.event.inputs.ref || github.ref }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build wheel + sdist
        run: pip install build && python -m build

      - name: Fail-fast sanity — the wheel at least imports + runs
        # Cheap guard so we don't spin up a Fly canary build for a wheel that won't
        # even load. The real functional proof is the canary smoke; this just avoids
        # wasting the expensive build on an obviously-broken artifact.
        run: |
          set -euo pipefail
          python -m venv /tmp/whl && /tmp/whl/bin/pip install --quiet dist/*.whl
          /tmp/whl/bin/bobi --version

      - name: Upload the release artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Resolve release version + claude CLI pin
        id: meta
        run: |
          set -euo pipefail
          whl="$(basename dist/*.whl)"
          echo "version=$(echo "$whl" | cut -d- -f2)" >> "$GITHUB_OUTPUT"
          echo "source-sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          curl -fsSL https://claude.ai/install.sh | bash -s -- stable
          echo "claude-version=$("$HOME/.local/bin/claude" --version | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"

  # --------------------------------------------------------------------------
  # THE GATE (called workflow, private-bound): deploy the event server, then
  # build the brain canaries FROM the just-built wheel and functionally smoke
  # them. A broken wheel/image fails here and blocks PyPI/Homebrew publish.
  # `smoked` is true only when the canary gate actually RAN (it is skipped
  # when FLY_API_TOKEN is unset — fleet not wired).
  fleet:
    name: Fleet gate
    needs: [subscription-login-smoke, build-wheel]
    uses: ./.github/workflows/release-fleet.yml
    with:
      version: ${{ needs.build-wheel.outputs.version }}
      claude-version: ${{ needs.build-wheel.outputs.claude-version }}
      source-sha: ${{ needs.build-wheel.outputs.source-sha }}
    secrets: inherit

  # --------------------------------------------------------------------------
  # Publish the SAME wheel the canary proved — gated on the fleet gate, NOT the
  # fleet roll. Trusted publishing (OIDC): this step must live in the top-level
  # workflow the PyPI publisher config names (release.yml), so it stays a
  # native job here.
  publish:
    name: Publish to PyPI
    needs: fleet
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      # Upload the SAME bytes the canary verified — do NOT rebuild.
      - name: Download the proven artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # --------------------------------------------------------------------------
  # The GHCR base image (called workflow, private-bound). Gates, both required
  # because GHCR auth is the always-present GITHUB_TOKEN (no external backstop
  # like PyPI's trusted-publisher config):
  #   * a canary that actually RAN (the fleet `smoked` output) — plain job
  #     success also covers the fleet-not-wired skip;
  #   * a release-tag-shaped ref - a bare dispatch from a branch would bake an
  #     UNRELEASED wheel whose version collides with an already-published tag.
  # Deliberately NOT in publish's `needs`: an image failure never blocks PyPI.
  image:
    name: Base image
    needs: [build-wheel, fleet]
    if: >-
      needs.fleet.outputs.smoked == 'true' &&
      (github.event_name == 'release' ||
       startsWith(github.event.inputs.ref || github.ref_name, 'v'))
    uses: ./.github/workflows/release-image.yml
    permissions:
      contents: read
      packages: write
    with:
      version: ${{ needs.build-wheel.outputs.version }}
      claude-version: ${{ needs.build-wheel.outputs.claude-version }}
      source-sha: ${{ needs.build-wheel.outputs.source-sha }}

  # --------------------------------------------------------------------------
  # Bump the Homebrew formula to the freshly-published version.
  update-homebrew:
    name: Update Homebrew formula
    # build-wheel is in `needs` for its version output (from the wheel
    # filename, the same single source of truth the image workflow uses) - the
    # execution ordering already flows through publish.
    needs: [publish, build-wheel]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.build-wheel.outputs.source-sha }}

      - name: Trigger Homebrew formula update
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: moda-labs/homebrew-bobi-agent
          event-type: pypi-release
          client-payload: '{"version": "${{ needs.build-wheel.outputs.version }}"}'

      - name: Smoke Homebrew bottle URLs
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: scripts/smoke-homebrew-bottles.sh "${{ needs.build-wheel.outputs.version }}"
