name: Worker integration

# Event-server integration tests against a real `wrangler dev` (repo-split
# phase 1). The Cloudflare Worker adapter moves to the private repo at cut
# time, so its CI lives in this whole-file unit rather than inside ci.yml.
# The public event-server gates (typecheck + vitest over the events-core
# package and local.ts) stay in ci.yml. Triggers mirror ci.yml so coverage is
# unchanged by the split.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"  # nightly at 6am UTC
  workflow_dispatch: {}

jobs:
  integration-wrangler:
    name: Integration tests (wrangler dev)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Install event-server Node dependencies
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if npm ci --no-audit --no-fund; then
              exit 0
            fi
            echo "::warning::npm ci attempt ${attempt} failed; retrying after clearing install state"
            rm -rf node_modules
            npm cache clean --force
            sleep 5
          done
          echo "::error::npm ci failed after 3 attempts"
          exit 1
        working-directory: event-server

      - name: Run event-server integration tests against wrangler dev
        env:
          BOBI_TEST_WRANGLER: "1"
        run: >-
          pytest tests/integration/test_event_server.py
          -k "wrangler"
          --timeout=120 -v
