name: Publish to PyPI

# Publish the wheel/sdist to PyPI on a published GitHub Release (the same gate as
# the Fly release.yml — cutting a Release ships everywhere).
#
# Gated on a FUNCTIONAL artifact smoke: PyPI is irreversible (a burned version
# number can't be re-uploaded) and Homebrew points straight at it, so we never
# upload an unverified build. The `build-and-smoke` job builds the wheel, installs
# THAT artifact into a clean venv (no repo on PATH, not from PyPI) and runs it, then
# the `publish` job uploads the SAME bytes — test the artifact, ship the tested
# artifact. The canary smoke in release.yml proves the SOURCE runs; this proves the
# packaged WHEEL installs and runs (entry point, imports, package data).
#
# Trusted publishing (OIDC) requires the publish step to live in a NON-reusable,
# top-level workflow whose filename matches the PyPI trusted-publisher config
# (`publish-pypi.yml`) — PyPI rejects a reusable workflow with `invalid-publisher`.
# That's why this stays its own workflow rather than a workflow_call from release.yml.

on:
  release:
    types: [published]
  # Manual escape hatch (re-publish a release that failed downstream). Build +
  # smoke still gate it; trusted publishing still applies.
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build-and-smoke:
    name: Build wheel + functional install smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build package
        run: pip install build && python -m build

      - name: Functional smoke — install the built wheel clean and run it
        # Install the EXACT artifact we are about to publish into a throwaway venv:
        # no repo on PATH, nothing from PyPI. Catches packaging bugs the source-built
        # canary can't see (missing entry point, missing package_data, bad imports).
        run: |
          set -euo pipefail
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install --upgrade pip
          /tmp/smoke/bin/pip install dist/*.whl
          # Entry point resolves + version loads:
          /tmp/smoke/bin/modastack --version
          # The whole CLI tree imports (every subcommand module is loaded):
          /tmp/smoke/bin/modastack --help >/dev/null
          # Package DATA shipped in the wheel — `skill` prints a bundled guide, so a
          # missing skills/ payload fails here instead of at a user's `uv tool install`:
          /tmp/smoke/bin/modastack skill >/dev/null
          # The package imports from outside its source tree:
          (cd /tmp && /tmp/smoke/bin/python -c "import modastack")

      - name: Upload the tested artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build-and-smoke
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      # Publish the SAME bytes the smoke verified — do NOT rebuild.
      - name: Download the tested artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # NOTE: the post-publish release smoke + "promote to prod director" job ran on
  # a self-hosted EC2 runner and upgraded the EC2 director in-place. The EC2
  # director was retired when eng-team moved to Fly (C24, #368) — release smoke is
  # now covered by container.yml (build → health → blocking ask, on every image
  # change) and the Fly canary roll on a published GitHub Release (release.yml).

  deploy-event-server:
    name: Deploy event server
    needs: publish
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: event-server
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: event-server/package-lock.json

      - run: npm ci

      - run: npx vitest run

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: event-server
          command: deploy

  update-homebrew:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from the release tag
        id: version
        # Prefer the Release's tag; fall back to the ref name for a manual dispatch.
        env:
          TAG: ${{ github.event.release.tag_name || github.ref_name }}
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Trigger Homebrew formula update
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: moda-labs/homebrew-modastack
          event-type: pypi-release
          client-payload: '{"version": "${{ steps.version.outputs.version }}"}'
