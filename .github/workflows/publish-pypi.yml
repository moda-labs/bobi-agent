name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  dogfood:
    name: Dogfood end-to-end
    needs: publish
    runs-on: self-hosted
    timeout-minutes: 15
    env:
      DOGFOOD_REPO: moda-labs/modastack-dogfood
      DOGFOOD_DIR: /home/ubuntu/dev/modastack-dogfood
    steps:
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Wait for PyPI availability
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          VERSION="${{ steps.version.outputs.version }}"
          for i in $(seq 1 30); do
            if pip index versions modastack 2>/dev/null | grep -q "$VERSION"; then
              echo "modastack $VERSION available on PyPI"
              exit 0
            fi
            echo "Waiting for PyPI... ($i/30)"
            sleep 10
          done
          exit 1

      - name: Install release via uv
        run: |
          export PATH="$HOME/.local/bin:$HOME/.claude/bin:$PATH"
          VERSION="${{ steps.version.outputs.version }}"
          uv tool install "modastack==$VERSION" --force --refresh
          modastack --version

      - name: Clone or update dogfood repo
        run: |
          if [ -d "$DOGFOOD_DIR" ]; then
            cd "$DOGFOOD_DIR" && git checkout main && git pull --ff-only
          else
            mkdir -p ~/dev
            git clone "https://github.com/$DOGFOOD_REPO" "$DOGFOOD_DIR"
          fi

      - name: Start modastack
        run: |
          export PATH="$HOME/.local/bin:$HOME/.claude/bin:$PATH"
          # Stop any ancestor manager (the parent ~/dev has a running instance)
          cd "$(dirname "$DOGFOOD_DIR")" && modastack stop 2>/dev/null || true
          cd "$DOGFOOD_DIR"
          modastack stop 2>/dev/null || true
          modastack start content-review

          LOG=".modastack/state/manager.log"
          POS=$(wc -c < "$LOG" 2>/dev/null || echo 0)
          for i in $(seq 1 60); do
            tail -c +$POS "$LOG" 2>/dev/null | grep -q "drain loop active\|Modastack running" && break
            sleep 1
          done
          test -f .modastack/state/manager.pid
          echo "Modastack ready"

      - name: Create issue and assign to modastack
        id: issue
        run: |
          export PATH="$HOME/.local/bin:$HOME/.claude/bin:$PATH"
          cd "$DOGFOOD_DIR"
          VERSION="${{ steps.version.outputs.version }}"

          ISSUE_URL=$(gh issue create \
            --repo "$DOGFOOD_REPO" \
            --title "[CI] Release smoke test v${VERSION}" \
            --body "Automated smoke test for modastack v${VERSION}. Write a one-line file, commit, and close this issue." \
            --label "smoke-test,agent" \
            --assignee "modastack")
          ISSUE_NUM=$(echo "$ISSUE_URL" | grep -oE '[0-9]+$')
          echo "issue_num=$ISSUE_NUM" >> "$GITHUB_OUTPUT"
          echo "Created issue #$ISSUE_NUM"

          # Notify the manager about the new issue.
          # Try the event server webhook first; fall back to the CLI
          # inbox if the local event server isn't running (fixes #157).
          WEBHOOK_PAYLOAD="{
            \"action\": \"assigned\",
            \"issue\": {
              \"number\": $ISSUE_NUM,
              \"title\": \"[CI] Release smoke test v${VERSION}\",
              \"state\": \"open\",
              \"labels\": [{\"name\": \"smoke-test\"}, {\"name\": \"agent\"}],
              \"assignees\": [{\"login\": \"modastack\"}],
              \"user\": {\"login\": \"github-actions\"},
              \"body\": \"Automated smoke test. Write a one-line file, commit, and close this issue.\",
              \"html_url\": \"$ISSUE_URL\"
            },
            \"repository\": {\"full_name\": \"$DOGFOOD_REPO\"},
            \"sender\": {\"login\": \"github-actions\"}
          }"

          if curl -sf -X POST "http://localhost:8080/webhooks/github" \
            -H "Content-Type: application/json" \
            -H "x-github-event: issues" \
            -H "x-github-delivery: smoke-$(date +%s)" \
            -d "$WEBHOOK_PAYLOAD" 2>/dev/null; then
            echo "Event delivered via webhook"
          else
            echo "Event server not reachable — delivering via CLI inbox"
            modastack message "GitHub issue assigned: issue #${ISSUE_NUM} '[CI] Release smoke test v${VERSION}' in ${DOGFOOD_REPO} was assigned to modastack. Action: assigned. Labels: smoke-test, agent. Body: Automated smoke test. Write a one-line file, commit, and close this issue. URL: ${ISSUE_URL}"
          fi

      - name: Wait for modastack to close the issue
        run: |
          export PATH="$HOME/.local/bin:$HOME/.claude/bin:$PATH"
          ISSUE_NUM="${{ steps.issue.outputs.issue_num }}"

          echo "Waiting for modastack to close issue #$ISSUE_NUM..."
          for i in $(seq 1 60); do
            STATE=$(gh issue view "$ISSUE_NUM" --repo "$DOGFOOD_REPO" --json state --jq '.state' 2>/dev/null)
            if [ "$STATE" = "CLOSED" ]; then
              echo "Issue #$ISSUE_NUM closed by modastack"
              echo "=== SMOKE TEST PASSED ==="
              exit 0
            fi
            echo "  Poll $i/60: state=$STATE"
            sleep 10
          done

          echo "Issue #$ISSUE_NUM was not closed within 10 minutes"
          echo "Final state: $(gh issue view $ISSUE_NUM --repo $DOGFOOD_REPO --json state,comments --jq '{state: .state, comments: (.comments | length)}')"
          echo "=== SMOKE TEST FAILED ==="
          exit 1

      - name: Restart modastack in all configured repos
        run: |
          export PATH="$HOME/.local/bin:$HOME/.claude/bin:$PATH"
          VERSION="${{ steps.version.outputs.version }}"

          for config in $(find ~/dev -maxdepth 3 -path '*/.modastack/config.yaml' 2>/dev/null); do
            REPO_DIR=$(dirname $(dirname "$config"))
            REPO_NAME=$(basename "$REPO_DIR")

            # Skip repos without local.yaml (not bootstrapped)
            if [ ! -f "$REPO_DIR/.modastack/local.yaml" ]; then
              echo "[$REPO_NAME] skipped — no local.yaml"
              continue
            fi

            echo "[$REPO_NAME] restarting with v$VERSION..."
            cd "$REPO_DIR"

            # Read agent name from the repo's agent.yaml (required since CLI refactor)
            AGENT=$(python3 -c "import yaml; print(yaml.safe_load(open('$REPO_DIR/.modastack/agent.yaml')).get('agent',''))" 2>/dev/null)
            if [ -z "$AGENT" ]; then
              echo "[$REPO_NAME] skipped — no agent configured in agent.yaml"
              continue
            fi

            modastack stop 2>/dev/null || true
            sleep 1
            modastack start "$AGENT"
            echo "[$REPO_NAME] started with agent $AGENT"
          done

      - name: Cleanup smoke test
        if: always()
        run: |
          export PATH="$HOME/.local/bin:$HOME/.claude/bin:$PATH"
          ISSUE_NUM="${{ steps.issue.outputs.issue_num }}"
          if [ -n "$ISSUE_NUM" ]; then
            STATE=$(gh issue view "$ISSUE_NUM" --repo "$DOGFOOD_REPO" --json state --jq '.state' 2>/dev/null)
            if [ "$STATE" = "OPEN" ]; then
              gh issue close "$ISSUE_NUM" --repo "$DOGFOOD_REPO" \
                --comment "Smoke test did not complete. Closing (cleanup)." 2>/dev/null || true
            fi
          fi

  update-homebrew:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Trigger Homebrew formula update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: moda-labs/homebrew-modastack
          event-type: pypi-release
          client-payload: '{"version": "${{ steps.version.outputs.version }}"}'
