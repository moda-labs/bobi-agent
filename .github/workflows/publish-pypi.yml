name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  dogfood:
    name: Dogfood end-to-end
    needs: publish
    runs-on: self-hosted
    timeout-minutes: 20
    env:
      DOGFOOD_REPO: moda-labs/modastack-dogfood
      PROD_DIR: /home/ubuntu/dev
    steps:
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Wait for PyPI availability
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          VERSION="${{ steps.version.outputs.version }}"
          for i in $(seq 1 30); do
            if pip index versions modastack 2>/dev/null | grep -q "$VERSION"; then
              echo "modastack $VERSION available on PyPI"
              exit 0
            fi
            echo "Waiting for PyPI... ($i/30)"
            sleep 10
          done
          exit 1

      - name: Set up isolated smoke environment
        # Validation runs in a throwaway dir with its own venv and a fresh
        # dogfood clone. The production deployment in ~/dev (director +
        # repos + uv tool install) is not touched until promotion below.
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          VERSION="${{ steps.version.outputs.version }}"
          SMOKE="$RUNNER_TEMP/smoke"
          rm -rf "$SMOKE" && mkdir -p "$SMOKE"
          echo "SMOKE=$SMOKE" >> "$GITHUB_ENV"
          uv venv "$SMOKE/venv"
          uv pip install -p "$SMOKE/venv/bin/python" "modastack==$VERSION"
          "$SMOKE/venv/bin/modastack" --version
          git clone "https://github.com/$DOGFOOD_REPO" "$SMOKE/modastack-dogfood"

      - name: Install agent pack and start smoke instance
        run: |
          export PATH="$HOME/.local/bin:$HOME/.claude/bin:$PATH"
          cd "$SMOKE/modastack-dogfood"
          mkdir -p .modastack
          # Only the Venn key carries over from prod. MODASTACK_EVENT_SERVER
          # stays unset so the smoke instance runs an isolated local event
          # server instead of the production Cloudflare Worker.
          grep '^VENN_API_KEY=' "$PROD_DIR/modastack-dogfood/.modastack/.env" > .modastack/.env || true
          "$SMOKE/venv/bin/modastack" install agents/content-review < /dev/null
          "$SMOKE/venv/bin/modastack" start

          LOG=".modastack/state/manager.log"
          for i in $(seq 1 90); do
            grep -q "Drain loop active\|Modastack running" "$LOG" 2>/dev/null && break
            sleep 2
          done
          test -f .modastack/state/manager.pid
          echo "Smoke instance ready"

      - name: Create issue and assign to modastack
        id: issue
        run: |
          export PATH="$HOME/.local/bin:$HOME/.claude/bin:$PATH"
          cd "$SMOKE/modastack-dogfood"
          VERSION="${{ steps.version.outputs.version }}"

          # Label is smoke-test ONLY (no trigger labels like 'agent') so the
          # production director, which also subscribes to this repo via the
          # cloud event server, ignores it. The smoke instance is driven by
          # the direct webhook injection below, not by labels.
          ISSUE_URL=$(gh issue create \
            --repo "$DOGFOOD_REPO" \
            --title "[CI] Release smoke test v${VERSION}" \
            --body "Automated smoke test for modastack v${VERSION}. Write a one-line file, commit, and close this issue." \
            --label "smoke-test" \
            --assignee "modastack")
          ISSUE_NUM=$(echo "$ISSUE_URL" | grep -oE '[0-9]+$')
          echo "issue_num=$ISSUE_NUM" >> "$GITHUB_OUTPUT"
          echo "Created issue #$ISSUE_NUM"

          # Notify the manager about the new issue.
          # Try the event server webhook first; fall back to the CLI
          # inbox if the local event server isn't running (fixes #157).
          WEBHOOK_PAYLOAD="{
            \"action\": \"assigned\",
            \"issue\": {
              \"number\": $ISSUE_NUM,
              \"title\": \"[CI] Release smoke test v${VERSION}\",
              \"state\": \"open\",
              \"labels\": [{\"name\": \"smoke-test\"}],
              \"assignees\": [{\"login\": \"modastack\"}],
              \"user\": {\"login\": \"github-actions\"},
              \"body\": \"Automated smoke test. Write a one-line file, commit, and close this issue.\",
              \"html_url\": \"$ISSUE_URL\"
            },
            \"repository\": {\"full_name\": \"$DOGFOOD_REPO\"},
            \"sender\": {\"login\": \"github-actions\"}
          }"

          if curl -sf -X POST "http://localhost:8080/webhooks/github" \
            -H "Content-Type: application/json" \
            -H "x-github-event: issues" \
            -H "x-github-delivery: smoke-$(date +%s)" \
            -d "$WEBHOOK_PAYLOAD" 2>/dev/null; then
            echo "Event delivered via webhook"
          else
            echo "Event server not reachable — delivering via CLI inbox"
            "$SMOKE/venv/bin/modastack" message "GitHub issue assigned: issue #${ISSUE_NUM} '[CI] Release smoke test v${VERSION}' in ${DOGFOOD_REPO} was assigned to modastack. Action: assigned. Labels: smoke-test. Body: Automated smoke test. Write a one-line file, commit, and close this issue. URL: ${ISSUE_URL}"
          fi

      - name: Wait for modastack to close the issue
        run: |
          export PATH="$HOME/.local/bin:$HOME/.claude/bin:$PATH"
          ISSUE_NUM="${{ steps.issue.outputs.issue_num }}"

          echo "Waiting for modastack to close issue #$ISSUE_NUM..."
          for i in $(seq 1 60); do
            STATE=$(gh issue view "$ISSUE_NUM" --repo "$DOGFOOD_REPO" --json state --jq '.state' 2>/dev/null)
            if [ "$STATE" = "CLOSED" ]; then
              echo "Issue #$ISSUE_NUM closed by modastack"
              echo "=== SMOKE TEST PASSED ==="
              exit 0
            fi
            echo "  Poll $i/60: state=$STATE"
            sleep 10
          done

          echo "Issue #$ISSUE_NUM was not closed within 10 minutes"
          echo "Final state: $(gh issue view $ISSUE_NUM --repo $DOGFOOD_REPO --json state,comments --jq '{state: .state, comments: (.comments | length)}')"
          echo "=== SMOKE TEST FAILED ==="
          exit 1

      - name: Promote release to production
        # Runs only if the smoke test passed. This is the ONLY step that
        # touches the production deployment: upgrade the uv tool and
        # restart the director at ~/dev (it relaunches project leads).
        run: |
          export PATH="$HOME/.local/bin:$HOME/.claude/bin:$PATH"
          VERSION="${{ steps.version.outputs.version }}"

          uv tool install "modastack==$VERSION" --force --refresh
          modastack --version

          cd "$PROD_DIR"
          modastack stop 2>/dev/null || true
          sleep 2
          modastack start
          sleep 5
          test -f .modastack/state/manager.pid
          kill -0 "$(cat .modastack/state/manager.pid)"
          echo "Production director restarted on v$VERSION"

      - name: Cleanup smoke test
        if: always()
        run: |
          export PATH="$HOME/.local/bin:$HOME/.claude/bin:$PATH"
          if [ -d "$SMOKE/modastack-dogfood" ]; then
            cd "$SMOKE/modastack-dogfood"
            "$SMOKE/venv/bin/modastack" stop --force 2>/dev/null || true
            "$SMOKE/venv/bin/modastack" event-server stop 2>/dev/null || true
          fi
          ISSUE_NUM="${{ steps.issue.outputs.issue_num }}"
          if [ -n "$ISSUE_NUM" ]; then
            STATE=$(gh issue view "$ISSUE_NUM" --repo "$DOGFOOD_REPO" --json state --jq '.state' 2>/dev/null)
            if [ "$STATE" = "OPEN" ]; then
              gh issue close "$ISSUE_NUM" --repo "$DOGFOOD_REPO" \
                --comment "Smoke test did not complete. Closing (cleanup)." 2>/dev/null || true
            fi
          fi
          rm -rf "$SMOKE"

  deploy-event-server:
    name: Deploy event server
    needs: publish
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: event-server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: event-server/package-lock.json

      - run: npm ci

      - run: npx vitest run

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: event-server
          command: deploy

  update-homebrew:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Trigger Homebrew formula update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: moda-labs/homebrew-modastack
          event-type: pypi-release
          client-payload: '{"version": "${{ steps.version.outputs.version }}"}'
