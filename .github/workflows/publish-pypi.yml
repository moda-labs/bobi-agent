name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  smoke:
    # Verifies the published artifact end-to-end with no external repo:
    # install the in-repo pack into a throwaway project, then prove the
    # agent (a) comes up, (b) receives an event from the outside world
    # through the real pipeline (event server -> drain -> inbox), and
    # (c) responds to a blocking `modastack ask`. The old flow dogfooded
    # GitHub issue-lifecycle against moda-labs/modastack-dogfood; that
    # repo is archived (#181) and issue-lifecycle is the eng-team pack's
    # job, not the release gate's.
    name: Release smoke (agent up + responsive)
    needs: publish
    runs-on: self-hosted
    timeout-minutes: 20
    env:
      PROD_DIR: /home/ubuntu/dev
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Wait for PyPI availability
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          VERSION="${{ steps.version.outputs.version }}"
          for i in $(seq 1 30); do
            if pip index versions modastack 2>/dev/null | grep -q "$VERSION"; then
              echo "modastack $VERSION available on PyPI"
              exit 0
            fi
            echo "Waiting for PyPI... ($i/30)"
            sleep 10
          done
          exit 1

      - name: Set up isolated smoke environment
        # Validation runs in a throwaway project dir with its own venv.
        # The production deployment in ~/dev (director + repos + uv tool
        # install) is not touched until promotion below.
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          VERSION="${{ steps.version.outputs.version }}"
          SMOKE="$RUNNER_TEMP/smoke"
          rm -rf "$SMOKE" && mkdir -p "$SMOKE/project"
          echo "SMOKE=$SMOKE" >> "$GITHUB_ENV"
          uv venv "$SMOKE/venv"
          # CPU-only torch first: the smoke env needs embeddings, not CUDA —
          # the GPU wheel stack is ~7GB and overflows the runner disk (#161).
          uv pip install -p "$SMOKE/venv/bin/python" torch --index-url https://download.pytorch.org/whl/cpu
          uv pip install -p "$SMOKE/venv/bin/python" "modastack==$VERSION"
          "$SMOKE/venv/bin/modastack" --version

      - name: Install agent pack and start smoke instance
        run: |
          export PATH="$HOME/.local/bin:$HOME/.claude/bin:$PATH"
          cd "$SMOKE/project"
          git init -q
          mkdir -p .modastack
          # Only the Venn key carries over from prod (the pack's email
          # service preflights it). MODASTACK_EVENT_SERVER stays unset so
          # the smoke instance runs an isolated local event server instead
          # of the production Cloudflare Worker.
          grep '^VENN_API_KEY=' "$PROD_DIR/.modastack/.env" > .modastack/.env
          "$SMOKE/venv/bin/modastack" install "$GITHUB_WORKSPACE/agents/dogfood-content-review" < /dev/null
          "$SMOKE/venv/bin/modastack" start

          LOG=".modastack/state/manager.log"
          for i in $(seq 1 90); do
            grep -q "Drain loop active" "$LOG" 2>/dev/null && break
            sleep 2
          done
          grep -q "Drain loop active" "$LOG" || { echo "Manager never became ready"; tail -40 "$LOG"; exit 1; }
          test -f .modastack/state/manager.pid
          echo "Smoke instance ready"

      - name: 'Smoke 1: event from the outside world reaches the agent'
        # Post a synthetic event to a topic the manager actually subscribed
        # to (read from its own log, so this tracks pack changes) and assert
        # the event server delivered it to a live subscriber, then that it
        # landed in the project event log.
        run: |
          export PATH="$HOME/.local/bin:$HOME/.claude/bin:$PATH"
          cd "$SMOKE/project"
          VERSION="${{ steps.version.outputs.version }}"
          LOG=".modastack/state/manager.log"

          TOPIC=$(grep "Event subscription started" "$LOG" | tail -1 | grep -oE "'[^']+'" | tail -1 | tr -d "'")
          test -n "$TOPIC" || { echo "No subscribed topics found"; exit 1; }
          echo "Posting smoke event to topic: $TOPIC"

          RESP=$(curl -sf -X POST "http://localhost:8080/events/$TOPIC" \
            -H "Content-Type: application/json" \
            -d "{\"type\":\"smoke.ping\",\"source\":\"release-pipeline\",\"payload\":{\"version\":\"$VERSION\",\"text\":\"Automated release smoke ping — no action required.\"}}")
          echo "Event server response: $RESP"
          DELIVERED=$(echo "$RESP" | grep -oE '"delivered_to":[0-9]+' | grep -oE '[0-9]+')
          [ "${DELIVERED:-0}" -ge 1 ] || { echo "Event was not delivered to any subscriber"; exit 1; }

          for i in $(seq 1 15); do
            "$SMOKE/venv/bin/modastack" events 2>/dev/null | grep -q "release-pipeline" && { echo "Event visible in project event log"; exit 0; }
            sleep 2
          done
          echo "Event never appeared in the project event log"
          exit 1

      - name: 'Smoke 2: agent responds to a blocking ask'
        run: |
          export PATH="$HOME/.local/bin:$HOME/.claude/bin:$PATH"
          cd "$SMOKE/project"
          VERSION="${{ steps.version.outputs.version }}"

          RESPONSE=$("$SMOKE/venv/bin/modastack" ask \
            "Release smoke check for v${VERSION}: reply with exactly the string SMOKE-OK and nothing else." \
            --timeout 240)
          echo "Manager response: $RESPONSE"
          echo "$RESPONSE" | grep -q "SMOKE-OK" || { echo "=== SMOKE TEST FAILED ==="; exit 1; }
          echo "=== SMOKE TEST PASSED ==="

      - name: Promote release to production
        # Runs only if the smoke test passed. This is the ONLY step that
        # touches the production deployment: upgrade the uv tool and
        # restart the director at ~/dev (it relaunches project leads).
        run: |
          export PATH="$HOME/.local/bin:$HOME/.claude/bin:$PATH"
          VERSION="${{ steps.version.outputs.version }}"

          # CPU-only torch (#161): the prod box (t3.medium) has no GPU, so
          # the CUDA wheel stack is ~7GB of disk for zero runtime benefit.
          # unsafe-best-match lets the +cpu local version win resolution.
          uv tool install "modastack==$VERSION" --force --refresh \
            --index https://download.pytorch.org/whl/cpu \
            --index-strategy unsafe-best-match
          modastack --version

          cd "$PROD_DIR"
          modastack stop 2>/dev/null || true
          sleep 2
          # Regenerate prod config from the released pack (v0.15.0 cutover
          # lesson: restarting a new CLI against a stale installed config
          # degrades silently). Sync the prod checkout's agents/ to the tag
          # so the established source-of-truth path stays valid; session
          # rotation on image change (#173) handles freshness.
          git -C modastack fetch origin --tags
          git -C modastack checkout "refs/tags/v$VERSION" -- agents/
          modastack install modastack/agents/eng-team < /dev/null
          # Strip RUNNER_TRACKING_ID or the Actions runner kills the
          # daemonized director during post-job process cleanup.
          env -u RUNNER_TRACKING_ID modastack start
          sleep 5
          test -f .modastack/state/manager.pid
          kill -0 "$(cat .modastack/state/manager.pid)"
          echo "Production director restarted on v$VERSION"

      - name: Cleanup smoke test
        if: always()
        run: |
          export PATH="$HOME/.local/bin:$HOME/.claude/bin:$PATH"
          if [ -d "$SMOKE/project" ]; then
            cd "$SMOKE/project"
            "$SMOKE/venv/bin/modastack" stop --force 2>/dev/null || true
            "$SMOKE/venv/bin/modastack" event-server stop 2>/dev/null || true
          fi
          rm -rf "$SMOKE"

  deploy-event-server:
    name: Deploy event server
    needs: publish
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: event-server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: event-server/package-lock.json

      - run: npm ci

      - run: npx vitest run

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: event-server
          command: deploy

  update-homebrew:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Trigger Homebrew formula update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: moda-labs/homebrew-modastack
          event-type: pypi-release
          client-payload: '{"version": "${{ steps.version.outputs.version }}"}'
