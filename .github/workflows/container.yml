name: Container image

# Builds the instance image (containerized-8) and runs its contract tests.
# Path-filtered: only fires when image-defining files change, so unrelated PRs
# pay nothing. The nightly run has no path filter — it catches EXTERNAL rot
# (the claude.ai installer, the python:3.11-slim base, apt/pip indexes) even
# when no file in the repo changed.
on:
  push:
    branches: [main]
    paths: &image_paths
      - "Dockerfile"
      - ".dockerignore"
      - "docker/**"
      - "pyproject.toml"
      - "tests/integration/test_container_image.py"
      # the codex round-trip bakes + boots this team (its own image layer)
      - "agents/codex-smoke/**"
      - ".github/workflows/container.yml"
  pull_request:
    branches: [main]
    # `labeled`/`unlabeled` so adding the `ci:live` label triggers a run that
    # includes the gated live round-trip (default types don't fire on labels).
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths: *image_paths
  schedule:
    - cron: "0 6 * * *"  # nightly at 6am UTC — external-rot canary
  workflow_dispatch: {}

jobs:
  container-image:
    name: Build + contract tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      # conftest under tests/integration imports bobi, so the package must
      # be importable on the runner even though the tests only shell out to docker.
      - name: Install test runner
        run: pip install -e ".[dev]"

      - name: Build instance image
        run: docker build -t bobi:ci .

      - name: Run container contract tests
        # The image is prebuilt above; the fixture reuses it via the env var
        # instead of rebuilding. Contract checks only — the live round-trip is
        # the separate step below.
        env:
          BOBI_TEST_IMAGE: bobi:ci
        run: pytest tests/integration/test_container_image.py -m "docker and not live" -v --timeout=400

      # The live round-trip spins up an EPHEMERAL event server (the real Worker
      # via wrangler dev) so CI never touches a production deployment. It needs
      # node + the event-server deps on the runner.
      #
      # Cadence: this job is already path-filtered to image-defining files, so
      # the live ask runs WHENEVER the image actually changes (plus nightly /
      # push to main / dispatch) — that's the "image rebuilt → prove it boots and
      # answers" gate. Same-repo PRs run it for real; fork PRs (no secret) need
      # the `ci:live` label and otherwise skip. The three steps share one
      # condition (kept identical) so they stay in lockstep.
      - name: Set up Node (ephemeral wrangler event server)
        if: >-
          github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository ||
          contains(github.event.pull_request.labels.*.name, 'ci:live')
        uses: actions/setup-node@v5
        with:
          node-version: "22"  # wrangler requires Node >= 22

      - name: Install event-server deps
        if: >-
          github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository ||
          contains(github.event.pull_request.labels.*.name, 'ci:live')
        working-directory: event-server
        run: npm ci --no-audit --no-fund

      - name: Live ask round-trip (Claude + Codex brains)
        # Real API calls against an ephemeral wrangler event server: boots the
        # built image and asserts a blocking `ask` round-trips. Two live tests run
        # here - Claude (reuses bobi:ci) and Codex (builds its own codex-smoke
        # image layer on the cached base). Each skips if its provider key is unset,
        # so this proves "bobi works e2e" for whichever brains have creds.
        # Bounded by the image path filter, so cost is paid only when the image
        # (or the codex team) changed.
        if: >-
          github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository ||
          contains(github.event.pull_request.labels.*.name, 'ci:live')
        env:
          BOBI_TEST_IMAGE: bobi:ci
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: pytest tests/integration/test_container_image.py -m "docker and live" -v --timeout=900
