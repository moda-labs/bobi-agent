name: Container image

# Builds the instance image (containerized-8) and runs its contract tests.
# Path-filtered: only fires when image-defining files change, so unrelated PRs
# pay nothing. The nightly run has no path filter — it catches EXTERNAL rot
# (the claude.ai installer, the python:3.11-slim base, apt/pip indexes) even
# when no file in the repo changed.
on:
  push:
    branches: [main]
    paths: &image_paths
      - "Dockerfile"
      - ".dockerignore"
      - "docker/**"
      - "pyproject.toml"
      - "tests/integration/test_container_image.py"
      # #428 Stage 3: the agent-bootstrapped dependency e2e drives these.
      - "tests/integration/test_dep_bootstrap_e2e.py"
      - "scripts/build-team-images.sh"
      - "bobi/dep_bootstrap.py"
      - "bobi/build_render.py"
      - "bobi/tool_library.py"
      # Team resolution (bobi/build.py) and the CLI plugin loader (bobi/cli.py)
      # stay public; the build engine itself is the bobi_deploy entries below
      # (#707).
      - "bobi/build.py"
      - "bobi/cli.py"
      - "bobi_deploy/src/bobi_deploy/deploy.py"
      - "bobi/registry.py"
      - "bobi_deploy/src/bobi_deploy/build.py"
      - "bobi_deploy/tests/integration/test_bobi_build.py"
      - ".github/workflows/container.yml"
  pull_request:
    branches: [main]
    # `labeled`/`unlabeled` so adding the `ci:live` label triggers a run that
    # includes the gated live round-trip (default types don't fire on labels).
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths: *image_paths
  schedule:
    - cron: "0 6 * * *"  # nightly at 6am UTC — external-rot canary
  workflow_dispatch: {}

jobs:
  # Dockerfile lint, moved here from ci.yml's every-PR lint job (repo-split
  # phase 1: the Dockerfile moves private, so its checks live in this
  # private-bound file). A lint regression can only come from image-defining
  # changes, which this workflow's path filter already covers.
  image-lint:
    name: Lint (Dockerfile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: hadolint (Dockerfile)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

      - name: Dockerfile build-check (source + binary modes)
        # BuildKit lint + stage-graph resolution for both build modes, so a
        # regression in the BOBI_BUILD=pypi path (binary deploy) is caught
        # without a full image build.
        run: |
          docker build --check .
          docker build --check --build-arg BOBI_BUILD=pypi --build-arg BOBI_VERSION=0.0.0 .

  container-image:
    name: Build + contract tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      # conftest under tests/integration imports bobi, so the package must
      # be importable on the runner even though the tests only shell out to docker.
      - name: Install test runner
        # bobi_deploy: `bobi build` (and its integration test) live in the
        # deploy plugin (#707).
        run: pip install -e ".[dev]" -e ./bobi_deploy

      - name: Build instance image
        run: docker build -t bobi:ci .

      - name: Run container contract tests
        # The image is prebuilt above; the fixture reuses it via the env var
        # instead of rebuilding. Contract checks only — the live round-trip is
        # the separate step below.
        env:
          BOBI_TEST_IMAGE: bobi:ci
        run: pytest tests/integration/test_container_image.py -m "docker and not live" -v --timeout=400

      - name: bobi build integration (team image from a declaration)
        # #610 acceptance, moved private with the engine (#707). Runs here -
        # not in deploy-package.yml - because it needs docker and reuses the
        # layer cache warmed by the image build above.
        run: pytest bobi_deploy/tests/integration/test_bobi_build.py -m docker -v --timeout=600

      # The live round-trip spins up an EPHEMERAL event server (the real Worker
      # via wrangler dev) so CI never touches a production deployment. It needs
      # node + the event-server deps on the runner.
      #
      # Cadence: this job is already path-filtered to image-defining files, so
      # the live ask runs WHENEVER the image actually changes (plus nightly /
      # push to main / dispatch) — that's the "image rebuilt → prove it boots and
      # answers" gate. Same-repo PRs run it for real; fork PRs (no secret) need
      # the `ci:live` label and otherwise skip. The three steps share one
      # condition (kept identical) so they stay in lockstep.
      - name: Set up Node (ephemeral wrangler event server)
        if: >-
          github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository ||
          contains(github.event.pull_request.labels.*.name, 'ci:live')
        uses: actions/setup-node@v5
        with:
          node-version: "22"  # wrangler requires Node >= 22

      - name: Install event-server deps
        if: >-
          github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository ||
          contains(github.event.pull_request.labels.*.name, 'ci:live')
        working-directory: event-server
        run: npm ci --no-audit --no-fund

      - name: Live ask round-trip (Claude + Codex brains)
        # Real API calls against an ephemeral wrangler event server: boots the
        # built image and asserts a blocking `ask` round-trips. Two live tests run
        # here - Claude and Codex - both on the SAME base image (bobi:ci): codex
        # now ships in the base image (#428), so no flavored layer is built. Each
        # skips if its provider key is unset, so this proves "bobi works e2e" for
        # whichever brains have creds. Bounded by the image path filter, so cost
        # is paid only when the image changed.
        if: >-
          github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository ||
          contains(github.event.pull_request.labels.*.name, 'ci:live')
        env:
          BOBI_TEST_IMAGE: bobi:ci
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: pytest tests/integration/test_container_image.py -m "docker and live" -v --timeout=900

      # #428 Stage 3 acceptance: an ARBITRARY guide-only dependency is bootstrapped
      # by a live agent on a fresh base image, its recipe frozen through the one
      # renderer, and the built image really contains a working tool. Drives the CI
      # entry point (build-team-images.sh) end to end — a base build + a live agent
      # + a team build, so it runs only under the same live gate as the round-trip
      # (image changed / same-repo PR / `ci:live` label / push / nightly).
      - name: Dependency-bootstrap e2e (guide dep → live agent → working image)
        if: >-
          github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository ||
          contains(github.event.pull_request.labels.*.name, 'ci:live')
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: pytest tests/integration/test_dep_bootstrap_e2e.py -m "docker and claude" -v --timeout=3100
