name: Team images

# Verify that every team with a `build:` spec produces a working team-flavored
# image (team-flavored images; docs/CONTAINERIZED_DEPLOYMENT.md §2.6). A team that
# declares `build:` needs its host tools (node, codex, gstack, …) baked in — the
# generic base ships none, and a dark container has no TTY to install them. CI
# drives `bobi build` (#610) per team: it renders the team-deps hook and builds
# the ONE Dockerfile with --build-arg TEAM_DEPS; the hook's final step re-runs
# the team's requires[].check, so a missing tool fails THIS build, not
# production dispatch.
#
# This is a BUILD-ONLY verify gate. The team-flavored image is built on Fly's
# remote builder during `bobi deploy` (deploy.py renders TEAM_DEPS into the
# build context — Fly creates app + registry + machine together, no separate
# registry push). A "build once in CI → push to a registry → deploy many by ref"
# optimization is deferred (Fly's registry rejects pushes to a never-deployed
# app; a GHCR flow would follow release.yml's publish-image pattern, which
# already pushes the BASE image with the workflow GITHUB_TOKEN). So CI's job
# here is purely to catch a broken build spec early. Path-filtered so
# unrelated PRs pay nothing.
on:
  push:
    branches: [main]
    paths: &img_paths
      - "agents/**"
      - "Dockerfile"
      - "docker/**"
      - "pyproject.toml"
      - "bobi/build_render.py"
      - "bobi/config.py"
      # The renderer now composes (from: chain + tool_library/dependency
      # expansion), so the expansion logic changes what a team bakes. (#428)
      - "bobi/compose.py"
      - "bobi/tool_library.py"
      # The build now runs the bootstrap→render seam (dep_bootstrap --check/
      # --render), which pulls in the harness + the brain registry. (#428 Stage 3)
      - "bobi/dep_bootstrap.py"
      - "bobi/brain/**"
      # The wrapper drives `bobi build` (#610), which routes through the
      # deploy asset/team-resolution helpers and the CLI.
      - "bobi/build.py"
      - "bobi_deploy/src/bobi_deploy/deploy.py"
      - "bobi/registry.py"
      - "bobi/cli.py"
      - "scripts/build-team-images.sh"
      - ".github/workflows/team-images.yml"
  pull_request:
    branches: [main]
    paths: *img_paths
  workflow_dispatch: {}

jobs:
  team-images:
    name: Build team-flavored images (verify)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # build_render imports bobi.config (needs pyyaml); install the package
      # so `python -m bobi.build_render` resolves on the runner.
      - name: Install bobi (for the renderer)
        run: pip install -e .

      - name: Build team images (no push — verify the build + requires gate)
        env:
          PUSH: "0"
          # #428 Stage 3: a team with a guide-only dependency has its recipe
          # materialized by the bootstrap agent inside a fresh base image (OQ1:
          # bootstrap in CI). Provide the brain keys so that path can run; unused
          # by declarative/pinned teams (no agent), so today's teams pay nothing.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          IS_SANDBOX: "1"
        run: scripts/build-team-images.sh
