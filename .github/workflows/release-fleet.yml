name: Release fleet gate

# The Fly/Worker half of the release pipeline (repo-split phase 1): deploy the
# Cloudflare event server, then build the brain canaries FROM the release wheel
# and functionally smoke them. Called from release.yml as the `fleet` job; the
# `smoked` output is release.yml's publish gate. This whole file moves to the
# private repo at cut time - the public release keeps wheel + PyPI + Homebrew
# and drops this gate (its release scope shrinks to the local product).
on:
  workflow_call:
    inputs:
      version:
        description: "Release version (from the wheel filename)"
        required: true
        type: string
      claude-version:
        description: "Exact claude CLI version resolved once by build-wheel"
        required: true
        type: string
      source-sha:
        description: "Commit the release wheel was built from"
        required: true
        type: string
    outputs:
      smoked:
        description: "true only when the functional canary gate actually ran"
        value: ${{ jobs.build-canary.outputs.smoked }}

jobs:
  # --------------------------------------------------------------------------
  # Deploy the Cloudflare event server before the canary. The canary proves the
  # exact wheel against the live event bus, so event-server-only fixes must be
  # live before that functional gate runs. PyPI publish and fleet roll remain
  # gated on build-canary.
  deploy-event-server:
    name: Deploy event server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: event-server
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source-sha }}

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: event-server/package-lock.json

      - run: npm ci

      - run: npx vitest run

      - name: Stamp event-server release metadata
        run: |
          set -euo pipefail
          release_sha="${{ inputs.source-sha }}"
          {
            echo "BOBI_RELEASE_VERSION=${{ inputs.version }}"
            echo "BOBI_RELEASE_SHA=$release_sha"
          } >> "$GITHUB_ENV"
          BOBI_RELEASE_VERSION="${{ inputs.version }}" \
          BOBI_RELEASE_SHA="$release_sha" \
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path("wrangler.jsonc")
          text = path.read_text()
          replacements = {
              '"BOBI_RELEASE_VERSION": "dev"':
                  f'"BOBI_RELEASE_VERSION": {json.dumps(os.environ["BOBI_RELEASE_VERSION"])}',
              '"BOBI_RELEASE_SHA": "dev"':
                  f'"BOBI_RELEASE_SHA": {json.dumps(os.environ["BOBI_RELEASE_SHA"])}',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f"missing release metadata placeholder: {old}")
              text = text.replace(old, new, 1)
          path.write_text(text)
          PY

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: event-server
          command: deploy

      - name: Verify fleet event server is the deployed Worker
        env:
          FLEET_EVENT_SERVER_URL: ${{ vars.FLEET_EVENT_SERVER_URL }}
        run: |
          set -euo pipefail
          event_server="${FLEET_EVENT_SERVER_URL:-}"
          if [ -z "$event_server" ]; then
            event_server="$(python3 - <<'PY'
          from pathlib import Path

          for raw in Path("../deployments/defaults.yaml").read_text().splitlines():
              line = raw.split("#", 1)[0].strip()
              if not line.startswith("event_server:"):
                  continue
              value = line.split(":", 1)[1].strip().strip('"').strip("'")
              print(value)
              break
          PY
            )"
          fi
          [ -n "$event_server" ] || { echo "::error::no event_server set in deployments/defaults.yaml"; exit 1; }
          case "$event_server" in
            http://*|https://*) ;;
            *) echo "::error::event_server must resolve to an http(s) URL, got: $event_server"; exit 1;;
          esac
          event_server="${event_server%/}"

          expected_version="${BOBI_RELEASE_VERSION:?}"
          expected_sha="${BOBI_RELEASE_SHA:?}"
          last_health=""

          for attempt in {1..30}; do
            if last_health="$(curl -fsS --max-time 10 "$event_server/health" 2>/dev/null)"; then
              actual="$(HEALTH="$last_health" python3 - <<'PY'
          import json
          import os

          try:
              health = json.loads(os.environ["HEALTH"])
              release = health.get("release") or {}
              print(f"{release.get('version', '')}\t{release.get('sha', '')}")
          except Exception:
              print("\t")
          PY
              )"
              actual_version="${actual%%$'\t'*}"
              actual_sha="${actual#*$'\t'}"
              if [ "$actual_version" = "$expected_version" ] && [ "$actual_sha" = "$expected_sha" ]; then
                echo "Verified $event_server serves event-server $actual_version@$actual_sha"
                exit 0
              fi
              echo "Waiting for $event_server to serve $expected_version@$expected_sha (attempt $attempt/30; got ${actual_version:-missing}@${actual_sha:-missing})"
            else
              echo "Waiting for $event_server/health to respond (attempt $attempt/30)"
            fi
            sleep 10
          done

          echo "::error::fleet event_server drift: $event_server/health did not report release $expected_version@$expected_sha after deploy"
          echo "Last health payload: ${last_health:-<none>}"
          exit 1

  # --------------------------------------------------------------------------
  # THE GATE: deploy the brain canaries from an image built FROM the just-built
  # wheel, then a functional `ask` proves each answers CANARY-OK end-to-end
  # through the PROD event server. A broken wheel/image fails here and blocks
  # PyPI/Homebrew publish.
  #
  # Both brains are hard gates at parity (#428): ci-canary (Claude) and
  # ci-codex-smoke (Codex) run through the identical path (same base image, same
  # wheel) — codex ships in the base image, so no flavored image is needed. If
  # either can't answer, the release aborts.
  build-canary:
    name: Build canary from the wheel + smoke
    needs: [deploy-event-server]
    runs-on: ubuntu-latest
    # smoked=true only when the functional gate actually RAN. The job also
    # succeeds when FLY_API_TOKEN is unset (fleet not wired), and PyPI has an
    # external backstop for that case (trusted-publisher config) - but the
    # GHCR push authenticates with the always-present GITHUB_TOKEN, so
    # the image publish must require this output, not just job success.
    outputs:
      smoked: ${{ steps.canary.outputs.smoked }}
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      CLAUDE_PIN: ${{ inputs.claude-version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source-sha }}

      - name: Stage the prebuilt wheel into the build context
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Build the brain canary images from the wheel + smoke them
        id: canary
        run: |
          set -euo pipefail
          if [ -z "${FLY_API_TOKEN:-}" ]; then
            echo "::notice::FLY_API_TOKEN unset — fleet not wired; skipping the canary gate."
            exit 0
          fi
          # `fly` is the current binary name; some flyctl installs only expose
          # `flyctl`. Detect either (same pattern as deploy.py / fleet.sh).
          FLY="$(command -v fly || command -v flyctl)" \
            || { echo "::error::neither 'fly' nor 'flyctl' found on PATH"; exit 1; }
          export FLY
          FLEET_PREFIX="$(sed -nE 's#^fleet:[[:space:]]*([^[:space:]#]+).*#\1#p' \
                            deployments/defaults.yaml | head -n1)"
          [ -n "${FLEET_PREFIX:-}" ] || { echo "::error::no fleet set in deployments/defaults.yaml"; exit 1; }

          # The brain canaries, each a hard gate at parity (#428). Fields are
          # <deployment>:<app>:<policy>, where deployment is the deployments/<name>.yaml
          # name and app is its Fly app.
          #   required  — must exist; its absence is a misconfiguration that fails.
          #   bootstrap — may not be provisioned yet; warn+skip until it is, THEN it
          #               is a hard gate. This is the one-time window after this PR
          #               merges but before `bobi deploy codex-smoke` (+ the
          #               CODEX_SMOKE__OPENAI_API_KEY secret) stands ci-codex-smoke up.
          canaries=(
            "canary:${FLEET_PREFIX}-canary:required"
            "codex-smoke:${FLEET_PREFIX}-codex-smoke:bootstrap"
          )

          for spec in "${canaries[@]}"; do
            IFS=: read -r _deployment app policy <<<"$spec"
            if ! "$FLY" status -a "$app" >/dev/null 2>&1; then
              if [ "$policy" = required ]; then
                echo "::error::$app does not exist — the release canary gate cannot run"
                exit 1
              fi
              echo "::warning::$app not provisioned yet — skipping its gate (bootstrap window: run 'bobi deploy codex-smoke' once and set CODEX_SMOKE__OPENAI_API_KEY in the canary Environment; then it is a hard gate)"
              continue
            fi

            # Build + deploy the generic image FROM THE WHEEL (dist/ is in the build
            # context; builder-wheel installs it). Round-trip live config; swap image.
            echo "::group::build + deploy $app (generic base, from the wheel)"
            cfg="$(mktemp -t "fly-$app-XXXX.toml")"
            "$FLY" config save -a "$app" -c "$cfg" --yes
            "$FLY" deploy "$PWD" --config "$cfg" --dockerfile "$PWD/Dockerfile" \
              --build-arg BOBI_BUILD=wheel \
              --build-arg CLAUDE_VERSION="$CLAUDE_PIN" \
              --depot=false --ha=false --wait-timeout 10m --remote-only -a "$app"
            rm -f "$cfg"
            echo "::endgroup::"

            # Functional canary gate — ask the freshly-built canary and assert it
            # answers CANARY-OK end-to-end through the PROD event server. A broken
            # image aborts the whole release here. The deploy only waited for the
            # manager HEALTHCHECK (up BEFORE the session is ready) and the canary
            # auto-suspends, so canary-smoke.sh starts the machine and polls the
            # ask with a generous budget that covers a cold first boot.
            echo "::group::smoke $app (functional ask)"
            scripts/canary-smoke.sh "$app"
            echo "::endgroup::"
          done

          # Reached only when the gate genuinely ran (the FLY_API_TOKEN-unset
          # path exits above without setting it).
          echo "smoked=true" >> "$GITHUB_OUTPUT"
