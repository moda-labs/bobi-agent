name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"  # nightly at 6am UTC
  workflow_dispatch: {}

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        # Public product only - the bobi_deploy plugin's suite (and the
        # two-wheel install smoke) run in the private deploy repo's CI
        # (repo split).
        run: pip install -e ".[dev,kb]"

      - name: Run unit tests
        run: pytest tests/ --ignore=tests/integration/ --ignore=tests/e2e/ --timeout=30 -q

  lint:
    name: Lint (workflows)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: actionlint (workflows + their shell)
        # Lints every .github/workflows/*.yml and shellchecks their run: blocks -
        # previously only run by hand, so the GitOps workflows could regress.
        # Download a pinned release directly: curl -f fails loudly on a bad
        # response and --retry rides out transient CDN blips. The upstream
        # install script did neither, so a transient HTTP error page once got
        # piped straight into gunzip and flaked main CI.
        env:
          ACTIONLINT_VERSION: 1.7.12
        run: |
          curl -fsSL --retry 3 --retry-delay 2 -o actionlint.tar.gz \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          tar -xzf actionlint.tar.gz actionlint
          ./actionlint -color

  event-server:
    name: Event server (events-core + local)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: event-server/package-lock.json

      - name: Install dependencies
        working-directory: event-server
        run: npm ci

      # vitest never imports local.ts and the local bundle is built lazily at
      # runtime, so without this a dangling import (e.g. across the events-core
      # package boundary) would reach main unnoticed.
      - name: Typecheck (all workspace sources)
        working-directory: event-server
        run: npx tsc --noEmit

      - name: Run event-server tests
        working-directory: event-server
        run: npx vitest run

      # The private worker adapter consumes events-core as a pinned published
      # npm package after the repo split; this proves the publishable tarball
      # (dist build + transformed manifest) works for a clean external
      # consumer: plain-Node ESM imports of every subpath + d.ts typecheck.
      - name: Events-core publish smoke (pack + scratch consumer)
        working-directory: event-server
        run: npm run smoke -w core

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    # Browsers + all system deps are baked into the image, so there is no apt
    # step and no Chromium download. Keep the tag in sync with the pinned
    # playwright version in pyproject.toml (dev deps).
    container: mcr.microsoft.com/playwright/python:v1.60.0-noble
    steps:
      - uses: actions/checkout@v5

      # The image ships Python 3.12; cache the pip download dir so dev deps
      # aren't re-fetched every run. (setup-python is skipped — we use the
      # container's interpreter, which already has the matching browser.)
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-e2e-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run E2E tests
        # The setup UI is driven against the real FastAPI app booted in-process
        # with a fake LLM source — deterministic, no Claude, no network.
        run: >-
          pytest tests/e2e --timeout=120 -q
          --tracing=retain-on-failure --screenshot=only-on-failure
          --output=test-results

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: test-results/
          retention-days: 7

  integration-fast:
    name: Integration tests (no Claude)
    runs-on: ubuntu-latest
    env:
      # hf-xet can hang indefinitely on unauthenticated GitHub runners.
      # Use the regular Hub download path and cap each file transfer so CI
      # fails fast instead of reaching GitHub's 6h cancellation limit.
      HF_HUB_DISABLE_XET: "1"
      HF_HUB_DOWNLOAD_TIMEOUT: "120"
      FASTEMBED_CACHE_PATH: ${{ github.workspace }}/.fastembed-cache
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"

      # test_login_bootstrap_smoke.py bundles chat-sdk-slack.ts with esbuild,
      # which needs @chat-adapter/slack resolvable from event-server/ (the
      # test skips without it, silently losing coverage).
      - name: Install event-server Node dependencies
        run: npm ci --no-audit --no-fund
        working-directory: event-server

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        # Full [dev,kb] so every non-Claude integration test can run.
        # fastembed uses ONNX (no torch needed).
        run: pip install -e ".[dev,kb]"

      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.fastembed-cache
          key: fastembed-all-MiniLM-L6-v2-${{ runner.os }}-${{ hashFiles('pyproject.toml', 'bobi/kb/sidecar.py') }}

      - name: Pre-download embedding model
        # The KB sidecar downloads all-MiniLM-L6-v2 on first use.
        # Pre-cache it so the 30s sidecar startup timeout isn't racing
        # a model download over a variable-speed network.
        timeout-minutes: 8
        run: |
          for attempt in 1 2 3; do
            if timeout 120 python -c "from fastembed import TextEmbedding; from bobi.kb.sidecar import _FASTEMBED_MODEL, _resolve_cache_dir; model = TextEmbedding(model_name=_FASTEMBED_MODEL, cache_dir=_resolve_cache_dir()); next(model.embed(['cache warmup']))"; then
              if ! test -n "$(find "$FASTEMBED_CACHE_PATH" -mindepth 1 -print -quit)"; then
                echo "::error::embedding model cache is empty after warmup"
                exit 1
              fi
              exit 0
            fi
            echo "::warning::embedding model download attempt ${attempt} failed or timed out; retrying"
            rm -rf "$FASTEMBED_CACHE_PATH"
            sleep 5
          done
          echo "::error::embedding model download failed after 3 attempts"
          exit 1

      - name: Run all non-Claude integration tests
        # Tests that need the claude CLI skip via requires_claude.
        # `docker`-marked tests build the container image (minutes + network) —
        # they run in the dedicated container-image job, not here.
        # New test files are auto-discovered — no explicit file list to rot.
        run: >-
          pytest tests/integration/ -m "not claude and not docker"
          --timeout=60 -v

  # NOTE: the wrangler-dev integration job (Worker adapter under a real
  # `wrangler dev`) lives in the private deploy repo (repo split), which runs
  # this repo's tests/integration/test_event_server.py against its worker via
  # BOBI_TEST_ES_DIR as the protocol-compatibility gate.

  # NOTE: the real-Claude integration suite (test_agent_launch / manager_lifecycle
  # / manager_sdk / e2e_event_flow / messaging / setup_flow) ran on a self-hosted
  # EC2 runner. That box was retired when eng-team moved to Fly (C24, #368). These
  # tests still run locally (`pytest tests/`); a GitHub-hosted replacement (real
  # Claude on ubuntu-latest with an ANTHROPIC_API_KEY secret, like container.yml's
  # live `ask`) is a follow-up if we want them gating CI again.
