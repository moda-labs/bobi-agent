name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"  # nightly at 6am UTC
  workflow_dispatch: {}

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/ --ignore=tests/integration/ --ignore=tests/e2e/ --timeout=30 -q

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run E2E tests
        # The setup UI is driven against the real FastAPI app booted in-process
        # with a fake LLM source — deterministic, no Claude, no network.
        run: >-
          pytest tests/e2e --timeout=120 -q
          --tracing=retain-on-failure --screenshot=only-on-failure
          --output=test-results

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: test-results/
          retention-days: 7

  integration-fast:
    name: Integration tests (no Claude)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: CLI commands
        run: pytest tests/integration/test_cli_commands.py --timeout=30 -v

      - name: Event server
        run: pytest tests/integration/test_event_server.py --timeout=60 -v

  integration-claude:
    name: Integration tests (Claude)
    runs-on: self-hosted
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'ci:claude')
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        # CPU-only torch: tests need embeddings, not CUDA — the GPU wheel
        # stack is ~7GB and overflows the self-hosted runner disk (#161).
        run: |
          python3 -m venv .venv
          .venv/bin/pip install torch --index-url https://download.pytorch.org/whl/cpu
          .venv/bin/pip install -e ".[dev]"

      - name: Agent launch
        run: .venv/bin/pytest tests/integration/test_agent_launch.py --timeout=180 -v

      - name: Manager lifecycle
        run: .venv/bin/pytest tests/integration/test_manager_lifecycle.py --timeout=180 -v

      - name: Manager SDK (direct ClaudeSDKClient)
        run: .venv/bin/pytest tests/integration/test_manager_sdk.py --timeout=180 -v

      - name: End-to-end event flow
        run: .venv/bin/pytest tests/integration/test_e2e_event_flow.py --timeout=180 -v
