name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"  # nightly at 6am UTC
  workflow_dispatch: {}

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev,kb]"

      - name: Run unit tests
        run: pytest tests/ --ignore=tests/integration/ --ignore=tests/e2e/ --timeout=30 -q

  lint:
    name: Lint (workflows + Dockerfile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: actionlint (workflows + their shell)
        # Lints every .github/workflows/*.yml and shellchecks their run: blocks —
        # previously only run by hand, so the GitOps workflows could regress.
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color

      - name: hadolint (Dockerfile)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

      - name: Dockerfile build-check (source + binary modes)
        # BuildKit lint + stage-graph resolution for both build modes, so a
        # regression in the MODASTACK_BUILD=pypi path (binary deploy) is caught
        # without a full image build.
        run: |
          docker build --check .
          docker build --check --build-arg MODASTACK_BUILD=pypi --build-arg MODASTACK_VERSION=0.0.0 .

  event-server:
    name: Event server (Worker/miniflare)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: event-server
        run: npm ci

      - name: Run Worker tests
        working-directory: event-server
        run: npx vitest run

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    # Browsers + all system deps are baked into the image, so there is no apt
    # step and no Chromium download. Keep the tag in sync with the pinned
    # playwright version in pyproject.toml (dev deps).
    container: mcr.microsoft.com/playwright/python:v1.60.0-noble
    steps:
      - uses: actions/checkout@v5

      # The image ships Python 3.12; cache the pip download dir so dev deps
      # aren't re-fetched every run. (setup-python is skipped — we use the
      # container's interpreter, which already has the matching browser.)
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-e2e-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run E2E tests
        # The setup UI is driven against the real FastAPI app booted in-process
        # with a fake LLM source — deterministic, no Claude, no network.
        run: >-
          pytest tests/e2e --timeout=120 -q
          --tracing=retain-on-failure --screenshot=only-on-failure
          --output=test-results

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: test-results/
          retention-days: 7

  integration-fast:
    name: Integration tests (no Claude)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        # Full [dev,kb] so every non-Claude integration test can run.
        # fastembed uses ONNX (no torch needed).
        run: pip install -e ".[dev,kb]"

      - name: Pre-download embedding model
        # The KB sidecar downloads all-MiniLM-L6-v2 on first use.
        # Pre-cache it so the 30s sidecar startup timeout isn't racing
        # a model download over a variable-speed network.
        run: python -c "from fastembed import TextEmbedding; TextEmbedding(model_name='sentence-transformers/all-MiniLM-L6-v2')"

      - name: Run all non-Claude integration tests
        # Tests that need the claude CLI skip via requires_claude.
        # `docker`-marked tests build the container image (minutes + network) —
        # they run in the dedicated container-image job, not here.
        # New test files are auto-discovered — no explicit file list to rot.
        run: >-
          pytest tests/integration/ -m "not claude and not docker"
          --timeout=60 -v

  integration-wrangler:
    name: Integration tests (wrangler dev)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Install event-server Node dependencies
        run: npm ci --no-audit --no-fund
        working-directory: event-server

      - name: Run event-server integration tests against wrangler dev
        env:
          MODASTACK_TEST_WRANGLER: "1"
        run: >-
          pytest tests/integration/test_event_server.py
          -k "wrangler"
          --timeout=120 -v

  integration-claude:
    name: Integration tests (Claude)
    runs-on: self-hosted
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'ci:claude')
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        # CPU-only torch: tests need embeddings, not CUDA — the GPU wheel
        # stack is ~7GB and overflows the self-hosted runner disk (#161).
        run: |
          python3 -m venv .venv
          .venv/bin/pip install torch --index-url https://download.pytorch.org/whl/cpu
          .venv/bin/pip install -e ".[dev,kb]"
          .venv/bin/pip install pytest-rerunfailures

      - name: Agent launch
        continue-on-error: true
        id: agent-launch
        run: .venv/bin/pytest tests/integration/test_agent_launch.py --timeout=180 --reruns=1 -v

      - name: Manager lifecycle
        continue-on-error: true
        id: manager-lifecycle
        run: .venv/bin/pytest tests/integration/test_manager_lifecycle.py --timeout=180 --reruns=1 -v

      - name: Manager SDK (direct ClaudeSDKClient)
        continue-on-error: true
        id: manager-sdk
        run: .venv/bin/pytest tests/integration/test_manager_sdk.py --timeout=180 --reruns=1 -v

      - name: End-to-end event flow
        continue-on-error: true
        id: e2e-flow
        run: .venv/bin/pytest tests/integration/test_e2e_event_flow.py --timeout=180 --reruns=1 -v

      - name: Messaging
        continue-on-error: true
        id: messaging
        run: .venv/bin/pytest tests/integration/test_messaging.py --timeout=180 --reruns=1 -v

      - name: Setup flow
        continue-on-error: true
        id: setup-flow
        run: .venv/bin/pytest tests/integration/test_setup_flow.py --timeout=900 --reruns=1 -v

      - name: Check for failures
        # Fail the job if any step above failed, but only after all have run.
        if: always()
        run: |
          failed=""
          [ "${{ steps.agent-launch.outcome }}" = "failure" ] && failed="$failed agent-launch"
          [ "${{ steps.manager-lifecycle.outcome }}" = "failure" ] && failed="$failed manager-lifecycle"
          [ "${{ steps.manager-sdk.outcome }}" = "failure" ] && failed="$failed manager-sdk"
          [ "${{ steps.e2e-flow.outcome }}" = "failure" ] && failed="$failed e2e-flow"
          [ "${{ steps.messaging.outcome }}" = "failure" ] && failed="$failed messaging"
          [ "${{ steps.setup-flow.outcome }}" = "failure" ] && failed="$failed setup-flow"
          if [ -n "$failed" ]; then
            echo "::error::Failed steps:$failed"
            exit 1
          fi
