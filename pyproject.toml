[project]
name = "modastack"
version = "0.22.0"
description = "Build teams of event-driven AI agents"
requires-python = ">=3.11"
license = "MIT"
authors = [
    { name = "Moda Labs", email = "zach@modalabs.ai" },
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development",
]

dependencies = [
    "httpx>=0.27",
    "pyyaml>=6.0",
    "click>=8.1",
    "truststore>=0.9",
    "websocket-client>=1.7",
    "certifi>=2024.0",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "jinja2>=3.1",
    "claude-agent-sdk>=0.2.87",
    "apsw>=3.40",
]

[project.urls]
Homepage = "https://github.com/moda-labs/modastack"
Repository = "https://github.com/moda-labs/modastack"
Issues = "https://github.com/moda-labs/modastack/issues"

[project.optional-dependencies]
kb = [
    "fastembed>=0.4",
    "sqlite-vec>=0.1.6",
]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-timeout>=2.3",
    "pytest-playwright>=0.5",
    # Pinned to match the Playwright container image used by the e2e CI job
    # (mcr.microsoft.com/playwright/python:v1.60.0-*). Bump both together so
    # the baked-in browser binary always matches the installed client.
    "playwright==1.60.0",
    "pytest-rerunfailures>=14.0",
]

[project.scripts]
modastack = "modastack.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["modastack"]

# Bundle the event server source so standalone (PyPI) installs can run a
# local event server — it is npm-installed and built on first use.
[tool.hatch.build.targets.wheel.force-include]
"event-server/src" = "modastack/event-server/src"
"event-server/package.json" = "modastack/event-server/package.json"
"event-server/package-lock.json" = "modastack/event-server/package-lock.json"
"event-server/tsconfig.json" = "modastack/event-server/tsconfig.json"
# Bundle a few starter teams so `modastack setup` always offers templates,
# offline and without depending on a (possibly private) GitHub registry.
"agents/eng-team" = "modastack/templates/eng-team"
"agents/market-research" = "modastack/templates/market-research"
"agents/support-manager" = "modastack/templates/support-manager"

[tool.hatch.build.targets.sdist]
# `agents` is required: the wheel force-includes agents/{eng-team,market-research,
# support-manager} as bundled templates, and `python -m build` builds the wheel
# FROM the sdist — so those dirs must be in the sdist or the wheel build fails
# with "Forced include not found".
include = ["modastack", "event-server", "agents", "README.md", "CHANGELOG.md"]
exclude = ["event-server/node_modules", "event-server/dist", "**/__pycache__"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
markers = [
    "claude: test requires a real Claude CLI session (deselected in integration-fast)",
    "local_only: test only runs against the local Node.js event server backend",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
