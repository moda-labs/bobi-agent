[project]
name = "modastack"
version = "0.7.0"
description = "AI engineering team: manager + engineer agents with Linear, GitHub, Slack"
requires-python = ">=3.11"
license = "MIT"
authors = [
    { name = "Moda Labs", email = "zach@modalabs.ai" },
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development",
]

dependencies = [
    "httpx>=0.27",
    "pyyaml>=6.0",
    "click>=8.1",
    "truststore>=0.9",
    "websocket-client>=1.7",
    "certifi>=2024.0",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "jinja2>=3.1",
    "claude-agent-sdk>=0.2.87",
]

[project.urls]
Homepage = "https://github.com/moda-labs/modastack"
Repository = "https://github.com/moda-labs/modastack"
Issues = "https://github.com/moda-labs/modastack/issues"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-timeout>=2.3",
]

[project.scripts]
modastack = "modastack.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["modastack", "dashboard"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
