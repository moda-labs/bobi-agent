[project]
name = "modastack"
version = "0.2.0"
description = "AI engineering team: manager + engineer agents with Linear, GitHub, Slack"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27",
    "pyyaml>=6.0",
    "click>=8.1",
    "truststore>=0.9",
    "websocket-client>=1.7",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-timeout>=2.3",
]

[project.scripts]
modastack = "modastack.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["modastack", "manager"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
