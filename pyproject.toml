[project]
name = "agentd"
version = "0.1.0"
description = "Cron-based agent dispatch loop: Linear + Slack → Claude Code"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27",
    "pyyaml>=6.0",
    "click>=8.1",
    "truststore>=0.9",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-timeout>=2.3",
]

[project.scripts]
dispatch = "dispatch.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["dispatch"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
